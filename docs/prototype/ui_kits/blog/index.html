  <script>
    // Runtime OG/SEO updater. Production (Next.js) ships these via generateMetadata;
    // in the prototype we mutate the live tags so share/preview behaviour is demonstrable.
    window.__setOG = function (m) {
      m = m || {};
      const set = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.setAttribute("content", val); };
      if (m.title != null) {
        document.title = m.title;
        set("og-title", m.title);
      }
      if (m.description != null) { set("meta-description", m.description); set("og-description", m.description); }
      set("og-type", m.type || "website");
      set("og-image", m.image || "");
      set("og-url", m.url || (location.origin + location.pathname));
    };
    window.__resetOG = function () {
      window.__setOG({
        title: "Recenza — UI kit",
        description: "Recenza — платформа блогов с редакционным ревью.",
        type: "website", image: "", url: location.origin + location.pathname,
      });
    };

:root {
  /* ============ COLOR — LIGHT ============ */
  --background: #fafafa;
  --foreground: #111111;
  --muted: #f0f0f0;
  --muted-foreground: #6b7280;
  --border: #e2e2e2;
  --border-secondary: #ebebeb;
  --bg-secondary: #f7f7f7;
  --bg-elevated: #ffffff;
  --text-muted: #9ca3af;

  /* Accent — teal */
  --accent: #0f766e;
  --accent-hover: #0c6960;
  --accent-foreground: #ffffff;

  /* Semantic */
  --success: #166534;
  --success-bg: #dcfce7;
  --success-border: #bbf7d0;
  --warning: #854d0e;
  --warning-foreground: #ffffff;
  --warning-bg: #fef9c3;
  --warning-border: #fde68a;
  --danger: #991b1b;
  --danger-bg: #fee2e2;
  --danger-border: #fecaca;
  --info: #1e40af;
  --info-bg: #dbeafe;
  --info-border: #bfdbfe;

  /* Pin / portfolio highlight — amber */
  --pin: #b45309;
  --pin-ring: #d97706;
  --pin-bg: #fef3c7;
  --pin-border: #fcd34d;

  /* Code */
  --code-bg: #f0f0f0;

  /* ============ TYPOGRAPHY SCALE ============ */
  --font-sans: "Literata", Georgia, "Times New Roman", serif;
  --font-display: "Lora", Georgia, "Times New Roman", serif;
  --font-mono: "Fira Code", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;

  --type-h1: 3rem;      /* 48px — page heroes */
  --type-h2: 2rem;      /* 32px */
  --type-h3: 1.5rem;    /* 24px */
  --type-h4: 1.25rem;   /* 20px */
  --type-body: 1rem;    /* 16px */
  --type-small: 0.875rem;/* 14px */
  --type-code: 0.875rem;

  --leading-h1: 1.1;
  --leading-h2: 1.2;
  --leading-h3: 1.3;
  --leading-body: 1.75;
  --leading-small: 1.5;

  --tracking-h1: -0.03em;
  --tracking-h2: -0.02em;
  --tracking-h3: -0.015em;
  --tracking-body: 0em;
  --tracking-small: 0.01em;

  /* ============ SPACING / RADII / SHADOW ============ */
  --radius-sm: 0.25rem;
  --radius-md: 0.375rem;   /* buttons, chips */
  --radius-lg: 0.5rem;     /* cards, inputs, code blocks */
  --radius-pill: 9999px;   /* tag / difficulty pills */

  /* Shadows are used very sparingly — the system prefers
     hairline borders on --border over drop shadows. */
  --shadow-focus: 0 0 0 2px var(--accent);

  /* Layout rail */
  --max-content: 56rem;    /* 896px — max-w-4xl */
  --max-article: 80rem;    /* 1280px — max-w-5xl, with 220px TOC */
}

/* Dark theme is applied at runtime via html[data-theme="dark"] (see below).
   The legacy `.dark` class block was unused and has been removed. */

/* ============ SEMANTIC / ELEMENT STYLES ============ */
html, body {
  background: var(--background);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-size: var(--type-body);
  line-height: var(--leading-body);
  -webkit-font-smoothing: antialiased;
}

h1 {
  font-family: var(--font-display);
  font-size: var(--type-h1);
  font-weight: 800;
  line-height: var(--leading-h1);
  letter-spacing: var(--tracking-h1);
}
h2 {
  font-family: var(--font-display);
  font-size: var(--type-h2);
  font-weight: 700;
  line-height: var(--leading-h2);
  letter-spacing: var(--tracking-h2);
}
h3 {
  font-family: var(--font-display);
  font-size: var(--type-h3);
  font-weight: 600;
  line-height: var(--leading-h3);
  letter-spacing: var(--tracking-h3);
}
h4 {
  font-family: var(--font-sans);
  font-size: var(--type-h4);
  font-weight: 600;
}
p  { font-size: var(--type-body); line-height: var(--leading-body); }
small { font-size: var(--type-small); line-height: var(--leading-small); }

a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 4px;
}

button, a, input, textarea {
  transition:
    color 0.15s ease,
    background-color 0.15s ease,
    border-color 0.15s ease,
    opacity 0.15s ease;
}

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

code:not(pre code) {
  background: var(--muted);
  padding: 0.15rem 0.35rem;
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 0.875em;
}

pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: var(--type-code);
  line-height: 1.6;
  overflow-x: auto;
}

blockquote {
  border-left: 3px solid var(--border);
  padding-left: 1rem;
  color: var(--muted-foreground);
}

/* ============ ANIMATIONS ============ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in {
  animation: fadeInUp 0.4s ease-out both;
  animation-delay: calc(var(--index, 0) * 80ms);
}
@media (prefers-reduced-motion: reduce) {
  .animate-in { animation: none; opacity: 1; transform: none; }
}

      overflow-wrap: anywhere;

      padding-bottom: 0.12em;

const NOTIF_READ_KEY = "devblog-notif-read-v1";

  if (!session) return [];

  if (session.role === "author" || session.role === "reviewer") {

    for (const b of blogs) {
      for (const c of (b.chapters || [])) {
        const mine = session.role === "author"
          ? b.authorSlug === session.handle
          : (c.reviewerHandles || []).includes(session.handle);
        if (mine && c.hasMyTurn) {
          out.push({
            id: `turn-${b.slug}-${c.slug}`,
            kind: "review",
            title: session.role === "author" ? "Нужны ваши правки" : "Ожидает вашего ревью",
            body: `${b.title}${(b.chapters || []).length > 1 ? " · " + c.title : ""}`,
            at: c.lastActivityAt || 0,

      const latest = pub[pub.length - 1];

          body: `${b.title} · ${latest.title}`,
          at: latest.revision?.publishedAt || b.lastActivityAt || 0,
          blogSlug: b.slug,

// BookmarkButton — mirrors blog/src/components/bookmark-button.tsx

function BookmarkButton({ articleId, initialBookmarked = false, initialCount = 0, session, onLoginRequired }) {
  const [bookmarked, setBookmarked] = useState(initialBookmarked);
  const [count, setCount] = useState(initialCount);
  const [pop, setPop] = useState(false);
  const prev = useRef(initialBookmarked);

  useEffect(() => {
    if (bookmarked && !prev.current) {
      setPop(true);
      const t = setTimeout(() => setPop(false), 300);
      return () => clearTimeout(t);
    }
    prev.current = bookmarked;
  }, [bookmarked]);

  if (!session && bookmarked === "notAuthed") {
    return (
      <a href="#" onClick={(e) => { e.preventDefault(); onLoginRequired?.(); }}
         className="text-sm text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors">
        Войдите, чтобы добавить в закладки
      </a>
    );
  }

  const handleClick = () => {
    if (!session) {
      onLoginRequired?.();
      return;
    }
    const next = !bookmarked;
    setBookmarked(next);
    setCount((c) => c + (next ? 1 : -1));
  };

  return (
    <button
      onClick={handleClick}
      title={bookmarked ? "Убрать из закладок" : "В закладки"}
      aria-label={bookmarked ? "Убрать из закладок" : "В закладки"}
      className="inline-flex items-center gap-1.5 text-sm text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors"
    >
      <Icon.Bookmark
        filled={bookmarked}
        className={pop ? "animate-[bookmark-pop_0.3s_ease-out]" : ""}
      />
      {count > 0 && <span>{count}</span>}
    </button>
  );
}

// ArticleVoting — mirrors blog/src/components/article-voting.tsx
// -----------------------------------------------------------------------------
function ArticleVoting({ articleId, initialRating, session, onLoginRequired }) {
  const [rating, setRating] = useState(initialRating);
  const [userVote, setUserVote] = useState(null);

  const vote = (v) => {
    if (!session) { onLoginRequired?.(); return; }
    if (userVote === v) {
      setRating((r) => r - v);
      setUserVote(null);
    } else {
      setRating((r) => r - (userVote ?? 0) + v);
      setUserVote(v);
    }
  };

  const btn = "flex items-center justify-center w-7 h-7 rounded transition-colors";
  const idle = "text-[var(--muted-foreground)] hover:text-[var(--foreground)] hover:bg-[var(--muted)]";
  const activeUp = "text-[var(--success)] bg-[var(--success-bg)]";
  const activeDown = "text-[var(--danger)] bg-[var(--danger-bg)]";
  return (
    <div className="inline-flex items-center gap-1">
      <button className={`${btn} ${userVote === 1 ? activeUp : idle}`} onClick={() => vote(1)} aria-label="Нравится"><Icon.ChevUp /></button>
      <span className="text-sm font-medium tabular-nums w-6 text-center">{rating > 0 ? `+${rating}` : rating}</span>
      <button className={`${btn} ${userVote === -1 ? activeDown : idle}`} onClick={() => vote(-1)} aria-label="Не нравится"><Icon.ChevDown /></button>
    </div>
  );
}

// -----------------------------------------------------------------------------
// ScrollProgress — mirrors blog/src/components/scroll-progress.tsx
// Scoped to the article content column (kit runs inside an iframe-style layout).
// -----------------------------------------------------------------------------
function ScrollProgress({ targetRef }) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const el = targetRef.current;
    if (!el) return;
    let raf = 0;
    const update = () => {
      const scrollHeight = el.scrollHeight - el.clientHeight;
      if (scrollHeight > 0) setProgress((el.scrollTop / scrollHeight) * 100);
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
    el.addEventListener("scroll", onScroll, { passive: true });
    update();
    return () => { el.removeEventListener("scroll", onScroll); cancelAnimationFrame(raf); };
  }, [targetRef]);
  return (
    <div
      className="absolute top-0 left-0 h-[3px] bg-[var(--accent)] z-20 transition-[width] duration-100 ease-linear pointer-events-none"
      style={{ width: `${progress}%` }}
      role="progressbar"
    />
  );
}

// -----------------------------------------------------------------------------
// CoverPlaceholder — simple colored gradient as a stand-in for real images.
// We don't have the blog's actual article cover images.
// -----------------------------------------------------------------------------
function CoverPlaceholder({ seed, className = "" }) {
  // Two hashable gradients from accent + neutrals, chosen deterministically by seed
  const gradients = [
    "linear-gradient(135deg, #0f766e 0%, #334155 100%)",
    "linear-gradient(135deg, #1e293b 0%, #0f766e 100%)",
    "linear-gradient(135deg, #334155 0%, #111827 100%)",
    "linear-gradient(135deg, #0f766e 0%, #064e3b 100%)",
    "linear-gradient(135deg, #111827 0%, #4b5563 100%)",
    "linear-gradient(135deg, #115e59 0%, #1e293b 100%)",
  ];
  const hash = [...String(seed)].reduce((a, c) => a + c.charCodeAt(0), 0);
  return <div className={className} style={{ backgroundImage: gradients[hash % gradients.length] }} aria-hidden="true" />;
}

// -----------------------------------------------------------------------------
// Avatar — initials on a deterministic muted hue. Used everywhere a user
// appears (comments, profile header, reviewer dashboard, mention chips).
// -----------------------------------------------------------------------------
function Avatar({ handle, name, size = 32, className = "" }) {
  const initials = (name || handle || "?")
    .split(/\s+/).filter(Boolean).slice(0, 2)
    .map(s => s[0].toUpperCase()).join("");
  // Deterministic hue from handle so the same user is always the same colour.
  const seed = (handle || name || "?");
  const hash = [...String(seed)].reduce((a, c) => a + c.charCodeAt(0), 0);
  const hue = hash * 47 % 360;
  return (
    <div
      aria-hidden="true"
      className={`inline-flex items-center justify-center rounded-full font-medium select-none shrink-0 ${className}`}
      style={{
        width: size, height: size,
        fontSize: Math.max(11, Math.round(size * 0.4)),
        background: `oklch(0.92 0.04 ${hue})`,
        color: `oklch(0.32 0.06 ${hue})`,
      }}
    >{initials}</div>
  );
}

// -----------------------------------------------------------------------------
// formatRelativeTime — "2 ч назад", "вчера", "13 мая". Russian locale.
// -----------------------------------------------------------------------------
function formatRelativeTime(unixSeconds) {
  const now = Date.now() / 1000;
  const diff = Math.max(0, now - unixSeconds);
  if (diff < 60)        return "только что";
  if (diff < 3600)      return `${Math.floor(diff / 60)} мин назад`;
  if (diff < 86400)     return `${Math.floor(diff / 3600)} ч назад`;
  if (diff < 86400 * 2) return "вчера";
  if (diff < 86400 * 7) return `${Math.floor(diff / 86400)} дн назад`;
  return new Date(unixSeconds * 1000).toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
}

// -----------------------------------------------------------------------------
// CommentsSection — threaded comments with optional fragment-anchor support.
// Renders below the article body. 2-level nesting: comment → replies.
// A comment can carry an `anchor` quoting a fragment from the article;
// clicking "↑ к фрагменту" scrolls the article column to that block and
// briefly highlights it.
// -----------------------------------------------------------------------------
// 15-minute edit window for a comment/reply, measured from createdAt (unix s).
const COMMENT_EDIT_WINDOW_MS = 15 * 60 * 1000;
function withinEditWindow(createdAtUnix) {
  return Date.now() - (createdAtUnix || 0) * 1000 < COMMENT_EDIT_WINDOW_MS;
}

function CommentsSection({ scrollRef, session, blogSlug, chapterSlug, chapterRevision, blocks, chapters, blogAuthorHandle, pendingAnchor, onClearAnchor, onLoginRequired, onOpenProfile }) {
  const seed = window.FAKE_DATA.comments || [];
  const users = window.FAKE_DATA.users || {};
  const [comments, setComments] = useState(seed);
  const [draft, setDraft] = useState("");
  const [replyTo, setReplyTo] = useState(null);
  const [replyDraft, setReplyDraft] = useState("");
  const [editing, setEditing] = useState(null);     // id of comment/reply being edited
  const [editDraft, setEditDraft] = useState("");
  const [showOld, setShowOld] = useState(false);
  const [reporting, setReporting] = useState(null); // target object for ReportDialog

  // Whole-blog mode: chapterSlug is null but a `chapters` array is provided —
  // we then show every chapter's comments and resolve each one's chapter for
  // revision + fragment-anchor handling.
  const wholeMode = chapterSlug == null && Array.isArray(chapters) && chapters.length > 0;
  const chapterOf = (c) => (chapters || []).find(ch => ch.slug === c.chapterSlug) || null;

  // Only the comments tied to THIS blog (+ chapter when in chapter mode).
  const scoped = comments.filter(c =>
    c.blogSlug === blogSlug &&
    (chapterSlug == null || c.chapterSlug == null || c.chapterSlug === chapterSlug)
  );
  // Split current-revision comments from those left on an older revision.
  const isOld = (c) => {
    if (c.revision == null) return false;
    const rev = wholeMode ? (chapterOf(c)?.revision?.number) : chapterRevision;
    return rev != null && c.revision < rev;
  };
  const current = scoped.filter(c => !isOld(c));
  const older = scoped.filter(isOld);
  const total = scoped.reduce((acc, c) => acc + 1 + (c.replies?.length || 0), 0);

  const me = session
    ? (users[session.handle] || { handle: session.handle, name: session.name || session.handle, role: "reader" })
    : null;

  // Responsibility split:
  //   • readers comment everywhere;
  //   • authors only inside their OWN blog (and reply there);
  //   • reviewers and admins never comment on the public side.
  const isOwnBlog = !blogAuthorHandle || session?.handle === blogAuthorHandle;
  const canComment = !session
    || session.role === "reader"
    || (session.role === "author" && isOwnBlog);
  const blockedByRole = !!session && !canComment;
  const blockedMsg = !session ? "" :
    session.role === "reviewer" ? "Ревьюеры не участвуют в публичных обсуждениях — комментарии оставляют читатели и авторы." :
    session.role === "admin"    ? "Администраторы не комментируют публичные статьи." :
    session.role === "author"   ? "Авторы комментируют и отвечают только в своих блогах." :
    "";

  // Resolve a comment's fragment-anchor DOM id + whether its block still exists.
  // Chapter mode → id="block-<id>"; whole-blog mode → id="block-<chapterSlug>-<id>".
  const anchorIdFor = (c) => {
    if (!c.anchor) return null;
    return wholeMode ? `block-${c.chapterSlug}-${c.anchor.blockId}` : `block-${c.anchor.blockId}`;
  };
  const blockExistsFor = (c) => {
    if (!c.anchor) return false;
    const chBlocks = wholeMode ? (chapterOf(c)?.blocks) : blocks;
    return !chBlocks || chBlocks.some(b => b.id === c.anchor.blockId);
  };

  const jumpToBlock = (domId) => {
    const root = scrollRef?.current;
    if (!root || !domId) return;
    const el = root.querySelector(`[id="${domId}"]`);
    if (!el) return;
    const top = el.getBoundingClientRect().top - root.getBoundingClientRect().top + root.scrollTop - 24;
    root.scrollTo({ top, behavior: "smooth" });
    el.classList.add("blog-fragment-flash");
    setTimeout(() => el.classList.remove("blog-fragment-flash"), 1600);
  };

  const submitTop = (e) => {
    e.preventDefault();
    if (!session) { onLoginRequired?.(); return; }
    if (!draft.trim()) return;
    // Attach the fragment anchor the reader handed us, if any.
    const anchor = pendingAnchor
      ? { blockId: pendingAnchor.blockId, quote: pendingAnchor.quote }
      : null;
    const ch = pendingAnchor?.chapterSlug || chapterSlug;
    const rev = pendingAnchor?.chapterSlug
      ? ((chapters || []).find(c => c.slug === pendingAnchor.chapterSlug)?.revision?.number ?? null)
      : (chapterRevision ?? null);
    setComments([...comments, {
      id: `c-${Date.now()}`,
      blogSlug, chapterSlug: ch ?? null, revision: rev,
      authorHandle: session.handle,
      createdAt: Date.now() / 1000,
      editedAt: null,
      anchor,
      body: draft.trim(),
      replies: [],
    }]);
    setDraft("");
    onClearAnchor?.();
  };

  const submitReply = (e, parentId) => {
    e.preventDefault();
    if (!session) { onLoginRequired?.(); return; }
    if (!replyDraft.trim()) return;
    setComments(comments.map(c => c.id === parentId
      ? { ...c, replies: [...(c.replies || []), {
          id: `c-${Date.now()}`,
          authorHandle: session.handle,
          createdAt: Date.now() / 1000,
          editedAt: null,
          body: replyDraft.trim(),
        }]}
      : c));
    setReplyDraft("");
    setReplyTo(null);
  };

  // Save an edit to a top-level comment OR a nested reply (by id), stamping editedAt.
  const saveEdit = (id) => {
    const body = editDraft.trim();
    if (!body) return;
    const now = Date.now() / 1000;
    setComments(comments.map(c => {
      if (c.id === id) return { ...c, body, editedAt: now };
      if (c.replies?.some(r => r.id === id)) {
        return { ...c, replies: c.replies.map(r => r.id === id ? { ...r, body, editedAt: now } : r) };
      }
      return c;
    }));
    setEditing(null);
    setEditDraft("");
  };

  const startEdit = (item) => { setEditing(item.id); setEditDraft(item.body); setReplyTo(null); };
  const canEditItem = (item) => session && item.authorHandle === session.handle && withinEditWindow(item.createdAt);
  const canReportItem = (item) => session && session.role !== "admin" && session.handle !== item.authorHandle;
  const reportComment = (item) => setReporting({
    kind: "comment",
    targetCommentId: item.id,
    targetAuthorHandle: item.authorHandle,
    targetArticleSlug: blogSlug,
    targetBody: item.body,
  });

  const renderAuthor = (handle) => {
    const u = users[handle] || { handle, name: handle, role: "reader" };
    return (
      <button
        onClick={() => onOpenProfile?.(handle)}
        className="inline-flex items-center gap-2 group"
      >
        <Avatar handle={u.handle} name={u.name} size={28} />
        <span className="flex items-baseline gap-1.5">
          <span className="text-[13px] font-medium text-[var(--foreground)] group-hover:text-[var(--accent)] transition-colors">{u.name}</span>
          <span className="text-[12px] text-[var(--muted-foreground)]">@{u.handle}</span>
          {u.role === "author"   && <RoleTag tone="accent">автор</RoleTag>}
          {u.role === "reviewer" && <RoleTag tone="amber">ревьюер</RoleTag>}
          {u.role === "admin"    && <RoleTag tone="slate">админ</RoleTag>}
        </span>
      </button>
    );
  };

  return (
    <section id="comments" className="mt-16 pt-10 border-t border-[var(--border)]">
      <header className="flex items-baseline justify-between mb-8">
        <h2 className="font-[var(--font-display)] font-semibold text-2xl tracking-tight">
          Комментарии <span className="text-[var(--muted-foreground)] font-normal">{total}</span>
        </h2>
      </header>

      {/* New top-level comment */}
      {blockedByRole ? (
        <div className="mb-10 rounded-lg border border-dashed border-[var(--border)] bg-[var(--bg-secondary)] px-4 py-3.5">
          <p className="text-[13px] text-[var(--muted-foreground)] leading-relaxed">
            {blockedMsg}
          </p>
        </div>
      ) : (
      <form onSubmit={submitTop} className="mb-10" id="comment-form">
        <div className="flex gap-3">
          {me
            ? <Avatar handle={me.handle} name={me.name} size={32} />
            : <div className="w-8 h-8 rounded-full bg-[var(--muted)] shrink-0" aria-hidden="true" />}
          <div className="flex-1">
            {pendingAnchor && (
              <div className="mb-2 flex items-start gap-2 pl-3 py-1.5 pr-2 border-l-2 border-[var(--accent)] bg-[var(--muted)]/40 rounded-r">
                <span className="text-[12px] text-[var(--muted-foreground)] italic line-clamp-2 flex-1">«{pendingAnchor.quote}»</span>
                <button type="button" onClick={() => onClearAnchor?.()} className="text-[var(--muted-foreground)] hover:text-[var(--foreground)] text-[14px] leading-none shrink-0" aria-label="Убрать цитату">×</button>
              </div>
            )}
            <textarea
              ref={(el) => { if (el && pendingAnchor) el.focus(); }}
              value={draft}
              onChange={e => setDraft(e.target.value)}
              onFocus={() => { if (!session) { window.dispatchEvent(new CustomEvent("devblog:login-intent", { detail: { kind: "comment", blogSlug } })); onLoginRequired?.(); } }}
              placeholder={session ? (pendingAnchor ? "Комментарий к выделенному фрагменту…" : "Написать комментарий…") : "Войдите, чтобы оставить комментарий"}
              rows={3}
              className="w-full resize-none bg-transparent border border-[var(--border)] rounded-lg px-3 py-2.5 text-[14px] leading-relaxed placeholder:text-[var(--muted-foreground)] focus:outline-none focus:border-[var(--accent)] transition-colors"
            />
            <div className="flex items-center justify-end mt-2">
              <button
                type="submit"
                disabled={!draft.trim()}
                className="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] text-[13px] font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:opacity-90 transition-opacity"
              >Отправить</button>
            </div>
          </div>
        </div>
      </form>
      )}

      {/* Thread (current revision) */}
      {current.length === 0 && older.length === 0 ? (
        <p className="text-[13.5px] text-[var(--muted-foreground)] py-6">Пока нет комментариев. Будьте первым.</p>
      ) : null}

      <ol className="space-y-8">
        {current.map((c) => renderComment(c, false))}
      </ol>

      {/* Comments left on earlier revisions — collapsed under a spoiler. */}
      {older.length > 0 && (
        <div className="mt-10 pt-6 border-t border-dashed border-[var(--border)]">
          <button
            type="button"
            onClick={() => setShowOld(v => !v)}
            className="inline-flex items-center gap-2 text-[13px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors"
            aria-expanded={showOld}
          >
            <span className={`inline-block transition-transform ${showOld ? "rotate-90" : ""}`}>›</span>
            Комментарии к прошлым версиям
            <span className="tabular-nums px-1.5 py-px rounded bg-[var(--muted)] text-[11px]">{older.length}</span>
          </button>
          {showOld && (
            <ol className="space-y-8 mt-6 opacity-90">
              {older.map((c) => renderComment(c, true))}
            </ol>
          )}
        </div>
      )}
      {reporting && (
        <ReportDialog
          target={reporting}
          session={session}
          onClose={() => setReporting(null)}
          onDone={() => { try { window.dispatchEvent(new CustomEvent("devblog:toast", { detail: { text: "Жалоба отправлена модератору" } })); } catch (e) {} }}
        />
      )}
    </section>
  );

  // ── Render one comment (top-level) + its replies. `old` adds a version badge. ──
  function renderComment(c, old) {
    const anchorActive = c.anchor && blockExistsFor(c) && !old;
    const chTitle = wholeMode ? (chapterOf(c)?.title) : null;
    return (
      <li key={c.id} className="space-y-4">
        <article>
          {chTitle && (
            <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">{chTitle}</p>
          )}
          <div className="flex items-center justify-between gap-3 mb-2">
            <span className="inline-flex items-center gap-2 flex-wrap">
              {renderAuthor(c.authorHandle)}
              {old && (
                <span className="text-[10px] uppercase tracking-wider font-semibold px-1.5 py-px rounded bg-[var(--warning-bg)] text-[var(--warning)] border border-[var(--warning-border)]" title="Комментарий оставлен к предыдущей версии главы">
                  к версии v{c.revision}
                </span>
              )}
            </span>
            <time className="text-[12px] text-[var(--muted-foreground)] tabular-nums shrink-0">
              {formatRelativeTime(c.createdAt)}{c.editedAt ? " · изменено" : ""}
            </time>
          </div>

          {c.anchor && (
            anchorActive ? (
              <button
                onClick={() => jumpToBlock(anchorIdFor(c))}
                className="group flex items-start gap-2 mb-3 pl-3 py-1.5 pr-2.5 border-l-2 border-[var(--accent)] bg-[var(--muted)]/40 hover:bg-[var(--muted)] rounded-r text-left transition-colors max-w-full"
              >
                <span className="text-[12px] text-[var(--muted-foreground)] italic line-clamp-2 flex-1">«{c.anchor.quote}»</span>
                <span className="inline-flex items-center gap-1 text-[11px] text-[var(--accent)] font-medium shrink-0 mt-0.5">
                  <Icon.ArrowUpRight />к&nbsp;фрагменту
                </span>
              </button>
            ) : (
              <div className="flex items-start gap-2 mb-3 pl-3 py-1.5 pr-2.5 border-l-2 border-[var(--border)] bg-[var(--muted)]/30 rounded-r max-w-full" title="Фрагмент относится к другой версии главы">
                <span className="text-[12px] text-[var(--muted-foreground)] italic line-clamp-2 flex-1">«{c.anchor.quote}»</span>
              </div>
            )
          )}

          {editing === c.id ? (
            <EditForm item={c} editDraft={editDraft} setEditDraft={setEditDraft} onSave={() => saveEdit(c.id)} onCancel={() => setEditing(null)} />
          ) : (
            <p className="text-[14px] leading-relaxed text-[var(--foreground)] whitespace-pre-wrap">{c.body}</p>
          )}

          <div className="flex items-center gap-4 mt-2 text-[12px] text-[var(--muted-foreground)]">
            <button className="hover:text-[var(--foreground)] transition-colors inline-flex items-center gap-1">
              ▲ <span className="tabular-nums">{(c.id.length * 3) % 17}</span>
            </button>
            {!old && canComment && (
              <button
                onClick={() => { setReplyTo(replyTo === c.id ? null : c.id); setReplyDraft(""); }}
                className="hover:text-[var(--foreground)] transition-colors inline-flex items-center gap-1"
              >
                <Icon.CornerUpLeft /> Ответить
              </button>
            )}
            {canEditItem(c) && editing !== c.id && (
              <button onClick={() => startEdit(c)} className="hover:text-[var(--foreground)] transition-colors">
                Изменить
              </button>
            )}
            {!old && canReportItem(c) && (
              <button onClick={() => reportComment(c)} className="hover:text-[var(--danger)] transition-colors">
                Пожаловаться
              </button>
            )}
          </div>
        </article>

        {/* Replies */}
        {(c.replies?.length > 0 || replyTo === c.id) && (
          <ol className="pl-11 space-y-4 border-l border-[var(--border)] ml-3.5">
            {c.replies?.map((r) => (
              <li key={r.id} className="pl-4">
                <div className="flex items-center justify-between gap-3 mb-1.5">
                  {renderAuthor(r.authorHandle)}
                  <time className="text-[12px] text-[var(--muted-foreground)] tabular-nums shrink-0">
                    {formatRelativeTime(r.createdAt)}{r.editedAt ? " · изменено" : ""}
                  </time>
                </div>
                {editing === r.id ? (
                  <EditForm item={r} editDraft={editDraft} setEditDraft={setEditDraft} onSave={() => saveEdit(r.id)} onCancel={() => setEditing(null)} />
                ) : (
                  <p className="text-[14px] leading-relaxed text-[var(--foreground)] whitespace-pre-wrap">{r.body}</p>
                )}
                {canEditItem(r) && editing !== r.id && (
                  <button onClick={() => startEdit(r)} className="mt-1 text-[12px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors">
                    Изменить
                  </button>
                )}
                {canReportItem(r) && (
                  <button onClick={() => reportComment(r)} className="mt-1 ml-3 text-[12px] text-[var(--muted-foreground)] hover:text-[var(--danger)] transition-colors">
                    Пожаловаться
                  </button>
                )}
              </li>
            ))}

            {replyTo === c.id && (
              <li className="pl-4">
                <form onSubmit={(e) => submitReply(e, c.id)} className="flex gap-3">
                  {me
                    ? <Avatar handle={me.handle} name={me.name} size={28} />
                    : <div className="w-7 h-7 rounded-full bg-[var(--muted)] shrink-0" aria-hidden="true" />}
                  <div className="flex-1">
                    <textarea
                      autoFocus
                      value={replyDraft}
                      onChange={e => setReplyDraft(e.target.value)}
                      placeholder={`Ответить @${c.authorHandle}…`}
                      rows={2}
                      className="w-full resize-none bg-transparent border border-[var(--border)] rounded-lg px-3 py-2 text-[13px] leading-relaxed placeholder:text-[var(--muted-foreground)] focus:outline-none focus:border-[var(--accent)] transition-colors"
                    />
                    <div className="flex items-center gap-2 mt-1.5">
                      <button
                        type="submit"
                        disabled={!replyDraft.trim()}
                        className="px-3 py-1 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] text-[12px] font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:opacity-90 transition-opacity"
                      >Ответить</button>
                      <button
                        type="button"
                        onClick={() => { setReplyTo(null); setReplyDraft(""); }}
                        className="px-2 py-1 text-[12px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors"
                      >Отмена</button>
                    </div>
                  </div>
                </form>
              </li>
            )}
          </ol>
        )}
      </li>
    );
  }
}

// Inline edit textarea reused for comments and replies.
function EditForm({ item, editDraft, setEditDraft, onSave, onCancel }) {
  return (
    <div className="mt-1">
      <textarea
        autoFocus
        value={editDraft}
        onChange={e => setEditDraft(e.target.value)}
        rows={3}
        className="w-full resize-none bg-transparent border border-[var(--border)] rounded-lg px-3 py-2 text-[14px] leading-relaxed focus:outline-none focus:border-[var(--accent)] transition-colors"
      />
      <div className="flex items-center gap-2 mt-1.5">
        <button
          type="button"
          onClick={onSave}
          disabled={!editDraft.trim()}
          className="px-3 py-1 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] text-[12px] font-medium disabled:opacity-40 disabled:cursor-not-allowed hover:opacity-90 transition-opacity"
        >Сохранить</button>
        <button type="button" onClick={onCancel} className="px-2 py-1 text-[12px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors">Отмена</button>
      </div>
    </div>
  );
}

// -----------------------------------------------------------------------------
// ReportDialog — modal for filing a moderation report on a comment OR a blog.
// Pushes into window.__reports; the admin portal reads/resolves from the same
// store. `target` carries { kind, targetCommentId?, targetAuthorHandle,
// targetArticleSlug, targetBody }.
// -----------------------------------------------------------------------------
function ReportDialog({ target, session, onClose, onDone }) {
  const reasons = window.REPORT_REASONS || [];
  const [reason, setReason] = useState(reasons[0]?.id || "spam");
  const [note, setNote] = useState("");
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  const submit = () => {
    window.__reports?.add({
      ...target,
      reason,
      note: note.trim() || undefined,
      reporterHandle: session?.handle || "anon",
    });
    onDone?.();
    onClose();
  };
  const isBlog = target.kind === "blog";
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40" onClick={onClose} role="dialog" aria-modal="true">
      <div className="w-full max-w-md rounded-xl border border-[var(--border)] bg-[var(--background)]" onClick={e => e.stopPropagation()} style={{ boxShadow: "0 16px 40px rgba(0,0,0,0.2)" }}>
        <header className="flex items-center justify-between px-5 py-3.5 border-b border-[var(--border)]">
          <h2 className="font-[var(--font-display)] font-bold text-[18px] tracking-tight">{isBlog ? "Пожаловаться на блог" : "Пожаловаться на комментарий"}</h2>
          <button onClick={onClose} className="w-7 h-7 inline-flex items-center justify-center rounded-md text-[var(--muted-foreground)] hover:text-[var(--foreground)] hover:bg-[var(--muted)] transition-colors" aria-label="Закрыть">×</button>
        </header>
        <div className="p-5 flex flex-col gap-4">
          <div className="rounded-lg border border-[var(--border)] bg-[var(--muted)]/25 px-3.5 py-2.5">
            <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">{isBlog ? "Блог" : "Комментарий"}</p>
            <p className="text-[13px] text-[var(--foreground)] line-clamp-2 leading-relaxed">«{target.targetBody}»</p>
          </div>
          <div>
            <label className="block text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2">Причина</label>
            <div className="flex flex-col gap-1.5">
              {reasons.map(r => (
                <label key={r.id} className="flex items-center gap-2.5 cursor-pointer px-2 py-1.5 -mx-2 rounded hover:bg-[var(--muted)]/40 transition-colors">
                  <input type="radio" name="report-reason" className="accent-[var(--accent)]" checked={reason === r.id} onChange={() => setReason(r.id)} />
                  <span className="text-[13.5px]">{r.text}</span>
                </label>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5" htmlFor="report-note">Комментарий модератору <span className="normal-case font-normal text-[var(--muted-foreground)]">— необязательно</span></label>
            <textarea id="report-note" rows={2} value={note} onChange={e => setNote(e.target.value)} placeholder="Что не так?" className="w-full resize-none bg-[var(--background)] border border-[var(--border)] rounded-lg px-3 py-2 text-[13.5px] leading-relaxed focus:outline-none focus:border-[var(--accent)] transition-colors" />
          </div>
        </div>
        <footer className="flex items-center justify-end gap-2 px-5 py-3.5 border-t border-[var(--border)]">
          <button onClick={onClose} className="px-3.5 py-2 rounded-md text-[13px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors">Отмена</button>
          <button onClick={submit} className="px-4 py-2 rounded-md bg-[var(--danger)] text-white text-[13px] font-medium hover:opacity-90 transition-opacity">Отправить жалобу</button>
        </footer>
      </div>
    </div>
  );
}

// Tiny role chip used inline next to a username.
function RoleTag({ children, tone }) {
  const tones = {
    accent: "bg-[var(--accent)]/10 text-[var(--accent)]",
    amber:  "bg-amber-500/15 text-amber-700 dark:text-amber-400",
    slate:  "bg-slate-500/15 text-slate-700 dark:text-slate-300",
  };
  return (
    <span className={`text-[10px] uppercase tracking-wider font-semibold px-1.5 py-px rounded ${tones[tone] || tones.slate}`}>
      {children}
    </span>
  );
}

  <script type="text/babel">
// P11.2 — Public index from blogs.
// Overrides window.ArticleIndexScreen to render FAKE_DATA.blogs instead of
// articles[]. Every blog card shows its chapter count (no "series" concept).

const { useState, useMemo, useRef, useEffect } = React;

function readingTimeForBlog(blog) {
  const D = window.__blogData;
  const words = (blog.chapters || []).filter(c => D.isChapterPublished(c))
    .reduce((n, c) => n + (c.blocks || []).reduce((m, b) => m + (b.text || "").split(/\s+/).filter(Boolean).length, 0), 0);
  return Math.max(1, Math.round(words / 200));
}

function ArticleIndexScreen({ session, onOpenArticle, onOpenProfile, onLoginRequired, onNavigate }) {
  const D = window.__blogData;
  const allBlogs = D.getBlogs();
  const users = window.FAKE_DATA.users || {};
  // Show blogs that have at least one published chapter.
  const publicBlogs = allBlogs
    .filter(b => (b.chapters || []).some(c => D.isChapterPublished(c)))
    .filter(b => session?.role === "author" ? b.authorSlug === session.handle : true)
    .sort((a, b) => (b.lastActivityAt || 0) - (a.lastActivityAt || 0));

  const [query, setQuery] = useState("");
  const [sort, setSort] = useState("recent");
  const [sortOpen, setSortOpen] = useState(false);
  const sortRef = useRef(null);
  useEffect(() => {
    if (!sortOpen) return;
    const onDoc = (e) => { if (!sortRef.current?.contains(e.target)) setSortOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [sortOpen]);

  const seriesCount = publicBlogs.filter(b => b.chapters.length > 1).length;

  const visible = publicBlogs.filter(b => {
    // Query filter — match title / summary / chapter titles / author
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      const author = users[b.authorSlug] || {};
      const inTitle   = b.title?.toLowerCase().includes(q);
      const inSummary = b.summary?.toLowerCase().includes(q);
      const inChapter = (b.chapters || []).some(c => c.title?.toLowerCase().includes(q));
      const inAuthor  = author.name?.toLowerCase().includes(q) || b.authorSlug?.toLowerCase().includes(q);
      if (!inTitle && !inSummary && !inChapter && !inAuthor) return false;
    }
    return true;
  });

  // Sort the filtered set.
  const sortFns = {
    recent:  (a, b) => (b.lastActivityAt || 0) - (a.lastActivityAt || 0),
    popular: (a, b) => (b.viewCount || 0) - (a.viewCount || 0),
    title:   (a, b) => (a.title || "").localeCompare(b.title || "", "ru"),
  };
  const sorted = [...visible].sort(sortFns[sort] || sortFns.recent);

  const SORT_OPTS = [
    { id: "recent",  label: "Сначала свежие" },
    { id: "popular", label: "Популярные" },
    { id: "title",   label: "По алфавиту" },
  ];

  return (
    <div className="max-w-4xl mx-auto px-4 py-12 sm:py-16" data-screen-label="ArticleIndex">
      <h1 className="font-[var(--font-display)] font-extrabold text-4xl md:text-5xl tracking-tight mb-3">
        Все блоги
      </h1>
      <p className="text-[var(--muted-foreground)] mb-6">
        {publicBlogs.length} {publicBlogs.length === 1 ? "публикация" : publicBlogs.length < 5 ? "публикации" : "публикаций"}
      </p>

      {window.FeedBannerCarousel && <FeedBannerCarousel onNavigate={onNavigate} />}

      {/* ── Controls: search + compact sort ── */}
      <div className="flex items-center gap-2 mb-6">
        <div className="relative flex-1">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className="absolute left-3.5 top-1/2 -translate-y-1/2 text-[var(--muted-foreground)] pointer-events-none">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Поиск по названию, описанию, главам, автору…"
            className="block w-full bg-[var(--bg-secondary)] border border-[var(--border)] rounded-lg pl-10 pr-9 py-2.5 text-[14px] focus:outline-none focus:border-[var(--accent)] focus:bg-[var(--background)] transition-colors min-h-[44px]"
          />
          {query && (
            <button type="button" onClick={() => setQuery("")} aria-label="Очистить поиск" className="absolute right-2.5 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center rounded text-[var(--muted-foreground)] hover:text-[var(--foreground)] hover:bg-[var(--muted)] text-[17px] leading-none">×</button>
          )}
        </div>

        {/* Compact sort — icon button + popover */}
        <div className="relative shrink-0" ref={sortRef}>
          <button
            type="button"
            onClick={() => setSortOpen(o => !o)}
            aria-label="Сортировка"
            aria-expanded={sortOpen}
            title={`Сортировка: ${SORT_OPTS.find(o => o.id === sort)?.label}`}
            className={`w-11 h-11 flex items-center justify-center rounded-lg border transition-colors ${sortOpen ? "border-[var(--accent)] text-[var(--foreground)]" : "border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)] hover:text-[var(--foreground)]"}`}
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="6" x2="14" y2="6"/><line x1="4" y1="12" x2="11" y2="12"/><line x1="4" y1="18" x2="8" y2="18"/><polyline points="17 8 20 5 23 8"/><line x1="20" y1="5" x2="20" y2="19"/></svg>
          </button>
          {sortOpen && (
            <div className="absolute right-0 top-full mt-1.5 z-20 min-w-[180px] rounded-lg border border-[var(--border)] bg-[var(--bg-elevated)] py-1 shadow-lg">
              <p className="px-3 py-1 text-[10px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Сортировка</p>
              {SORT_OPTS.map(o => (
                <button
                  key={o.id}
                  onClick={() => { setSort(o.id); setSortOpen(false); }}
                  className={`w-full text-left px-3 py-2 text-[13px] flex items-center justify-between gap-2 transition-colors ${sort === o.id ? "text-[var(--accent)] font-medium" : "text-[var(--foreground)] hover:bg-[var(--muted)]/50"}`}
                >
                  {o.label}
                  {sort === o.id && <span aria-hidden="true">✓</span>}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {sorted.length === 0 ? (
        <div className="py-16 text-center border border-dashed border-[var(--border)] rounded-lg">
          <p className="text-[14px] text-[var(--foreground)] mb-1">Ничего не нашлось</p>
          <p className="text-[13px] text-[var(--muted-foreground)] mb-4">Попробуйте изменить поисковый запрос.</p>
          {query && (
            <button
              onClick={() => setQuery("")}
              className="text-[13px] font-medium text-[var(--accent)] hover:underline underline-offset-2"
            >Очистить поиск</button>

        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
          {sorted.map((b, i) => (
            <BlogIndexCard
              key={b.id}
              blog={b}
              index={i}
              session={session}
              onOpen={onOpenArticle}
              onOpenProfile={onOpenProfile}
              onLoginRequired={onLoginRequired}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// Card variant — author-prominent. For public index + reader feed.
// Local reactions-tick (BlogReader defines its own; Index.jsx is inlined earlier
// so we keep an independent copy here).
function useCardReactionsTick() {
  const [, force] = useState(0);
  useEffect(() => {
    const h = () => force(n => n + 1);
    window.addEventListener("devblog:reactions-changed", h);
    return () => window.removeEventListener("devblog:reactions-changed", h);
  }, []);
}
function CardBookmarkChip({ slug, session, onLoginRequired }) {
  useCardReactionsTick();
  const on = window.__reactions?.isBookmarked(slug);
  return (
    <button
      type="button"
      onClick={(e) => { e.stopPropagation(); if (!session) { onLoginRequired?.(); return; } window.__reactions.setBookmark(slug, !on); }}
      aria-pressed={on}

}

// ============================================================
// P12.2 — HomeScreen v2: drive from blogs, not articles.
// Override window.HomeScreen at the bottom of this script.
// For readers we already render ReaderFeed inline; for guests we now
// show a series-aware editorial hero + a "Series spotlight" rail.
// ============================================================
function HomeScreen({ session, onOpenArticle, onOpenBlog, onOpenProfile, onNavigate }) {
  const D = window.__blogData;
  const isReader = session?.role === "reader";
  // ReaderFeed is reader-only. App routes guests + other roles to the public
  // catalog (ArticleIndexScreen); this guard makes sure the retired
  // single-author editorial hero can never render.
  if (!isReader) return null;

  // Pick public blogs (have ≥1 published chapter), sorted by lastActivity.
  const publicBlogs = D.getBlogs()
    .filter(b => (b.chapters || []).some(c => D.isChapterPublished(c)))
    .sort((a, b) => (b.lastActivityAt || 0) - (a.lastActivityAt || 0));

  // Role separation: an author's public surface is scoped to their OWN blogs —
  // they don't browse or read other authors. Readers and guests see everything.
  const isAuthor = session?.role === "author";
  const scopedBlogs = isAuthor ? publicBlogs.filter(b => b.authorSlug === session.handle) : publicBlogs;

  // Featured = most recent blog overall (multi-chapter preferred if equally recent).
  const featured = scopedBlogs.slice().sort((a, b) => {
    const aSeries = a.chapters.length > 1 ? 1 : 0;
    const bSeries = b.chapters.length > 1 ? 1 : 0;
    if (aSeries !== bSeries) return bSeries - aSeries;
    return (b.lastActivityAt || 0) - (a.lastActivityAt || 0);
  })[0];
  const rest = scopedBlogs.filter(b => b.slug !== featured?.slug);

  if (isReader) {
    const follows = window.__follows?.readFollows?.() || [];
    const followedBlogs = publicBlogs.filter(b => follows.includes(b.slug));
    const otherBlogs = publicBlogs.filter(b => !follows.includes(b.slug));
    // Track follows changes so the feed re-renders.
    const [, force] = React.useReducer(x => x + 1, 0);
    React.useEffect(() => {
      const h = () => force();
      window.addEventListener("devblog:follows-changed", h);
      return () => window.removeEventListener("devblog:follows-changed", h);
    }, []);
    return (
      <div className="max-w-4xl mx-auto px-4" data-screen-label="ReaderFeed">
        <section className="py-12 md:py-16">
          <div className="flex items-start justify-between gap-6 flex-wrap">
            <div className="min-w-0">
              <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2">
                @{session?.handle || "you"}
              </p>
              <h1 className="font-[var(--font-display)] font-extrabold text-4xl md:text-5xl leading-[1.05] tracking-tight mb-3 title-clamp-2">
                Ваша лента
              </h1>
              <p className="text-[15px] text-[var(--muted-foreground)] max-w-xl leading-relaxed">
                {follows.length > 0
                  ? "Свежие главы из блогов, на которые вы подписаны."
                  : "Подпишитесь на блог, чтобы получать новые главы здесь."}
              </p>
            </div>
            <a href="#" onClick={(e) => { e.preventDefault(); onOpenBlog?.(); }} className="text-[12.5px] text-[var(--muted-foreground)] hover:text-[var(--accent)] transition-colors shrink-0 min-h-[44px] inline-flex items-center">Все блоги →</a>
          </div>
        </section>
        <hr className="border-[var(--border)]" />
        {window.FeedBannerCarousel && <div className="pt-8"><FeedBannerCarousel onNavigate={onNavigate} /></div>}
        {followedBlogs.length > 0 && (
          <section className="py-10">
            <h2 className="text-[13px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-4">Подписки</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
              {followedBlogs.map((b, i) => <BlogIndexCard key={b.id} blog={b} index={i} session={session} onOpen={onOpenArticle} onOpenProfile={onOpenProfile} />)}
            </div>
          </section>
        )}
        {follows.length === 0 && (
          <section className="py-12 text-center">
            <p className="text-[14px] text-[var(--muted-foreground)] mb-4">У вас пока нет подписок.</p>
            <a href="#" onClick={(e) => { e.preventDefault(); onOpenBlog?.(); }} className="text-[var(--accent)] font-medium hover:underline underline-offset-4">Найти блоги в каталоге →</a>
          </section>
        )}
        {otherBlogs.length > 0 && (
          <section className="py-10 border-t border-[var(--border)]">
            <h2 className="text-[13px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-4">{follows.length === 0 ? "Свежее" : "Ещё интересное"}</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
              {otherBlogs.slice(0, 4).map((b, i) => <BlogIndexCard key={b.id} blog={b} index={i} session={session} onOpen={onOpenArticle} onOpenProfile={onOpenProfile} />)}
            </div>
          </section>
        )}
      </div>
    );
  }
}

          ))}

// ProfileScreen v2 — public author profile.
// Shows the author's blogs as cards (with chapter dots / summary /
// click-through to BlogReader). Each card opens the blog reader.

function ProfileScreen({ handle, session, onOpenArticle, onBack, onNavigate, onOpenLogin, onOpenProfile, onOpenPortfolioEditor }) {
  const D = window.__blogData;
  const users = window.FAKE_DATA.users || {};
  const user = users[handle] || users.alex;
  const isMe = session?.handle === user.handle;
  const [editingProfile, setEditingProfile] = React.useState(false);
  const [profileTab, setProfileTab] = React.useState(null); // "about" | "blogs" | null(=auto)
  const [, forceProfileTick] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const h = () => forceProfileTick();
    window.addEventListener("devblog:profile-changed", h);
    window.addEventListener("devblog:portfolio-changed", h);
    return () => {
      window.removeEventListener("devblog:profile-changed", h);
      window.removeEventListener("devblog:portfolio-changed", h);
    };
  }, []);
  // Author's blogs — for non-authors return empty (we still render the header).
  const blogs = (D.getBlogs() || [])
    .filter(b => b.authorSlug === user.handle)
    .filter(b => isMe || (b.chapters || []).some(c => D.isChapterPublished(c)))
    .sort((a, b) => (b.lastActivityAt || 0) - (a.lastActivityAt || 0));

  // Profile stats.
  const publishedChapters = blogs.reduce((n, b) => n + (b.chapters || []).filter(c => D.isChapterPublished(c)).length, 0);
  const totalViews = blogs.reduce((n, b) => n + (b.viewCount || 0), 0);
  const totalBookmarks = blogs.reduce((n, b) => n + (b.bookmarkCount || 0), 0);
  const memberSince = user.joinedAt ? new Date(user.joinedAt * 1000).toLocaleDateString("ru-RU", { month: "long", year: "numeric" }) : null;
  const roleLabel = { author: "Автор", reviewer: "Ревьюер", admin: "Администратор", reader: "Читатель" }[user.role] || null;
  const fmt = (n) => n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(".0", "") + "k" : String(n);
  const isAuthorProfile = user.role === "author" || blogs.length > 0;

  // Role-scoped sections (Фаза E):
  //   • reviewer → public list of chapters they reviewed (no verdicts);
  //   • reader (own profile) → «Полка» of followed blogs.
  const reviewed = user.role === "reviewer" ? (D.getReviewedChapters?.(user.handle) || []) : [];
  const shelfFollows = (isMe && user.role === "reader") ? (window.__follows?.readFollows?.() || []) : [];
  const shelfBlogs = shelfFollows
    .map(s => D.getBlogBySlug(s))

  const links = user.links || {};

    links.telegram && { href: links.telegram, label: "Telegram", icon: <path d="M21.5 4.5 2.5 12.5l5.5 1.5m13-9.5-3 15-7-5.5m10-9.5-10 9.5m0 0L8 20.5l1-6.5" /> },
    links.website && { href: links.website, label: "Сайт", icon: <><circle cx="12" cy="12" r="9" /><line x1="3" y1="12" x2="21" y2="12" /><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18" /></> },
  ].filter(Boolean);

  return (

      <button

      >
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 18 5 12 11 6"/></svg>
        Назад

        <div className="flex flex-col items-center text-center sm:flex-row sm:items-start sm:text-left gap-4 sm:gap-6">
          <div className="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-[var(--bg-elevated)] border border-[var(--border)] overflow-hidden inline-flex items-center justify-center text-[30px] sm:text-[34px] font-semibold text-[var(--muted-foreground)] uppercase shrink-0 font-[var(--font-display)]">
            {user.avatarUrl ? <img src={user.avatarUrl} alt="" className="w-full h-full object-cover" /> : user.name?.slice(0, 1)}
          </div>
          <div className="min-w-0 w-full">
            <div className="flex items-center justify-center sm:justify-start gap-2.5 flex-wrap mb-1 sm:pr-40">
              <h1 className="font-[var(--font-display)] font-extrabold text-[26px] sm:text-4xl tracking-tight title-clamp-2 leading-[1.1]">{user.name}</h1>

                    <p className="text-[13.5px] text-[var(--muted-foreground)] max-w-md mx-auto mb-5 leading-relaxed">
                      «Об авторе» — расширенная страница о вас: открывается как статья, но публикуется сразу, без ревью. У автора она одна.
                    </p>
                    <button
                      onClick={() => onOpenPortfolioEditor?.()}
                      className="inline-flex items-center gap-1.5 text-[13px] font-medium px-4 py-2.5 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] hover:opacity-90 transition-opacity min-h-[44px]"
                    >
                      ＋ Создать «Об авторе»
                    </button>
                  </div>
                )
              )}
            </div>
          );
        })()
      ) : null}

      {editingProfile && (
        <ProfileEditModal user={user} onClose={() => setEditingProfile(false)} />
      )}
    </div>
  );
}

// ============================================================
// ProfileEditModal — edit own profile (name / bio / links). Persists via
// window.__profiles (in-memory + localStorage), broadcasts a change event.
// ============================================================
function ProfileEditModal({ user, onClose }) {
  const [name, setName] = React.useState(user.name || "");
  const [bio, setBio] = React.useState(user.bio || "");
  const [github, setGithub] = React.useState(user.links?.github || "");
  const [telegram, setTelegram] = React.useState(user.links?.telegram || "");
  const [website, setWebsite] = React.useState(user.links?.website || "");
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  const save = () => {
    window.__profiles?.save(user.handle, {
      name: name.trim() || user.name,
      bio: bio.trim(),
      links: { github: github.trim(), telegram: telegram.trim(), website: website.trim() },
    });
    onClose();
  };
  const field = "w-full bg-[var(--background)] border border-[var(--border)] rounded-lg px-3 py-2 text-[14px] focus:outline-none focus:border-[var(--accent)] transition-colors";
  const label = "block text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5";
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40" onClick={onClose} role="dialog" aria-modal="true">
      <div className="w-full max-w-md rounded-xl border border-[var(--border)] bg-[var(--background)] shadow-xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()} style={{ boxShadow: "0 16px 40px rgba(0,0,0,0.2)" }}>
        <header className="flex items-center justify-between px-5 py-3.5 border-b border-[var(--border)] sticky top-0 bg-[var(--background)]">
          <h2 className="font-[var(--font-display)] font-bold text-[18px] tracking-tight">Редактировать профиль</h2>
          <button onClick={onClose} className="w-7 h-7 inline-flex items-center justify-center rounded-md text-[var(--muted-foreground)] hover:text-[var(--foreground)] hover:bg-[var(--muted)] transition-colors" aria-label="Закрыть">×</button>
        </header>
        <div className="p-5 flex flex-col gap-4">
          <div>
            <label className={label} htmlFor="pe-name">Имя</label>
            <input id="pe-name" className={field} value={name} onChange={e => setName(e.target.value)} placeholder="Ваше имя" />
          </div>
          <div>
            <label className={label} htmlFor="pe-bio">О себе</label>
            <textarea id="pe-bio" rows={3} className={`${field} resize-none leading-relaxed`} value={bio} onChange={e => setBio(e.target.value)} placeholder="Коротко о себе" />
          </div>
          <div className="grid grid-cols-1 gap-3">
            <div>
              <label className={label} htmlFor="pe-gh">GitHub</label>
              <input id="pe-gh" className={field} value={github} onChange={e => setGithub(e.target.value)} placeholder="https://github.com/…" />
            </div>
            <div>
              <label className={label} htmlFor="pe-tg">Telegram</label>
              <input id="pe-tg" className={field} value={telegram} onChange={e => setTelegram(e.target.value)} placeholder="https://t.me/…" />
            </div>
            <div>
              <label className={label} htmlFor="pe-web">Сайт</label>
              <input id="pe-web" className={field} value={website} onChange={e => setWebsite(e.target.value)} placeholder="https://…" />
            </div>
          </div>
        </div>
        <footer className="flex items-center justify-end gap-2 px-5 py-3.5 border-t border-[var(--border)] sticky bottom-0 bg-[var(--background)]">
          <button onClick={onClose} className="px-3.5 py-2 rounded-md text-[13px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors">Отмена</button>
          <button onClick={save} className="px-4 py-2 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] text-[13px] font-medium hover:opacity-90 transition-opacity">Сохранить</button>
        </footer>
      </div>
    </div>
  );
}

  <!-- src/public/reader.jsx (inlined from ui_kits/blog/src/public/reader.jsx) -->
  <script type="text/babel">
// BlogReader — public reader for multi-chapter blogs.
//
// Replaces ArticleReader on the "article" route. Data-driven from
// window.__blogData.getBlogBySlug — works for single-chapter (auto-wrapped
// legacy) and multi-chapter blogs alike.
//
// Modes:
//   • "chapter" (default) — read one chapter at a time; prev/next nav; in-chapter ToC
//   • "all"               — concatenated read of all published chapters with anchored headers
//
// Persistence: last opened chapter is saved to localStorage per blog slug.
//
// Exports window.BlogReaderScreen — App.jsx uses it for `page === "article"`.

const { useState, useEffect, useMemo, useRef } = React;

// Storage key for last-opened chapter per blog.
const lastChapterKey = (blogSlug) => `devblog-reader-chapter:${blogSlug}`;

// ─── Follow state (P16.2) ──────────────────────────────────────
// Stored as a list of blog slugs in localStorage. Surfaces:
//   • BlogReader hero — "Подписаться" toggle
//   • ReaderFeed — followed series promoted to top
const FOLLOWS_KEY = "devblog-follows-v1";
function readFollows() {
  try { return JSON.parse(localStorage.getItem(FOLLOWS_KEY) || "[]"); } catch { return []; }
}
function isFollowed(slug) { return readFollows().includes(slug); }
function setFollow(slug, follow) {
  const cur = new Set(readFollows());
  if (follow) cur.add(slug); else cur.delete(slug);
  try { localStorage.setItem(FOLLOWS_KEY, JSON.stringify([...cur])); } catch {}
  // Broadcast to any subscribed surface.
  window.dispatchEvent(new CustomEvent("devblog:follows-changed"));
}
window.__follows = { readFollows, isFollowed, setFollow };

// ─── Reactions store (A1 votes + A2 bookmarks) ─────────────────
// Per-blog engagement persisted in localStorage. Surfaces:
//   • BlogEngagementBar (reader) — vote ±1, bookmark toggle, share
//   • BlogIndexCard — bookmark chip
//   • BookmarksScreen — saved list
const VOTES_KEY = "devblog-votes-v1";       // { blogSlug: 1 | -1 }
const BOOKMARKS_KEY = "devblog-bookmarks-v1"; // [blogSlug, …]
function readVotes() { try { return JSON.parse(localStorage.getItem(VOTES_KEY) || "{}"); } catch { return {}; } }
function getVote(slug) { return readVotes()[slug] || 0; }
function setVote(slug, v) {
  const all = readVotes();
  if (v === 0) delete all[slug]; else all[slug] = v;
  try { localStorage.setItem(VOTES_KEY, JSON.stringify(all)); } catch {}
  window.dispatchEvent(new CustomEvent("devblog:reactions-changed"));
}
function readBookmarks() { try { return JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || "[]"); } catch { return []; } }
function isBookmarked(slug) { return readBookmarks().includes(slug); }
function setBookmark(slug, on) {
  const cur = new Set(readBookmarks());
  if (on) cur.add(slug); else cur.delete(slug);
  try { localStorage.setItem(BOOKMARKS_KEY, JSON.stringify([...cur])); } catch {}
  window.dispatchEvent(new CustomEvent("devblog:reactions-changed"));
}
window.__reactions = { getVote, setVote, readBookmarks, isBookmarked, setBookmark };

// Hook: subscribe to reactions changes and re-render.
function useReactionsTick() {
  const [, force] = useState(0);
  useEffect(() => {
    const h = () => force(n => n + 1);
    window.addEventListener("devblog:reactions-changed", h);
    return () => window.removeEventListener("devblog:reactions-changed", h);
  }, []);
}

// ─── BlogEngagementBar — vote + bookmark + share for a blog ─────
function BlogEngagementBar({ blog, session, onLoginRequired, onOpenProfile }) {
  useReactionsTick();
  const intent = (kind, value) => {
    window.dispatchEvent(new CustomEvent("devblog:login-intent", { detail: { kind, blogSlug: blog.slug, value } }));
    onLoginRequired?.();
  };
  const myVote = getVote(blog.slug);
  const displayedRating = (blog.rating || 0) + myVote;
  const bookmarked = isBookmarked(blog.slug);
  const bookmarkCount = (blog.bookmarkCount || 0) + (bookmarked ? 1 : 0);

  const vote = (v) => session ? setVote(blog.slug, myVote === v ? 0 : v) : intent("vote", v);
  const toggleBookmark = () => session ? setBookmark(blog.slug, !bookmarked) : intent("bookmark");
  const [reporting, setReporting] = useState(false);
  const canReportBlog = session && session.role !== "admin" && session.handle !== blog.authorSlug;

  return (
    <>
    <div className="flex flex-wrap items-center gap-2.5">
      {/* Vote */}
      <div className="inline-flex items-center gap-0.5 border border-[var(--border)] rounded-lg p-0.5 bg-[var(--bg-secondary)]">
        <button
          type="button" onClick={() => vote(1)} aria-label="Полезно" aria-pressed={myVote === 1}
          className={`w-8 h-8 flex items-center justify-center rounded-md transition-colors ${myVote === 1 ? "text-[var(--success)]" : "text-[var(--muted-foreground)] hover:text-[var(--foreground)]"}`}
        >
          <svg viewBox="0 0 24 24" width="17" height="17" fill={myVote === 1 ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 11v8H4a1 1 0 0 1-1-1v-6a1 1 0 0 1 1-1zM7 11l4-7a2 2 0 0 1 2 2v3h5.5a2 2 0 0 1 2 2.3l-1.4 7A2 2 0 0 1 17 20H7"/></svg>
        </button>
        <span className={`text-[13px] font-semibold tabular-nums min-w-[2.2ch] text-center ${myVote ? "text-[var(--foreground)]" : "text-[var(--muted-foreground)]"}`}>
          {displayedRating > 0 ? `+${displayedRating}` : displayedRating}
        </span>
        <button
          type="button" onClick={() => vote(-1)} aria-label="Не полезно" aria-pressed={myVote === -1}
          className={`w-8 h-8 flex items-center justify-center rounded-md transition-colors ${myVote === -1 ? "text-[var(--danger)]" : "text-[var(--muted-foreground)] hover:text-[var(--foreground)]"}`}
        >
          <svg viewBox="0 0 24 24" width="17" height="17" fill={myVote === -1 ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 13V5h3a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1zM17 13l-4 7a2 2 0 0 1-2-2v-3H5.5a2 2 0 0 1-2-2.3l1.4-7A2 2 0 0 1 7 4h10"/></svg>
        </button>
      </div>

      {/* Bookmark */}
      <button
        type="button" onClick={toggleBookmark} aria-pressed={bookmarked}
        title={bookmarked ? "Убрать из закладок" : "В закладки"}
        className={`inline-flex items-center gap-1.5 h-9 px-3 rounded-lg border transition-colors text-[13px] font-medium ${bookmarked ? "border-[var(--accent)] text-[var(--accent)] bg-[color-mix(in_srgb,var(--accent)_8%,transparent)]" : "border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)] hover:text-[var(--foreground)]"}`}
      >
        <svg viewBox="0 0 24 24" width="16" height="16" fill={bookmarked ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span className="tabular-nums">{bookmarkCount}</span>
      </button>

      {/* Share */}
      <ShareMenu blog={blog} />

      {/* Report (icon + tooltip) */}
      {canReportBlog && (
        <button
          type="button"
          onClick={() => setReporting(true)}
          aria-label="Пожаловаться на блог"
          title="Пожаловаться на блог"

        >

        </button>

        onDone={() => { try { window.dispatchEvent(new CustomEvent("devblog:toast", { detail: { text: "Жалоба на блог отправлена модератору" } })); } catch (e) {} }}

// ─── ShareMenu — real clipboard copy + social links ────────────
function ShareMenu({ blog }) {
  const [open, setOpen] = useState(false);
  const [copied, setCopied] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);

  // Canonical-ish URL for this blog within the prototype.
  const url = `${location.origin}${location.pathname}?blog=${encodeURIComponent(blog.slug)}`;
  const title = blog.title || "Recenza";

  const copy = async () => {
    try {
      if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(url);
      else { const ta = document.createElement("textarea"); ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
      setCopied(true); setTimeout(() => setCopied(false), 1800);
    } catch { setCopied(false); }
  };
  const openShare = (href) => { window.open(href, "_blank", "noopener,noreferrer"); setOpen(false); };
  const socials = [
    { label: "Telegram", href: `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}` },
    { label: "ВКонтакте", href: `https://vk.com/share.php?url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}` },
    { label: "X", href: `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}` },
  ];

  return (
    <div className="relative" ref={ref}>
      <button
        type="button" onClick={() => setOpen(o => !o)} aria-expanded={open} aria-label="Поделиться"
        className="inline-flex items-center gap-1.5 h-9 px-3 rounded-lg border border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors text-[13px] font-medium"
      >
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span className="hidden sm:inline">Поделиться</span>
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-1.5 z-30 min-w-[190px] rounded-lg border border-[var(--border)] bg-[var(--bg-elevated)] py-1 shadow-lg">
          <button onClick={copy} className="w-full text-left px-3 py-2 text-[13px] flex items-center justify-between gap-2 text-[var(--foreground)] hover:bg-[var(--muted)]/50 transition-colors">
            {copied ? <span className="text-[var(--success)]">✓ Скопировано</span> : "Копировать ссылку"}
          </button>
          <div className="my-1 border-t border-[var(--border)]" />
          {socials.map(s => (
            <button key={s.label} onClick={() => openShare(s.href)} className="w-full text-left px-3 py-2 text-[13px] text-[var(--foreground)] hover:bg-[var(--muted)]/50 transition-colors">{s.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function FollowButton({ blogSlug, session, onLoginRequired, compact = false }) {
  // Guests can't subscribe yet — clicking takes them to login with an
  // intent to follow this series, and they're returned here afterwards.
  if (!session) {
    return (
      <button
        type="button"
        onClick={() => {
          window.dispatchEvent(new CustomEvent("devblog:follow-intent", { detail: { blogSlug } }));
          onLoginRequired?.();
        }}
        className={`inline-flex items-center gap-1.5 transition-colors whitespace-nowrap text-[var(--accent)] border border-[var(--accent)] hover:bg-[color-mix(in_srgb,var(--accent)_8%,transparent)] bg-transparent ${compact ? "min-h-[30px] rounded-md px-2 py-1 text-[11.5px]" : "h-9 rounded-lg px-3 text-[12.5px] font-medium"}`}
        title="Войдите — и мы вернём вас сюда, уже подписанными"
      >
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span className="hidden sm:inline">Войти и подписаться</span>
        <span className="sm:hidden">Подписаться</span>
      </button>
    );
  }
  const [following, setFollowing] = useState(() => isFollowed(blogSlug));
  useEffect(() => {
    const onChange = () => setFollowing(isFollowed(blogSlug));
    window.addEventListener("devblog:follows-changed", onChange);
    return () => window.removeEventListener("devblog:follows-changed", onChange);
  }, [blogSlug]);
  const toggle = (e) => {
    e?.stopPropagation?.();
    setFollow(blogSlug, !following);
  };
  return (
    <button
      type="button"
      onClick={toggle}
      className={`inline-flex items-center gap-1.5 transition-colors whitespace-nowrap ${compact ? "min-h-[30px] rounded-md px-2 py-1 text-[11.5px]" : "h-9 rounded-lg px-3 text-[12.5px] font-medium"} ${
        following
          ? "bg-[var(--bg-elevated)] border border-[var(--accent)] text-[var(--accent)]"
          : "bg-[var(--accent)] text-[var(--accent-foreground)] border border-[var(--accent)] hover:opacity-90"
      }`}
      title={following ? "Вы подписаны — новые главы появятся в ленте" : "Получать новые главы в ленте"}
    >
      <svg viewBox="0 0 24 24" width="12" height="12" fill={following ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      {following ? "Подписаны" : "Подписаться"}
