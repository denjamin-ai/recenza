  <!-- src/review/review-main.jsx (inlined from ui_kits/blog/src/review/review-main.jsx) -->
  <script type="text/babel">
// ReviewPage v2 — main entry. Wires up real data + Concept C UI.
// Exports window.ReviewPage (override).

const { useState, useEffect, useRef, useMemo, useCallback } = React;
const {
  InlineDiff, MermaidBlock, Bauble, ArticleBlock, ThreadCard,
  ThreadsRail, Composer, ReviewHeaderV2, Avatar, ActionBar,
  SelectionToolbar, TeamSheet, TONE, pickTone, wdiff,
} = window.__reviewV2;

function ReviewPage({ session, blogSlug, chapterSlug, onBack, onOpenAuthor, onOpenAdmin, onOpenProfile }) {
  const users = window.FAKE_DATA.users || {};

  // ─── Resolve blog + chapter ───────────────────────────────────
  // Modern signature: (blogSlug, chapterSlug). When chapterSlug is null,
  // pick the first in-flight chapter; otherwise the first chapter.
  // Falls back to the first blog that has an in-flight chapter, useful for
  // direct /review nav in demos.
  const D = window.__blogData;
  const blog =
       (blogSlug && D.getBlogBySlug(blogSlug))
    || (() => {
         const inFlight = D.getInFlightChapters()[0];
         return inFlight ? D.getBlogBySlug(inFlight.blogSlug) : null;
       })()
    || D.getBlogBySlug("next-16-boundary-patterns");

  if (!blog) {
    return <div className="p-10 text-[var(--muted-foreground)]" data-screen-label="ReviewPage">Нет данных ревью.</div>;
  }

  const resolvedChapter =
       (chapterSlug && blog.chapters.find(c => c.slug === chapterSlug))
    || blog.chapters.find(c => D.isChapterInFlight(c))
    || blog.chapters[0];

  if (!resolvedChapter) {
    return <div className="p-10 text-[var(--muted-foreground)]" data-screen-label="ReviewPage">Глава не найдена.</div>;
  }

  // Local switching between chapters of the SAME blog (no full re-route).
  const [activeChapterSlug, setActiveChapterSlug] = useState(resolvedChapter.slug);
  const chapter = blog.chapters.find(c => c.slug === activeChapterSlug) || resolvedChapter;

  // The rest of the component treats `chapter` as the canonical "article"
  // (the shapes are compatible because the auto-wrap mirrors article fields).
  const sourceArticle = { ...chapter, slug: blog.slug, authorSlug: blog.authorSlug, title: chapter.title };

  // ─── State ────────────────────────────────────────────────────
  // article/team/threads are re-seeded when active chapter changes.
  const [article, setArticle] = useState(() => structuredClone(sourceArticle));
  const [team, setTeam] = useState(() => {
    const eff = window.__blogData.effectiveChapterTeam
      ? window.__blogData.effectiveChapterTeam(sourceArticle, blog.slug)
      : window.__blogData.effectiveTeam(sourceArticle);
    return structuredClone({
      primaryHandle: eff.primaryHandle,
      reviewerHandles: eff.reviewerHandles,
      state: sourceArticle.state || {},
    });
  });
  // Threads are cross-pane synced through __reviewStore: every mutation is
  // broadcast under "blogSlug#chapterSlug", and incoming updates from other
  // panes (e.g. a parallel reviewer window) flow back into local state.
  const threadsKey = `${blog.slug}#${activeChapterSlug}`;
  const lastSentThreadsRef = useRef(null);
  const [threads, setThreadsLocal] = useState(() => {
    const stored = window.__reviewStore.get().chapterThreads?.[threadsKey];
    return stored ? structuredClone(stored) : structuredClone(sourceArticle.threads || []);
  });
  const setThreads = useCallback((updater) => {
    setThreadsLocal(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      lastSentThreadsRef.current = next;
      window.__reviewStore.update(s => ({
        chapterThreads: { ...(s.chapterThreads || {}), [threadsKey]: next },
      }));
      return next;
    });
  }, [threadsKey]);
  // Subscribe to external thread updates for the active chapter.
  useEffect(() => {
    return window.__reviewStore.subscribe(s => {
      const stored = s.chapterThreads?.[threadsKey];
      if (!stored || stored === lastSentThreadsRef.current) return;
      setThreadsLocal(stored);
    });
  }, [threadsKey]);

  // Re-seed local state when the user switches to a different chapter.
  useEffect(() => {
    setArticle(structuredClone(sourceArticle));
    const eff = window.__blogData.effectiveChapterTeam
      ? window.__blogData.effectiveChapterTeam(sourceArticle, blog.slug)
      : window.__blogData.effectiveTeam(sourceArticle);
    setTeam(structuredClone({
      primaryHandle: eff.primaryHandle,
      reviewerHandles: eff.reviewerHandles,
      state: sourceArticle.state || {},
    }));
    const stored = window.__reviewStore.get().chapterThreads?.[threadsKey];
    const seedThreads = stored ? structuredClone(stored) : structuredClone(sourceArticle.threads || []);
    lastSentThreadsRef.current = null;
    setThreadsLocal(seedThreads);
    setActiveThreadId(null);
    setSelection(null);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeChapterSlug]);

  // Primary-change requests from the shared store.
  const [pcRequests, setPcRequestsLocal] = useState(() => window.__reviewStore.get().pcRequests);
  useEffect(() => window.__reviewStore.subscribe(s => setPcRequestsLocal(s.pcRequests)), []);
  const setPcRequests = (next) => window.__reviewStore.update({
    pcRequests: typeof next === "function" ? next(window.__reviewStore.get().pcRequests) : next,
  });

  // POV — taken from session role / nav hint, default author.
  const [pov, setPov] = useState(() => {
    const hint = window.__nextReviewPov;
    delete window.__nextReviewPov;
    if (hint === "author") return "author";
    if (hint && team.reviewerHandles.includes(hint)) return hint;
    // Heuristic from session
    if (session?.handle === article.authorSlug) return "author";
    if (session?.handle && team.reviewerHandles.includes(session.handle)) return session.handle;
    return "author";
  });

  // UI state
  const [activeThreadId, setActiveThreadId] = useState(null);
  const [showResolved, setShowResolved] = useState(false);
  const [mobileTab, setMobileTab] = useState("article");          // article | threads
  const [openTeamMobile, setOpenTeamMobile] = useState(false);
  const [primaryChangeOpen, setPrimaryChangeOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [blockVerdicts, setBlockVerdicts] = useState({});  // blockId → 'approve' | 'fix' | 'discuss'
  const [editingBlockId, setEditingBlockId] = useState(null);
  const startEdit  = (id) => setEditingBlockId(id);
  const cancelEdit = ()    => setEditingBlockId(null);
  const saveEdit   = (id, text) => {
    const idx = chapter.blocks.findIndex(b => b.id === id);
    if (idx >= 0) {
      chapter.blocks[idx] = { ...chapter.blocks[idx], text };
      setArticle(a => ({ ...a, blocks: chapter.blocks.slice() }));
      setToast({ kind: "ok", text: "Блок обновлён." });
    }
    setEditingBlockId(null);
  };
  const cycleVerdict = (blockId) => {
    const order = [undefined, "approve", "fix", "discuss"];
    setBlockVerdicts(v => {
      const cur = v[blockId];
      const i = order.indexOf(cur);
      const next = order[(i + 1) % order.length];
      const out = { ...v };
      if (next === undefined) delete out[blockId];
      else out[blockId] = next;
      return out;
    });
  };
  // Reset stamps when switching chapters.
  useEffect(() => { setBlockVerdicts({}); }, [activeChapterSlug]);
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 5500);
    return () => clearTimeout(t);
  }, [toast]);

  // Selection (for floating toolbar)
  const articleRef = useRef(null);
  const rootRef    = useRef(null);
  const [selection, setSelection] = useState(null);
  useEffect(() => {
    function captureSelection(e) {
      // Ignore pointer/touch releases that land on the selection toolbar itself —
      // otherwise tapping «Прокомментировать» collapses the selection before the
      // click registers (the core mobile/virtual-keyboard bug).
      if (e?.target?.closest?.("[data-selection-toolbar]")) return;
      const sel = window.getSelection();
      const insideArticle = !!articleRef.current?.contains(e?.target);
      if (!sel || sel.isCollapsed) {
        // Collapsed selection. Only DROP a pending anchor if the user clicked
        // back inside the article prose (a deliberate deselect). A click into
        // the composer/rail to type the comment must NOT wipe the pending
        // anchor — otherwise the comment loses its target block and falls
        // through to the previously-active thread.
        if (insideArticle) setSelection(null);
        return;
      }
      const range = sel.getRangeAt(0);
      const node = range.startContainer.parentElement?.closest("[data-block-id]");
      if (!node || !articleRef.current?.contains(node)) { if (insideArticle) setSelection(null); return; }
      const blockId = node.dataset.blockId;
      const text = sel.toString();
      if (!text.trim()) { return; }
      const blk = article.blocks.find(b => b.id === blockId);
      if (!blk) { return; }
      const rect = range.getBoundingClientRect();
      setSelection({ blockId, quote: text, rect });
      // A fresh selection begins a NEW comment — release any active thread so
      // the composer unambiguously targets the new anchor. Without this the
      // post landed in the previously-selected thread ("тред не отжимается").
      setActiveThreadId(null);
    }
    document.addEventListener("mouseup", captureSelection);
    document.addEventListener("touchend", captureSelection);
    return () => {
      document.removeEventListener("mouseup", captureSelection);
      document.removeEventListener("touchend", captureSelection);
    };
  }, [article]);

  // Esc releases any pending selection and active thread (clean reset).
  useEffect(() => {
    const onKey = (e) => {
      if (e.key !== "Escape") return;
      setSelection(null);
      setActiveThreadId(null);
      window.getSelection()?.removeAllRanges();
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);

  // ─── Derived ──────────────────────────────────────────────────
  const prevById = useMemo(() => {
    const m = {};
    for (const p of (article.prevBlocks || [])) m[p.id] = p;
    return m;
  }, [article]);

  const threadsByBlock = useMemo(() => {
    const m = {};
    for (const t of threads) (m[t.blockId] ||= []).push(t);
    return m;
  }, [threads]);

  const visibleThreads = useMemo(() => {
    return showResolved ? threads : threads.filter(t => t.status === "open");
  }, [threads, showResolved]);

  const activeThread  = threads.find(t => t.id === activeThreadId);
  const activeBlockId = activeThread?.blockId;

  // ─── Block / thread sync ──────────────────────────────────────
  const flashBlock = (blockId) => {
    const el = articleRef.current?.querySelector(`[data-block-id="${blockId}"]`);
    if (!el) return;
    el.classList.remove("blog-fragment-flash");
    void el.offsetWidth;
    el.classList.add("blog-fragment-flash");
    el.scrollIntoView({ block: "center", behavior: "smooth" });
  };
  const pickThread = (t) => {
    // Clicking the already-active thread again releases it.
    if (activeThreadId === t.id && !selection) { setActiveThreadId(null); return; }
    setSelection(null);            // thread ↔ selection are mutually exclusive
    setActiveThreadId(t.id);
    setMobileTab("article");
    setTimeout(() => flashBlock(t.blockId), 60);
  };
  const pickBauble = (blockId) => {
    const blockThreads = threadsByBlock[blockId] || [];
    if (blockThreads.length === 0) return;
    // If the block has ANY resolved thread, surface them in the rail
    // pre-emptively (so the user can see history immediately, even before
    // the active card is determined).
    const hasResolved = blockThreads.some(t => t.status === "resolved");
    if (hasResolved) setShowResolved(true);
    // Prefer an open thread; fall back to the most recently resolved one so
    // green baubles still surface their history.
    const target = blockThreads.find(t => t.status === "open") || blockThreads[blockThreads.length - 1];
    setActiveThreadId(target.id);
    setMobileTab("threads");
    // Also flash + scroll the block — symmetric with the thread→block path.
    setTimeout(() => flashBlock(blockId), 60);
  };

  // ─── Thread mutations ─────────────────────────────────────────
  const postComment = (text, opts = {}) => {
    if (!selection && !activeThread) return;
    if (selection) {
      const isSuggest = !!opts.suggest;
      const newThread = {
        id: `t-${Date.now()}`,
        blockId: selection.blockId,
        anchor: selection.quote,
        status: "open",
        from: pov === "author" ? article.authorSlug : pov,
        text: isSuggest ? "Предложена правка фрагмента." : text,
        replies: [],
        ...(isSuggest ? { suggestion: { from: selection.quote, to: text } } : {}),
      };
      setThreads(arr => [...arr, newThread]);
      setActiveThreadId(newThread.id);
      setSelection(null);
      window.getSelection()?.removeAllRanges();
    } else if (activeThread) {
      setThreads(arr => arr.map(t => t.id === activeThread.id
        ? { ...t, replies: [...(t.replies || []), { from: pov === "author" ? article.authorSlug : pov, text }] }
        : t));
    }
  };
  const applyAndClose = (t) => {
    // If the thread carries a suggestion, mutate the target block's text by
    // replacing suggestion.from with suggestion.to. Author-only action;
    // reviewer's "отметить решённым" path leaves text alone.
    if (t.suggestion && t.suggestion.from && pov === "author") {
      const fromStr = String(t.suggestion.from);
      const toStr   = String(t.suggestion.to || "");
      const idx = chapter.blocks.findIndex(b => b.id === t.blockId);
      if (idx >= 0) {
        const blk = chapter.blocks[idx];
        const curText = blk.text || "";
        const next = curText.includes(fromStr)
          ? curText.replace(fromStr, toStr)
          : curText; // fallback: no exact match (anchor drifted) — leave text
        chapter.blocks[idx] = { ...blk, text: next };
        setArticle(a => ({ ...a, blocks: chapter.blocks.slice() }));
      }
      setToast({ kind: "ok", text: "Правка применена, тред закрыт." });
    } else {
      setToast({ kind: "ok", text: "Тред отмечен решённым." });
    }
    setThreads(arr => arr.map(x => x.id === t.id ? { ...x, status: "resolved" } : x));
    if (activeThreadId === t.id) setActiveThreadId(null);
  };

  // ─── Verdict actions ──────────────────────────────────────────
  const setMyVerdict = (verdict) => {
    const at = Math.floor(Date.now() / 1000);
    // Persist to the canonical chapter object so other screens (inbox, author
    // detail, admin queue) reflect it, then broadcast.
    if (chapter) {
      chapter.state = { ...(chapter.state || {}), [pov]: { ...(chapter.state?.[pov] || {}), verdict, verdictAt: at } };
      // A chapter where every reviewer approved is "ready"; flip the author's
      // turn flag off. If anyone requested changes, it's the author's turn.
      const team0 = window.__blogData.effectiveChapterTeam ? window.__blogData.effectiveChapterTeam(chapter, blog?.slug) : { reviewerHandles: chapter.reviewerHandles || [] };
      const handles = team0.reviewerHandles || chapter.reviewerHandles || [];
      const verdicts = handles.map(h => chapter.state?.[h]?.verdict);
      if (verdict === "request-changes") chapter.hasMyTurn = true;
      else if (handles.length && verdicts.every(v => v === "approve")) chapter.hasMyTurn = false;
    }
    setTeam(t => ({ ...t, state: { ...t.state, [pov]: { ...t.state[pov], verdict, verdictAt: at } } }));
    window.__reviewStore.update({}); // broadcast → inbox / author / admin
  };
  const submitRevision = () => {
    // Local-only mutation: bump revision number, flip status back to under-review,
    // clear verdicts. In production this would be a server roundtrip with a
    // new threads pane and a fresh prev-blocks snapshot.
    chapter.revision = {
      ...(chapter.revision || {}),
      number: (chapter.revision?.number || 1) + 1,
      status: "under-review",
      submittedAt: Math.floor(Date.now() / 1000),
    };
    chapter.state = {};
    for (const h of team.reviewerHandles) chapter.state[h] = { verdict: null, verdictAt: null };
    setTeam(t => {
      const cleared = {};
      for (const h of t.reviewerHandles) cleared[h] = { ...t.state[h], verdict: null, verdictAt: null };
      return { ...t, state: cleared };
    });
    setArticle(a => ({ ...a, revision: { ...chapter.revision } }));
    window.__reviewStore.update({}); // broadcast for inbox/admin
    setToast({ kind: "ok", text: `Отправлено как ревизия v${chapter.revision.number}. Ревьюеры получили уведомление.` });
  };
  const publish = () => {
    // Real mutation — flips chapter to "published" so it disappears from
    // in-flight queues and the public reader shows it in "Весь блог" mode.
    chapter.revision = {
      ...(chapter.revision || {}),
      status: "published",
      publishedAt: Math.floor(Date.now() / 1000),
    };
    setArticle(a => ({ ...a, revision: { ...chapter.revision } }));
    window.__reviewStore.update({}); // broadcast → inbox + admin queue refresh
    setToast({ kind: "ok", text: `Глава «${chapter.title}» опубликована.`, action: () => onBack?.() });
  };
  const requestPrimaryChange = (proposed, reason) => {
    setPcRequests(r => [...r, {
      id: `pc-${Date.now()}`,
      articleSlug: article.slug,
      revisionNumber: article.revision?.number || 1,
      currentPrimary: team.primaryHandle,
      proposedPrimary: proposed,
      requestedBy: pov === "author" ? article.authorSlug : pov,
      requestedAt: Math.floor(Date.now()/1000),
      status: "pending",
      reason,
    }]);
    setPrimaryChangeOpen(false);
  };

  // ─── Anchor preview for composer ──────────────────────────────
  const anchorPreview = selection
    ? `«${(selection.quote || "").slice(0, 40)}${(selection.quote || "").length > 40 ? "…" : ""}»`
    : activeThread
    ? `тред @${activeThread.from} · «${(activeThread.anchor || "").slice(0, 30)}…»`
    : null;

  // ─── Render ───────────────────────────────────────────────────
  const PrimaryChangeModal = window.PrimaryChangeModal;

  return (
    <div ref={rootRef} className="relative flex flex-col h-[calc(100vh-56px)] bg-[var(--background)] text-[var(--foreground)] overflow-hidden" data-screen-label="ReviewPage">
      <ReviewHeaderV2
        article={article}
        blog={blog}
        chapter={chapter}
        activeChapterSlug={activeChapterSlug}
        onSwitchChapter={setActiveChapterSlug}
        onOpenWholeBlog={() => { onBack?.(); /* simplified: caller can re-route */ }}
        team={team}
        users={users}
        pov={pov}
        setPov={setPov}
        onBack={onBack}
        onOpenAuthor={onOpenAuthor}
        onOpenAdmin={onOpenAdmin}
        openTeamMobile={openTeamMobile}
        setOpenTeamMobile={setOpenTeamMobile}
      />

      {/* Mobile tabs */}
      <div className="md:hidden flex border-b border-[var(--border)] text-[12.5px]">
        <button
          type="button"
          onClick={() => setMobileTab("article")}
          className={`flex-1 py-2.5 min-h-[44px] ${mobileTab === "article" ? "font-semibold text-[var(--accent)] border-b-2 border-[var(--accent)] -mb-px" : "text-[var(--muted-foreground)]"}`}
        >Статья</button>
        <button
          type="button"
          onClick={() => setMobileTab("threads")}
          className={`flex-1 py-2.5 min-h-[44px] ${mobileTab === "threads" ? "font-semibold text-[var(--accent)] border-b-2 border-[var(--accent)] -mb-px" : "text-[var(--muted-foreground)]"}`}
        >Обсуждения <span className="text-[var(--accent)] font-semibold">{threads.filter(t => t.status === "open").length}</span></button>
      </div>

      {/* Main grid */}
      <div className="flex-1 grid md:grid-cols-[minmax(0,1fr)_minmax(360px,420px)] min-h-0 relative">
        {/* Article column */}
        <div
          ref={articleRef}
          className={`overflow-y-auto px-4 sm:px-6 py-6 bg-[var(--background)] relative ${mobileTab === "article" ? "" : "hidden md:block"}`}
        >
          <article className="max-w-[720px] mx-auto">
            {/* Article meta */}
            <div className="flex items-center gap-2 text-[12px] text-[var(--muted-foreground)] mb-4 flex-wrap">
              <Avatar handle={article.authorSlug} name={users[article.authorSlug]?.name} size={20} />
              <span>{users[article.authorSlug]?.name || article.authorSlug}</span>
              <span>·</span>
              <span>ревизия {article.revision?.number || 1}</span>
              {article.revision?.deadline && <><span>·</span><span>срок: {new Date(article.revision.deadline * 1000).toLocaleDateString("ru-RU", { day: "numeric", month: "long" })}</span></>}
            </div>

            {/* Revision changelog */}
            {article.revision?.summary && (
              <div className="mb-6 rounded-md border border-[var(--border)] bg-[var(--bg-elevated)] p-3">
                <p className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">Что нового в v{article.revision.number}</p>
                <p className="text-[13px] leading-relaxed">{article.revision.summary}</p>
              </div>
            )}

            {/* Blocks with right-edge baubles */}
            <div className="flex flex-col gap-0">
              {article.blocks.map(b => (
                <ArticleBlock
                  key={b.id}
                  block={b}
                  prev={prevById[b.id]}
                  threads={threadsByBlock[b.id] || []}
                  active={activeBlockId === b.id}
                  isSelected={selection?.blockId === b.id}
                  onClickBauble={() => pickBauble(b.id)}
                  verdict={blockVerdicts[b.id]}
                  onCycleVerdict={() => cycleVerdict(b.id)}
                  canStamp={pov !== "author"}
                  canEdit={pov === "author"}
                  isEditing={editingBlockId === b.id}
                  onStartEdit={startEdit}
                  onSaveEdit={saveEdit}
                  onCancelEdit={cancelEdit}
                />
              ))}
            </div>
          </article>

          {/* Selection toolbar — fixed-positioned so it follows the cursor
              regardless of the article column's scroll offset. */}
          <SelectionToolbar
            selection={selection}
            onComment={() => setMobileTab("threads")}
          />
        </div>

        {/* Threads rail */}
        <div className={`min-h-0 ${mobileTab === "threads" ? "flex" : "hidden md:flex"} flex-col`}>
          <ThreadsRail
            threads={threads}
            users={users}
            pov={pov}
            activeThreadId={activeThreadId}
            onPickThread={pickThread}
            showResolved={showResolved}
            setShowResolved={setShowResolved}
            onApply={applyAndClose}
            anchorPreview={anchorPreview}
            suggestFrom={selection ? selection.quote : null}
            onPost={postComment}
          />
        </div>
      </div>

      {/* Bottom action bar (role-aware) */}
      <ActionBar
        pov={pov}
        team={team}
        article={article}
        threads={threads}
        onApprove={setMyVerdict.bind(null, "approve")}
        onRequestChanges={setMyVerdict.bind(null, "request-changes")}
        onSubmitRevision={submitRevision}
        onPublish={publish}
        onRequestPrimaryChange={() => setPrimaryChangeOpen(true)}
      />

      {/* Mobile team sheet */}
      {openTeamMobile && (
        <TeamSheet
          team={team}
          users={users}
          pov={pov}
          onClose={() => setOpenTeamMobile(false)}
          onRequestPrimaryChange={() => { setOpenTeamMobile(false); setPrimaryChangeOpen(true); }}
        />
      )}

      {/* Primary-change modal (reused from legacy) */}
      {primaryChangeOpen && PrimaryChangeModal && (
        <PrimaryChangeModal
          team={team}
          users={users}
          onClose={() => setPrimaryChangeOpen(false)}
          onSubmit={requestPrimaryChange}
        />
      )}

      {/* Toast (success / publish notice) — aria-live so screen readers announce */}
      {toast && (
        <div role="status" aria-live="polite" className="fixed bottom-4 right-4 z-50 max-w-sm rounded-lg border border-[var(--border)] bg-[var(--bg-elevated)] p-4 flex flex-col gap-2">
          <p className="text-[13.5px] font-medium leading-snug">✓ {toast.text}</p>
          <div className="flex items-center justify-end gap-3">
            {toast.action && (
              <button type="button" onClick={() => { toast.action(); setToast(null); }} className="text-[12px] font-medium text-[var(--accent)] hover:underline">К списку →</button>
            )}
            <button type="button" onClick={() => setToast(null)} className="text-[12px] text-[var(--muted-foreground)] hover:text-[var(--foreground)]">закрыть</button>
          </div>
        </div>
      )}
    </div>
  );
}

window.ReviewPage = ReviewPage;

  </script>

  <!-- src/growth/reviewer-board.jsx (inlined from ui_kits/blog/src/growth/reviewer-board.jsx) -->
  <script type="text/babel">
// reviewer-board.jsx — public "we're looking for reviewers" board.
// Admin-curated open calls (window.__reviewerFlow.boardCalls). Reachable from
// the feed banner ("Стать ревьюером") for everyone. Every CTA is wired:
//  • «Откликнуться» / «Стать ревьюером» → ApplyModal (submits an application
//    that lands in the admin «Запросы ревьюеров» screen)
//  • «Как это работает» → HowItWorksModal
// Overrides window.ReviewerBoardScreen.
const { useState, useEffect } = React;

function BoardSkill({ label, active, onClick }) {
  const base = "inline-flex items-center rounded-full border text-[11.5px] px-2.5 py-0.5 whitespace-nowrap transition-colors";
  if (onClick) {
    return <button type="button" onClick={onClick} className={`${base} ${active ? "border-[var(--accent)] text-[var(--accent)] bg-[color-mix(in_srgb,var(--accent)_10%,transparent)]" : "border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)] hover:border-[var(--foreground)]/30"}`}>{label}</button>;
  }
  return <span className={`${base} border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)]`}>{label}</span>;
}

function RbIcon({ d, w = 15, sw = 1.8 }) {
  return <svg viewBox="0 0 24 24" width={w} height={w} fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
}

function BoardCallCard({ c, onRespond }) {
  return (
    <div className="rounded-xl border border-[var(--border)] bg-[var(--bg-elevated)] p-5 flex flex-col gap-3 hover:border-[color-mix(in_srgb,var(--foreground)_18%,transparent)] transition-colors">
      <div className="flex items-start justify-between gap-3">
        <h3 className="font-[var(--font-display)] font-bold text-[17px] leading-snug tracking-tight">{c.area}</h3>
        {c.hot && <span className="shrink-0 text-[10px] uppercase tracking-wider font-semibold text-[var(--accent)] bg-[color-mix(in_srgb,var(--accent)_12%,transparent)] border border-[color-mix(in_srgb,var(--accent)_30%,transparent)] rounded-full px-2 py-0.5">срочно</span>}
      </div>
      <div className="flex items-center gap-1.5 flex-wrap">{(c.skills || []).map(s => <BoardSkill key={s} label={s} />)}</div>
      <p className="text-[12.5px] text-[var(--muted-foreground)] leading-relaxed flex-1">{c.note}</p>
      <div className="flex items-center justify-between gap-3 pt-3 border-t border-[var(--border)]">
        <span className="text-[12px] text-[var(--muted-foreground)] tabular-nums inline-flex items-center gap-1.5"><RbIcon d={<><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></>} w={13} />{c.waiting} {c.waiting === 1 ? "глава ждёт" : "главы ждут"}</span>
        <button onClick={() => onRespond(c)} className="inline-flex items-center gap-1.5 rounded-lg text-[12px] px-3.5 py-1.5 font-semibold bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)] transition-colors">Откликнуться</button>
      </div>
    </div>
  );
}

// ── Apply-to-review modal ──────────────────────────────────────────────
function ApplyModal({ session, area, onClose }) {
  const presetSkills = area?.skills || [];
  const [skills, setSkills] = useState(presetSkills);
  const [input, setInput] = useState("");
  const [msg, setMsg] = useState("");
  const [sent, setSent] = useState(false);
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  const addSkill = (s) => { s = s.trim(); if (s && !skills.includes(s)) setSkills([...skills, s]); setInput(""); };
  const submit = () => {
    window.__reviewerFlow?.apply({
      area: area?.area || "Общая заявка", skills: [...skills], message: msg.trim(),
      by: session?.handle || null, name: session?.name || "",
    });
    setSent(true);
  };
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: "color-mix(in srgb, var(--foreground) 38%, transparent)" }} onClick={onClose} role="dialog" aria-modal="true">
      <div onClick={e => e.stopPropagation()} className="rounded-2xl border border-[var(--border)] bg-[var(--bg-elevated)] overflow-hidden w-full max-w-[460px]" style={{ boxShadow: "0 16px 48px rgba(0,0,0,0.22)" }}>
        <div className="px-6 pt-5 pb-4 flex items-start justify-between gap-3 border-b border-[var(--border)]">
          <div>
            <h2 className="font-[var(--font-display)] font-bold text-[19px] tracking-tight leading-tight">{sent ? "Заявка отправлена" : "Стать ревьюером"}</h2>
            <p className="text-[12px] text-[var(--muted-foreground)] mt-1">{area ? `Направление: ${area.area}` : "Укажите свои навыки — администратор рассмотрит заявку"}</p>
          </div>
          <button onClick={onClose} aria-label="Закрыть" className="w-7 h-7 rounded-full inline-flex items-center justify-center text-[var(--muted-foreground)] hover:bg-[var(--muted)] shrink-0"><RbIcon d={<path d="M6 6l12 12M18 6L6 18" />} w={15} /></button>
        </div>
        {sent ? (
          <div className="px-6 py-7 text-center">
            <span className="w-12 h-12 rounded-full inline-flex items-center justify-center mb-3 bg-[var(--success-bg)] text-[var(--success)]"><RbIcon d={<path d="M5 12.5l4.5 4.5L19 6.5" />} w={24} sw={2.4} /></span>
            <p className="text-[14px] leading-relaxed text-[var(--foreground)] max-w-xs mx-auto mb-1">Спасибо! Заявка ушла администратору.</p>
            <p className="text-[12.5px] text-[var(--muted-foreground)] leading-relaxed max-w-xs mx-auto mb-5">Мы свяжемся с вами и подключим к ревью по вашим навыкам.</p>
            <button onClick={onClose} className="text-[13px] px-4 py-2 rounded-lg font-medium bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)]">Готово</button>
          </div>
        ) : (
          <>
            <div className="px-6 py-5 flex flex-col gap-4">
              <div>
                <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">Ваши навыки</label>
                <div className="flex items-center gap-1.5 flex-wrap rounded-lg border border-[var(--border)] bg-[var(--background)] p-2 min-h-[42px]">
                  {skills.map(s => (
                    <span key={s} className="inline-flex items-center gap-1.5 rounded-full text-[11.5px] px-2 py-0.5 font-medium" style={{ background: "color-mix(in srgb,var(--accent) 12%,transparent)", color: "var(--accent)" }}>
                      {s}<button onClick={() => setSkills(skills.filter(x => x !== s))} className="hover:opacity-60">×</button>
                    </span>
                  ))}
                  <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addSkill(input); } else if (e.key === "Backspace" && !input && skills.length) setSkills(skills.slice(0, -1)); }} placeholder={skills.length ? "" : "React, Go, Postgres…"} className="flex-1 min-w-[90px] bg-transparent text-[12.5px] focus:outline-none py-0.5" />
                </div>
              </div>
              <div>
                <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">О себе <span className="normal-case font-normal text-[var(--muted-foreground)]">(необязательно)</span></label>
                <textarea value={msg} onChange={e => setMsg(e.target.value)} rows={3} placeholder="Опыт, ссылки на работы, чем хотите помочь…" className="w-full rounded-lg border border-[var(--border)] bg-[var(--background)] px-3 py-2 text-[13px] leading-relaxed focus:outline-none focus:border-[var(--accent)] resize-none" />
              </div>
            </div>
            <div className="px-6 py-4 border-t border-[var(--border)] flex items-center justify-end gap-2">
              <button onClick={onClose} className="px-3 py-2 rounded-lg text-[12.5px] text-[var(--muted-foreground)] hover:text-[var(--foreground)]">Отмена</button>
              <button onClick={submit} disabled={skills.length === 0} className="px-4 py-2 rounded-lg text-[12.5px] font-medium bg-[var(--accent)] text-[var(--accent-foreground)] disabled:opacity-50 hover:bg-[var(--accent-hover)]">Отправить заявку</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── How-it-works modal ──────────────────────────────────────────────────
function HowItWorksModal({ onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, []);
  const steps = [
    { n: "1", t: "Оставьте заявку", d: "Укажите навыки — по ним система предлагает вас авторам подходящих статей." },
    { n: "2", t: "Принимайте приглашения", d: "В кабинете ревьюера видно входящие главы. Соглашайтесь или отклоняйте — автор узнаёт сразу." },
    { n: "3", t: "Рецензируйте и получайте оценку", d: "После публикации автор оценивает вашу работу 1–5 звёздами. Рейтинг влияет на то, как часто вас предлагают." },
  ];
  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: "color-mix(in srgb, var(--foreground) 38%, transparent)" }} onClick={onClose} role="dialog" aria-modal="true">
      <div onClick={e => e.stopPropagation()} className="rounded-2xl border border-[var(--border)] bg-[var(--bg-elevated)] overflow-hidden w-full max-w-[440px]" style={{ boxShadow: "0 16px 48px rgba(0,0,0,0.22)" }}>
        <div className="px-6 pt-5 pb-4 flex items-start justify-between gap-3 border-b border-[var(--border)]">
          <h2 className="font-[var(--font-display)] font-bold text-[19px] tracking-tight leading-tight">Как это работает</h2>
          <button onClick={onClose} aria-label="Закрыть" className="w-7 h-7 rounded-full inline-flex items-center justify-center text-[var(--muted-foreground)] hover:bg-[var(--muted)] shrink-0"><RbIcon d={<path d="M6 6l12 12M18 6L6 18" />} w={15} /></button>
        </div>
        <div className="px-6 py-5 flex flex-col gap-4">
          {steps.map(s => (
            <div key={s.n} className="flex gap-3.5">
              <span className="shrink-0 w-8 h-8 rounded-full bg-[color-mix(in_srgb,var(--accent)_12%,transparent)] text-[var(--accent)] font-[var(--font-display)] font-bold inline-flex items-center justify-center">{s.n}</span>
              <div>
                <p className="text-[14px] font-semibold leading-tight mb-1">{s.t}</p>
                <p className="text-[12.5px] text-[var(--muted-foreground)] leading-relaxed">{s.d}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ReviewerBoardScreen({ session, onBack }) {
  const [, setTick] = useState(0);
  useEffect(() => window.__reviewerFlow?.subscribe(() => setTick(t => t + 1)), []);
  const [apply, setApply] = useState(null);    // null | { area } | {}
  const [how, setHow] = useState(false);
  const [filter, setFilter] = useState(null);  // active skill filter
  const calls = window.__reviewerFlow?.boardCalls || [];
  const totalWaiting = calls.reduce((s, c) => s + (c.waiting || 0), 0);
  const allSkills = [...new Set(calls.flatMap(c => c.skills || []))];
  const shown = filter ? calls.filter(c => (c.skills || []).includes(filter)) : calls;

  return (
    <div className="min-h-full" data-screen-label="ReviewerBoard">
      {/* Top bar — left-aligned back, full width, divider */}
      <div className="border-b border-[var(--border)]">
        <div className="max-w-5xl mx-auto px-4 sm:px-8 py-3.5">
          <button onClick={onBack} className="inline-flex items-center gap-1.5 text-[13px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors min-h-[40px] -ml-1 px-1">
            <RbIcon d={<><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 18 5 12 11 6"/></>} w={15} />
            К блогам
          </button>
        </div>
      </div>

      {/* Hero */}
      <div className="border-b border-[var(--border)]">
        <div className="px-4 sm:px-8 pt-10 pb-11 text-center max-w-3xl mx-auto">
          <p className="inline-flex items-center gap-2 text-[12px] uppercase tracking-[0.16em] font-semibold text-[var(--accent)] mb-4">
            <span className="h-px w-6 bg-[color-mix(in_srgb,var(--accent)_45%,transparent)]" />
            Ищем ревьюеров
            <span className="h-px w-6 bg-[color-mix(in_srgb,var(--accent)_45%,transparent)]" />
          </p>
          <h1 className="font-[var(--font-display)] font-extrabold text-3xl sm:text-5xl leading-[1.08] tracking-tight max-w-2xl mx-auto mb-4">Помогите авторам выпускать качественные статьи</h1>
          <p className="text-[15px] text-[var(--muted-foreground)] leading-relaxed max-w-xl mx-auto mb-7">Каждая статья проходит ревью перед публикацией. Мы ищем специалистов по направлениям ниже — выберите своё и подключайтесь.</p>
          <div className="flex items-center justify-center gap-3 flex-wrap">
            <button onClick={() => setApply({})} className="inline-flex items-center gap-2 rounded-lg text-[13.5px] px-5 py-2.5 font-semibold whitespace-nowrap bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)] transition-colors">
              <RbIcon d={<><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></>} w={15} sw={2} />Стать ревьюером
            </button>
            <button onClick={() => setHow(true)} className="inline-flex items-center gap-2 rounded-lg text-[13.5px] px-5 py-2.5 font-medium whitespace-nowrap bg-[var(--bg-elevated)] text-[var(--foreground)] border border-[var(--border)] hover:border-[var(--foreground)]/30 transition-colors">
              <RbIcon d={<><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></>} w={15} />Как это работает
            </button>
          </div>
          <div className="flex items-center justify-center gap-8 sm:gap-12 mt-10">
            {[[calls.length, "открытых направлений"], [totalWaiting, "глав ждут ревью"], ["1–5", "звёзд — оценка авторов"]].map(([n, l], i) => (
              <div key={i} className="text-center">
                <p className="font-[var(--font-display)] font-extrabold text-2xl sm:text-[26px] tabular-nums leading-none text-[var(--accent)]">{n}</p>
                <p className="text-[11.5px] text-[var(--muted-foreground)] mt-1.5 max-w-[110px]">{l}</p>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Calls */}
      <div className="px-4 sm:px-8 py-9 max-w-5xl mx-auto">
        <div className="flex items-baseline justify-between gap-3 mb-4">
          <h2 className="font-[var(--font-display)] font-bold text-xl tracking-tight">Открытые направления</h2>
          <span className="text-[12px] text-[var(--muted-foreground)] shrink-0">Список ведёт редакция</span>
        </div>
        {allSkills.length > 0 && (
          <div className="flex items-center gap-1.5 flex-wrap mb-5">
            <BoardSkill label="Все" active={!filter} onClick={() => setFilter(null)} />
            {allSkills.map(s => <BoardSkill key={s} label={s} active={filter === s} onClick={() => setFilter(filter === s ? null : s)} />)}
          </div>
        )}
        {shown.length === 0 ? (
          <p className="text-[14px] text-[var(--muted-foreground)] py-12 text-center border border-dashed border-[var(--border)] rounded-lg">{calls.length === 0 ? "Открытых направлений сейчас нет." : "Нет направлений по этому навыку."}</p>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {shown.map(c => <BoardCallCard key={c.id} c={c} onRespond={(area) => setApply({ area })} />)}
          </div>
        )}
      </div>

      {apply && <ApplyModal session={session} area={apply.area} onClose={() => setApply(null)} />}
      {how && <HowItWorksModal onClose={() => setHow(false)} />}
    </div>
  );
}

window.ReviewerBoardScreen = ReviewerBoardScreen;
  </script>

  <!-- src/growth/donation-ui.jsx (inlined from ui_kits/blog/src/growth/donation-ui.jsx) -->
  <script type="text/babel">

// ── shared svg atoms ───────────────────────────────────────────────────
function DnIcon({ name, w = 16, fill = "none", sw = 1.8 }) {

    x: <path d="M6 6l12 12M18 6L6 18" />,
    eye: <><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" /><circle cx="12" cy="12" r="3" /></>,
    eyeOff: <><path d="M3 3l18 18" /><path d="M10.6 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a18 18 0 0 1-3.2 4M6.6 6.6A18 18 0 0 0 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.2-.8" /><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2" /></>,
    plus: <path d="M12 5v14M5 12h14" />,
    link: <><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5" /><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5" /></>,
    grid: <><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></>,
    drag: <><circle cx="9" cy="6" r="1" /><circle cx="15" cy="6" r="1" /><circle cx="9" cy="12" r="1" /><circle cx="15" cy="12" r="1" /><circle cx="9" cy="18" r="1" /><circle cx="15" cy="18" r="1" /></>,
    upload: <><path d="M12 16V4M7 9l5-5 5 5" /><path d="M4 20h16" /></>,
    check: <path d="M5 12.5l4.5 4.5L19 6.5" />,
    scan: <><path d="M4 7V5a1 1 0 0 1 1-1h2M17 4h2a1 1 0 0 1 1 1v2M20 17v2a1 1 0 0 1-1 1h-2M7 20H5a1 1 0 0 1-1-1v-2" /><path d="M4 12h16" /></>,
    trash: <><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6" /></>,
    chevL: <path d="M15 6l-6 6 6 6" />,

  };
  return <svg viewBox="0 0 24 24" width={w} height={w} fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{P[name]}</svg>;
}

function DnToggle({ on, onChange }) {
  return (
    <button type="button" onClick={() => onChange(!on)} className="inline-flex items-center shrink-0 rounded-full transition-colors" style={{ width: 38, height: 22, padding: 2, background: on ? "var(--accent)" : "var(--border)" }}>
      <span className="rounded-full bg-white transition-transform" style={{ width: 18, height: 18, transform: on ? "translateX(16px)" : "translateX(0)" }} />
    </button>
  );
}

// Coarse QR placeholder (admin uploads the real image in production).
function DnQR({ size = 132 }) {
  const N = 11, cell = size / N;
  const on = (r, c) => {
    const corner = (r < 3 && c < 3) || (r < 3 && c > N - 4) || (r > N - 4 && c < 3);
    if (corner) return r === 0 || r === 2 || c === 0 || c === 2 || (r === 1 && c === 1) || r === N - 1 || c === N - 1;
    return (r * 7 + c * 13 + r * c) % 3 === 0;
  };
  return (
    <div className="rounded-xl bg-white p-3 inline-block border border-[var(--border)]">
      <div style={{ width: size, height: size, display: "grid", gridTemplateColumns: `repeat(${N}, 1fr)` }}>
        {Array.from({ length: N * N }, (_, i) => {
          const r = Math.floor(i / N), c = i % N;
          return <span key={i} style={{ width: cell, height: cell, background: on(r, c) ? "#111" : "transparent" }} />;
        })}
      </div>
    </div>
  );
}

function useStoreTick(store) {
  const [, set] = useState(0);
  useEffect(() => store?.subscribe(() => set(n => n + 1)), [store]);
}

          </button>

function FeedBannerCarousel({ onNavigate }) {
  useStoreTick(window.__banners);
  const [i, setI] = useState(0);
  const [modal, setModal] = useState(false);
  const items = (window.__banners?.visibleItems() || []).filter(b => b.action !== "donate" || window.__donations?.isEnabled());
  const n = items.length;
  useEffect(() => { if (i >= n && n > 0) setI(0); }, [n]);
  useEffect(() => {
    if (n <= 1) return;
    const t = setInterval(() => setI(p => (p + 1) % n), 5000);
    return () => clearInterval(t);
  }, [n]);
  if (n === 0) return null;
  const fire = (b) => {
    if (b.action === "donate") setModal(true);
    else if (b.action === "external") window.open(b.target, "_blank", "noopener");
    else onNavigate?.(b.target || "board");
  };
  return (
    <div className="relative mb-8" data-screen-label="FeedBanners">
      <div className="relative" style={{ height: 144 }}>
        {items.map((b, idx) => (
          <div key={b.id} className="absolute inset-0 transition-opacity duration-500" style={{ opacity: i === idx ? 1 : 0, pointerEvents: i === idx ? "auto" : "none" }}>
            <BannerSlide b={b} onCta={() => fire(b)} />
          </div>
        ))}
        {n > 1 && <>
          <button onClick={() => setI(p => (p - 1 + n) % n)} aria-label="Назад" className="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-[var(--bg-elevated)]/85 border border-[var(--border)] inline-flex items-center justify-center text-[var(--muted-foreground)] hover:text-[var(--foreground)]"><DnIcon name="chevL" w={15} /></button>
          <button onClick={() => setI(p => (p + 1) % n)} aria-label="Вперёд" className="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-[var(--bg-elevated)]/85 border border-[var(--border)] inline-flex items-center justify-center text-[var(--muted-foreground)] hover:text-[var(--foreground)]"><DnIcon name="chevR" w={15} /></button>
        </>}
      </div>
      {n > 1 && (
        <div className="flex items-center justify-center gap-2 mt-3">
          {items.map((_, idx) => (
            <button key={idx} onClick={() => setI(idx)} aria-label={`Слайд ${idx + 1}`} className="rounded-full transition-all" style={{ width: i === idx ? 22 : 7, height: 7, background: i === idx ? "var(--accent)" : "var(--border)" }} />
          ))}
        </div>
      )}
      {modal && <DonateModal onClose={() => setModal(false)} />}
    </div>
  );
}

                  <span className="min-w-0 flex-1">
                    <span className="block text-[14px] font-semibold leading-tight">{m.name}</span>
                    {m.hint && <span className={`block text-[11.5px] leading-tight ${m.primary ? "text-white/80" : "text-[var(--muted-foreground)]"}`}>{m.hint}</span>}
                  </span>
                  <DnIcon name="ext" w={15} />
                </a>
              ))}
            </div>
          )}
          {qrs.length > 0 && (
            <div className={links.length > 0 ? "mt-5" : ""}>
              {links.length > 0 && (
                <div className="flex items-center gap-3 mb-3.5">
                  <span className="h-px flex-1 bg-[var(--border)]" />
                  <span className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">или по QR-коду</span>
                  <span className="h-px flex-1 bg-[var(--border)]" />

                  {qrs.map((m, idx) => (
                    <button key={m.id} onClick={() => setQrIdx(idx)} className={`flex-1 text-[12.5px] px-3 py-1.5 rounded-md font-medium transition-colors ${qrIdx === idx ? "bg-[var(--bg-elevated)] text-[var(--foreground)]" : "text-[var(--muted-foreground)]"}`}>{m.name}</button>

// MobilePreviewOverlay — renders the SAME page inside a device-sized
// iframe so Tailwind's sm:/lg: breakpoints resolve at the device's
// real viewport width (a shrunk container would NOT trigger them).
// Auto-scales the bezel to fit the available viewport.
// ─────────────────────────────────────────────────────────────────
const PREVIEW_DEVICES = {
  iphone:  { label: "iPhone 14",  w: 390, h: 844,  bezel: 14, radius: 46, notch: true },
  android: { label: "Pixel 7",    w: 412, h: 915,  bezel: 13, radius: 34, notch: false },

};

function MobilePreviewOverlay({ device, setDevice, onClose }) {
  const d = PREVIEW_DEVICES[device] || PREVIEW_DEVICES.iphone;
  const outerW = d.w + d.bezel * 2;
  const outerH = d.h + d.bezel * 2;
  const [scale, setScale] = useState(1);

  useEffect(() => {
    const recompute = () => {
      const availH = window.innerHeight - 132; // top bar + margins
      const availW = window.innerWidth - 48;
      setScale(Math.min(1, availH / outerH, availW / outerW));
    };
    recompute();
    window.addEventListener("resize", recompute);
    return () => window.removeEventListener("resize", recompute);
  }, [outerW, outerH]);

  // Esc closes.
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  const src = `${location.pathname}?preview=mobile`;

  return (
    <div className="fixed inset-0 z-[100] flex flex-col items-center" style={{ background: "rgba(0,0,0,0.62)", backdropFilter: "blur(3px)" }}>

          ))}
        </div>
        <span className="text-[12px] tabular-nums text-white/55 hidden sm:inline">{d.w} × {d.h}</span>
        <button
          onClick={onClose}
          className="ml-1 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[12.5px] font-medium text-white/85 border border-white/15 bg-white/10 hover:bg-white/20 transition-colors min-h-[34px]"
        >
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Закрыть
        </button>
      </div>

      {/* Scaled device frame */}
      <div className="flex-1 min-h-0 flex items-center justify-center pb-4" onClick={onClose}>
        <div style={{ width: outerW * scale, height: outerH * scale }} onClick={(e) => e.stopPropagation()}>
          <div
            style={{
              width: outerW, height: outerH, transform: `scale(${scale})`, transformOrigin: "top left",
              background: "#0a0a0a", borderRadius: d.radius, padding: d.bezel,
              boxShadow: "0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06)",
              position: "relative",
            }}
          >
            <iframe

              src={src}
              title={`Превью — ${d.label}`}
              style={{ width: d.w, height: d.h, border: "none", borderRadius: Math.max(8, d.radius - d.bezel), background: "#fff", display: "block" }}
            />
            {d.notch && (
              <div style={{ position: "absolute", top: d.bezel + 9, left: "50%", transform: "translateX(-50%)", width: 116, height: 30, background: "#0a0a0a", borderRadius: 16, pointerEvents: "none" }} />
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

  const [tweaks, setTweaksState] = useState(KIT_TWEAK_DEFAULTS);
  const [device, setDevice] = useState(null);

  // Listen for host protocol — keep the listener registered BEFORE
  // we announce ourselves available.
  useEffect(() => {
    const onMsg = (e) => {
      const t = e.data?.type;
      if (t === "__activate_edit_mode")   setOpen(true);
      if (t === "__deactivate_edit_mode") setOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  // Sync theme ↔ tweaks.theme. A ref tracks the last value we wrote to either side
  // so the effects don't ping-pong on each other's update.
  const lastSyncedRef = useRef(theme);
  useEffect(() => {
    if (tweaks.theme && tweaks.theme !== lastSyncedRef.current) {
      lastSyncedRef.current = tweaks.theme;
      if (tweaks.theme !== theme) setTheme(tweaks.theme);
    }
  }, [tweaks.theme]);
  useEffect(() => {
    if (theme !== lastSyncedRef.current) {
      lastSyncedRef.current = theme;
      if (theme !== tweaks.theme) setTweaksState(t => ({ ...t, theme }));
    }

  const setTweak = (key, value) => {
    const patch = typeof key === "object" ? key : { [key]: value };

  const launcher = (open || isPreviewChild) ? null : (

    >
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

  return (

function App() {
  const [theme, setThemeRaw] = useState(() => {
    try { return localStorage.getItem("devblog-kit-theme") || "light"; } catch { return "light"; }
  });
  const setTheme = (t) => {
    setThemeRaw(t);
    try { localStorage.setItem("devblog-kit-theme", t); } catch {}
  };
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  // Role-based home routing. Each role lands in their own portal on login /
  // logo-click / logout. Guest lands on the public feed.
  // One role per account — admin changes roles, see brief.
  const ROLE_HOME = { author: "author", reviewer: "reviewer", admin: "admin", reader: "home" };
  // Guest (no session) → public blog index. Reader → home (ReaderFeed). Others → their portal.
  const roleHomeFor = (s) => s?.role ? (ROLE_HOME[s.role] || "blog") : "blog";
  // Pages that require a session. If saved-page is one of these and we have
  // no session on mount, fall back to "home" instead of showing a broken view.
  const PRIVILEGED = new Set(["author", "admin", "reviewer", "editor", "review"]);

  const [session, setSession] = useState(null);
  const [page, setPage] = useState(() => {
    try {
      const saved = localStorage.getItem("devblog-kit-page");
      // No session yet on first mount → can't enter a privileged route directly.
      // "home" (ReaderFeed) needs a reader session, which we never have on
      // first mount (session is in-memory) — so guests start on the public catalog.
      if (saved && !PRIVILEGED.has(saved) && saved !== "home") return saved;
      return "blog";
    } catch { return "blog"; }
  });
  const [currentSlug, setCurrentSlug] = useState(null);

  // Pending "subscribe after login" intent + a snapshot of where to return.
  const loginReturnRef = useRef(null);
  const pageRef = useRef(page);
  const slugRef = useRef(currentSlug);
  pageRef.current = page;
  slugRef.current = currentSlug;

  const scrollRef = useRef(null);

  const navigate = (p) => {
    setPage(p);
    try { localStorage.setItem("devblog-kit-page", p); } catch {}
  };

  // Reset scroll + move focus into the main region AFTER the new page commits.
  // (Doing it inside navigate's rAF reset the OLD page; scroll-anchoring then
  // restored the prior position once React swapped content in.)
  useEffect(() => {
    scrollRef.current?.scrollTo({ top: 0 });
    if (page !== "login") {
      const m = document.getElementById("main-content");
      const heading = m?.querySelector("h1");
      (heading || m)?.focus?.({ preventScroll: true });
    }
  }, [page]);
  // Expose `navigate` on window so the ?smoke=1 harness (and any external
  // tooling) can drive the app. Assigned on every render so it always
  // closes over the latest setPage.
  window.__nav = navigate;

  const openArticle = (slug) => { setCurrentSlug(slug); navigate("article"); };
  const openBlog    = () => navigate("blog");
  const openLogin   = () => navigate("login");
  // "Home" is role-aware now — Reviewer→Inbox, Author→Portal, Admin→Admin,
  // Reader→public feed, Guest→public feed.
  const goHome      = () => navigate(roleHomeFor(session));
  const logout      = () => { setSession(null); navigate(roleHomeFor(null)); };

  const [profileHandle, setProfileHandle] = useState(null);
  const openProfile = (handle) => { setProfileHandle(handle); navigate("profile"); };

  const [reviewSlug, setReviewSlug] = useState(null);
  const [reviewChapterSlug, setReviewChapterSlug] = useState(null);
  const [editorBlogSlug, setEditorBlogSlug] = useState(null);
  const [editorChapterSlug, setEditorChapterSlug] = useState(null);
  const [editorPortfolio, setEditorPortfolio] = useState(false);
  const openEditor = (blogSlug, chapterSlug) => {
    setEditorPortfolio(false);
    setEditorBlogSlug(blogSlug || null);
    setEditorChapterSlug(chapterSlug || null);
    navigate("editor");
  };
  const openPortfolioEditor = () => {
    setEditorPortfolio(true);
    setEditorBlogSlug(null);
    setEditorChapterSlug(null);
    navigate("editor");
  };
  const openAuthorPortal = () => navigate("author");
  const [blogDetailSlug, setBlogDetailSlug] = useState(null);
  const openBlogDetail = (blogSlug) => { setBlogDetailSlug(blogSlug); navigate("blogdetail"); };
  const openReviewerInbox = () => navigate("reviewer");
  // Reviewer Inbox row click → ReviewPage. Pre-set pov hint via a transient flag
  // so ReviewPage opens with the current user's perspective by default.
  const openReviewPage   = (blogSlug, chapterSlug = null, opts = {}) => {
    setReviewSlug(blogSlug);
    setReviewChapterSlug(typeof chapterSlug === "string" ? chapterSlug : null);
    if (opts.povHandle) window.__nextReviewPov = opts.povHandle;
    navigate("review");
  };

  // Listen for global open-profile events (dispatched from comments etc.)
  useEffect(() => {
    const onOpen = (e) => openProfile(e.detail.handle);
    window.addEventListener("blog:open-profile", onOpen);
    return () => window.removeEventListener("blog:open-profile", onOpen);
  }, []);

  // Bridge from AdminReview → ReviewPage
  useEffect(() => {
    const onOpenReview = (e) => { setReviewSlug(e.detail.slug || e.detail.blogSlug); setReviewChapterSlug(e.detail.chapterSlug || null); navigate("review"); };
    window.addEventListener("blog:open-review", onOpenReview);
    return () => window.removeEventListener("blog:open-review", onOpenReview);
  }, []);

  // Guest "subscribe" intent: remember the series + where the guest was, so
  // login can return them here already subscribed.
  useEffect(() => {
    const onIntent = (e) => {
      loginReturnRef.current = {
        kind: e.detail?.kind || "follow",
        blogSlug: e.detail?.blogSlug,
        value: e.detail?.value,
        returnPage: pageRef.current,
        returnSlug: slugRef.current,
      };
    };
    window.addEventListener("devblog:follow-intent", onIntent);
    window.addEventListener("devblog:login-intent", onIntent);
    return () => { window.removeEventListener("devblog:follow-intent", onIntent); window.removeEventListener("devblog:login-intent", onIntent); };
  }, []);

  // Called by LoginScreen on success. Applies a pending follow intent and
  // returns the user to where they were; otherwise routes to role home.
  const completeLogin = (u) => {
    setSession(u);
    const intent = loginReturnRef.current;
    loginReturnRef.current = null;
    if (intent?.blogSlug) {
      // Apply the pending guest action now that we're authenticated.
      const s = intent.blogSlug;
      if (intent.kind === "bookmark")      window.__reactions?.setBookmark(s, true);
      else if (intent.kind === "vote")     window.__reactions?.setVote(s, intent.value || 1);
      else if (intent.kind === "comment")  { /* nothing to apply — form is now usable */ }
      else                                 window.__follows?.setFollow(s, true);
      if (intent.returnSlug) setCurrentSlug(intent.returnSlug);
      navigate(intent.returnPage && intent.returnPage !== "login" ? intent.returnPage : "article");
    } else {
      navigate(roleHomeFor(u));
    }
  };

  // Guide modal — role-aware, shown when the user clicks the BookOpen
  // icon in the nav. Anonymous users see the reader guide.
  const [guideOpen, setGuideOpen] = useState(false);
  const guideRole = session?.role || "reader";

  return (
    <div className="flex flex-col h-full min-h-0" data-screen-label={`Page:${page}`} style={{ ['--kit-density']: 'regular' }}>
      {/* Skip-to-content — visible only on keyboard focus */}
      <a
        href="#main-content"
        className="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[100] focus:px-3 focus:py-2 focus:rounded-md focus:bg-[var(--accent)] focus:text-[var(--accent-foreground)] focus:text-[13px] focus:font-medium focus:outline-none"
        onClick={(e) => {
          e.preventDefault();
          const m = document.getElementById("main-content");
          if (m) { m.focus(); m.scrollTo?.({ top: 0 }); }
        }}
      >К основному содержимому</a>
      <KitTweaksPanel theme={theme} setTheme={setTheme} />
      {page !== "admin" && <Nav
        theme={theme} setTheme={setTheme}
        session={session}
        currentPage={page}
        onNavigate={(p) => {
          if (p === "blog") navigate("blog");
          else if (p === "home") goHome();
          else if (p === "login") openLogin();
          else if (p === "board") navigate("board");
        }}
        onLogout={logout}
        onLogin={openLogin}
        onOpenGuide={() => setGuideOpen(true)}
        onOpenProfile={openProfile}
        onOpenReviewer={openReviewerInbox}
        onOpenAdmin={() => navigate("admin")}
        onOpenAuthor={openAuthorPortal}
        onOpenBookmarks={() => navigate("bookmarks")}
        onOpenNotification={(it) => { if (it?.blogSlug) { if (session?.role === "author" || session?.role === "reviewer") { openReviewPage(it.blogSlug, it.chapterSlug || null, { povHandle: session?.handle }); } else { openArticle(it.blogSlug); } } }}
      />}

      <GuideModal
        open={guideOpen}
        onClose={() => setGuideOpen(false)}
        role={guideRole}
        onCta={() => {
          if (guideRole === "author") navigate("blog");
          else if (guideRole === "reviewer") openReviewerInbox();
        }}
      />

      {/* Scroll container — the real scroller. Nav stays fixed above it;
          all reader/ToC observers + scrollTo target this element. */}
      <div ref={scrollRef} className="flex-1 min-h-0 overflow-y-auto relative">
        {page === "article" && <ScrollProgress targetRef={scrollRef} />}

        <main id="main-content" className="flex-1 focus:outline-none" tabIndex={-1}>
          {page === "home"    && (session?.role === "reader"
            ? <HomeScreen           session={session} onOpenArticle={openArticle} onOpenBlog={openBlog} onOpenProfile={openProfile} onNavigate={navigate} />
            : <ArticleIndexScreen   session={session} onOpenArticle={openArticle} onOpenProfile={openProfile} onLoginRequired={openLogin} onNavigate={navigate} />)}
          {page === "blog"    && <ArticleIndexScreen   session={session} onOpenArticle={openArticle} onOpenProfile={openProfile} onLoginRequired={openLogin} onNavigate={navigate} />}
          {page === "bookmarks" && <BookmarksScreen     session={session} onOpenArticle={openArticle} onOpenProfile={openProfile} onBack={openBlog} onLoginRequired={openLogin} />}
          {page === "article" && <BlogReaderScreen     session={session} slug={currentSlug} scrollRef={scrollRef} onLoginRequired={openLogin} onBack={openBlog} onOpenProfile={openProfile} />}
          {page === "profile" && <ProfileScreen         handle={profileHandle || session?.handle || "alex"} session={session} onOpenArticle={openArticle} onBack={openBlog} onNavigate={navigate} onOpenLogin={openLogin} onOpenProfile={openProfile} onOpenPortfolioEditor={openPortfolioEditor} />}
          {page === "reviewer" && <ReviewerInbox session={session} onOpenReview={(b, c) => openReviewPage(b, c, { povHandle: session?.handle })} onBack={openBlog} />}
          {page === "board"   && <ReviewerBoardScreen      session={session} onBack={goHome} />}
          {page === "admin"   && <AdminPortal               session={session} onBack={openBlog} onOpenProfile={openProfile} />}
          {page === "author"  && <AuthorPortal              session={session} onOpenBlogDetail={openBlogDetail} onOpenReview={openReviewPage} onOpenArticle={openArticle} onOpenEditor={openEditor} onOpenPortfolioEditor={openPortfolioEditor} onBack={openBlog} />}
          {page === "blogdetail" && <BlogDetailScreen        session={session} blogSlug={blogDetailSlug} onBack={openAuthorPortal} onOpenChapter={(b) => openArticle(b)} onOpenReview={openReviewPage} onOpenEditor={openEditor} onPreview={(b) => openArticle(b)} />}
          {page === "editor"  && <EditorScreen              session={session} blogSlug={editorBlogSlug} chapterSlug={editorChapterSlug} portfolioMode={editorPortfolio} onBack={editorPortfolio ? (() => openProfile(session?.handle)) : openAuthorPortal} onOpenReview={openReviewPage} />}
          {page === "review"  && <ReviewPage                session={session} blogSlug={reviewSlug} chapterSlug={reviewChapterSlug} onOpenAuthor={openAuthorPortal} onOpenAdmin={() => navigate("admin")} onOpenProfile={openProfile} onBack={openBlog} />}
          {page === "login"   && <LoginScreen          onLogin={completeLogin} returnNote={loginReturnRef.current?.blogSlug ? (window.__blogData?.getBlogBySlug(loginReturnRef.current.blogSlug)?.title || null) : null} />}
        </main>

        <Footer />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// ─── Smoke test (run with ?smoke=1) ───────────────────────────
// Walks every data-screen-label by driving window.__nav, counting
// React errors. Reports pass/fail to console + window.__smokeResult.
if (new URLSearchParams(location.search).get("smoke") === "1") {
  setTimeout(() => {
    const seen = new Set();
    const errors = [];
    const origErr = console.error;
    console.error = (...a) => { errors.push(a.join(" ")); origErr(...a); };

    const labels = () => [...document.querySelectorAll("[data-screen-label]")]
      .map(el => el.getAttribute("data-screen-label"));

    const targets = [
      ["Home",            () => window.__nav?.("home")],
      ["Blog",            () => window.__nav?.("blog")],
      ["Article",         () => window.__nav?.("article")],
      ["Login",           () => window.__nav?.("login")],
      ["AuthorPortal",    () => window.__nav?.("author")],
      ["Editor",          () => window.__nav?.("editor")],
      ["ReviewerInbox",   () => window.__nav?.("reviewer")],
      ["ReviewPage",      () => window.__nav?.("review")],
      ["AdminPortal",     () => window.__nav?.("admin")],
    ];

    let i = 0;
    const tick = () => {
      if (i >= targets.length) {
        console.error = origErr;
        const found = [...seen];
        const result = {
          pass: errors.length === 0 && found.length >= 6,
          screensSeen: found,
          errors,
        };
        window.__smokeResult = result;
        console.log("[smoke]", result.pass ? "PASS" : "FAIL", result);
        document.title = (result.pass ? "✓ " : "✗ ") + document.title;
        return;
      }
      const [name, fn] = targets[i++];
      try { fn(); } catch (e) { errors.push("[nav " + name + "] " + e.message); }
      setTimeout(() => {
        labels().forEach(l => seen.add(l));
        tick();
      }, 250);
    };
    tick();
  }, 500);
}
  </script>
</body>
</html>
