  );
}

// Reviewer flagged a skills-mismatch → chapter pulled from review; author sees
// the verdict and is asked to fix the skills.
function ComplaintNotice({ me, onOpenBlogDetail }) {
  const [, setTick] = useState(0);
  useEffect(() => window.__reviewerFlow?.subscribe(() => setTick(t => t + 1)), []);
  const flagged = window.__reviewerFlow?.flaggedFor(me) || [];
  if (!flagged.length) return null;
  return (
    <div className="mb-7">
      <h2 className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2.5">Снято с ревью</h2>
      <div className="flex flex-col gap-2.5">
        {flagged.map(inv => (
          <div key={inv.id} className="rounded-lg border border-[var(--border)] bg-[var(--bg-elevated)] overflow-hidden">
            <div className="px-3 py-2 flex items-center gap-2 border-b border-[var(--border)]" style={{ background: "var(--warning-bg)" }}>
              <span className="text-[12px] font-semibold" style={{ color: "var(--warning)" }}>Глава снята с ревью</span>
            </div>
            <div className="px-3 py-2.5">
              <p className="text-[12px] font-medium leading-snug mb-1 title-clamp-1">{inv.chapterTitle}</p>
              <p className="text-[11.5px] text-[var(--muted-foreground)] leading-relaxed mb-2">Ревьюер сообщил: навыки статьи не соответствуют содержанию. Обновите ключевые навыки и отправьте снова.</p>
              <span className="inline-flex items-center gap-1 flex-wrap">{(inv.skills || []).slice(0, 4).map(s => <span key={s} className="text-[10.5px] px-1.5 py-0.5 rounded-full border border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)]">{s}</span>)}</span>
              {inv.blogSlug && <button onClick={() => onOpenBlogDetail?.(inv.blogSlug)} className="mt-2.5 w-full text-[11.5px] px-2.5 py-1.5 rounded font-medium bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)]">Исправить навыки</button>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AuthorPortal({ session, onOpenBlogDetail, onOpenArticle, onBack, onOpenEditor, onOpenPortfolioEditor }) {
  const me = session?.handle || "alex";
  const [, setTick] = useState(0);
  useEffect(() => window.__reviewStore?.subscribe(() => setTick(t => t + 1)), []);
  useEffect(() => {
    const h = () => setTick(t => t + 1);
    window.addEventListener("devblog:pins-changed", h);
    window.addEventListener("devblog:portfolio-changed", h);
    return () => {
      window.removeEventListener("devblog:pins-changed", h);
      window.removeEventListener("devblog:portfolio-changed", h);
    };
  }, []);
  const blogs = window.__blogData.getAuthorBlogs(me);

  // Pinned (portfolio) blog sorts first; all cards share the same component.
  const pinnedSlug = window.__pins?.get(me);
  const ordered = [...blogs].sort((a, b) =>
    (a.slug === pinnedSlug ? -1 : 0) - (b.slug === pinnedSlug ? -1 : 0)
  );

  const events = authorEventsV2();

  return (
    <div className="max-w-6xl mx-auto px-4 py-8 sm:py-10" data-screen-label="AuthorPortal">
      <header className="mb-6 sm:mb-8">
        <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">Кабинет автора</p>
        <h1 className="font-[var(--font-display)] font-extrabold text-3xl sm:text-4xl md:text-5xl tracking-tight title-clamp-2">Мои блоги</h1>
        <p className="text-[14px] text-[var(--muted-foreground)] mt-2 max-w-xl leading-relaxed">
          Каждый блог — это набор глав. Откройте блог, чтобы добавить главу или посмотреть статус существующих.
        </p>
      </header>

      <div className="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-8 lg:gap-10">
        {/* Blog cards — one uniform grid, create-tile + pinned first */}
        <div>
          <ul className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <li>
              <button
                type="button"
                onClick={() => onOpenEditor?.(null, null)}
                className="w-full h-full min-h-[120px] rounded-lg border border-dashed border-[var(--border)] hover:border-[var(--accent)] hover:bg-[color-mix(in_srgb,var(--accent)_5%,transparent)] transition-colors flex flex-col items-center justify-center gap-2 text-[var(--muted-foreground)] hover:text-[var(--accent)] p-4"
              >
                <span className="w-9 h-9 rounded-full border border-current inline-flex items-center justify-center text-[20px] leading-none">＋</span>
                <span className="text-[13px] font-medium">Новый блог</span>
              </button>
            </li>
            {ordered.map(b => (
              <li key={b.slug}>
                <BlogCard
                  blog={b}
                  pinned={window.__pins?.isPinned(me, b.slug)}
                  onOpen={() => onOpenBlogDetail?.(b.slug)}
                  onAddChapter={() => onOpenEditor?.(b.slug, null)}
                  onTogglePin={() => window.__pins?.set(me, b.slug)}
                />
              </li>
            ))}
          </ul>
        </div>

        {/* Aside: portfolio + events */}
        <aside className="lg:border-l lg:border-[var(--border)] lg:pl-8">
          <ComplaintNotice me={me} onOpenBlogDetail={onOpenBlogDetail} />
          <AuthorRatingPanel me={me} />
          <RecruitStatus me={me} onOpenBlogDetail={onOpenBlogDetail} />
          {/* «Об авторе» (portfolio) management */}
          {(() => {
            const pf = window.__portfolio?.get(me);
            const visible = window.__portfolio?.isVisible(me);
            return (
              <div className="mb-7 rounded-lg border border-[var(--border)] bg-[var(--bg-elevated)] p-4">
                <div className="flex items-center gap-1.5 mb-1.5">
                  <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" className="text-[var(--accent)]"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                  <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Об авторе</p>
                </div>
                {pf ? (
                  <>
                    <p className="text-[13px] text-[var(--foreground)] leading-snug mb-1 title-clamp-2">{pf.title || "Без заголовка"}</p>
                    <p className="text-[11.5px] text-[var(--muted-foreground)] mb-3">
                      {visible ? "Опубликовано · видно всем" : "Скрыто от читателей"}
                    </p>
                    <div className="flex items-center gap-1.5">
                      <button
                        onClick={() => onOpenPortfolioEditor?.()}
                        className="flex-1 inline-flex items-center justify-center gap-1.5 px-3 py-2 rounded-md text-[12.5px] font-medium text-[var(--accent)] border border-[color-mix(in_srgb,var(--accent)_35%,var(--border))] hover:bg-[color-mix(in_srgb,var(--accent)_8%,transparent)] transition-colors min-h-[38px]"
                      >
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                        Изменить
                      </button>
                      <button
                        onClick={() => window.__portfolio.setVisible(me, !visible)}
                        title={visible ? "Скрыть от читателей" : "Показать читателям"}
                        aria-label={visible ? "Скрыть" : "Показать"}
                        aria-pressed={visible}
                        className={`shrink-0 w-[38px] h-[38px] inline-flex items-center justify-center rounded-md border transition-colors ${visible ? "text-[var(--success)] border-[var(--success-border)] bg-[var(--success-bg)]" : "text-[var(--muted-foreground)] border-[var(--border)] hover:text-[var(--foreground)]"}`}
                      >
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                          {visible
                            ? <><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></>
                            : <><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></>}
                        </svg>
                      </button>
                    </div>
                  </>
                ) : (
                  <>
                    <p className="text-[11.5px] text-[var(--muted-foreground)] leading-relaxed mb-3">Расширенное «Обо мне» — публикуется сразу, без ревью.</p>
                    <button
                      onClick={() => onOpenPortfolioEditor?.()}
                      className="w-full inline-flex items-center justify-center gap-1.5 px-3 py-2 rounded-md text-[12.5px] font-medium bg-[var(--accent)] text-[var(--accent-foreground)] hover:opacity-90 transition-opacity min-h-[38px]"
                    >＋ Создать</button>
                  </>
                )}
              </div>
            );
          })()}

          <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-3">События</p>
          <ul className="space-y-3.5">
            {events.map(e => (
              <li key={e.id} className="text-[13px] leading-snug">
                <div className="flex items-start gap-2">
                  <span className={`mt-1.5 w-1.5 h-1.5 rounded-full shrink-0 ${e.tone === "accent" ? "bg-[var(--accent)]" : e.tone === "warning" ? "bg-[var(--warning)]" : "bg-[var(--muted-foreground)]"}`} />
                  <div className="min-w-0">
                    <p className="text-[var(--foreground)]">{e.text}</p>
                    <p className="text-[11.5px] text-[var(--muted-foreground)] mt-0.5">{e.when}</p>
                  </div>
                </div>
              </li>
            ))}
          </ul>
        </aside>
      </div>
    </div>
  );
}

// Status badge — readable in both themes (uses *-bg/*-border tokens, never
// bare colored text on the card surface).
function ChapterStatusCount({ tone, children }) {
  const map = {
    info:    "bg-[var(--info-bg)] text-[var(--info)] border-[var(--info-border)]",
    muted:   "bg-[var(--muted)] text-[var(--muted-foreground)] border-[var(--border)]",
  };
  return (
    <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[11px] font-medium border ${map[tone] || map.muted}`}>
      {children}
    </span>
  );
}

// Unified author blog card: body (opens detail) + a footer action panel
// shared by EVERY card — primary "＋ Глава" and a pin toggle. The pinned
// card gets an amber ring + "Закреплён" chip.
function BlogCard({ blog, onOpen, onAddChapter, pinned, onTogglePin }) {
  const cc = blog.chapterCounts;
  const myTurnChapter = blog.chapters.find(c => c.hasMyTurn);
  return (
    <div className={`relative w-full rounded-lg border bg-[var(--bg-elevated)] transition-all hover:-translate-y-0.5 flex flex-col h-full ${
      pinned
        ? "border-[var(--pin-border)] ring-1 ring-[var(--pin-ring)]"
        : "border-[var(--border)] hover:border-[var(--foreground)]/20"
    }`}>
      <button
        type="button"
        onClick={onOpen}
        className="w-full text-left p-4 pb-3 flex flex-col gap-3 flex-1"
      >
        <div className="flex items-center justify-between gap-2">
          <ChapterDots blog={blog} />
          <div className="flex items-center gap-2 shrink-0">
            {pinned && (
              <span className="inline-flex items-center gap-1 text-[10px] uppercase tracking-wider font-semibold px-1.5 py-0.5 rounded bg-[var(--pin-bg)] text-[var(--pin)] border border-[var(--pin-border)]">
                <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor" aria-hidden="true"><path d="M5 17h14l-1.4-4.2a2 2 0 0 1-.1-.6V5a2 2 0 0 0-2-2H8.5a2 2 0 0 0-2 2v7.2a2 2 0 0 1-.1.6z"/><rect x="11" y="17" width="2" height="5" rx="1"/></svg>
                Закреплён
              </span>
            )}
            {myTurnChapter && (
              <span className="inline-flex items-center gap-1 text-[10.5px] font-semibold text-[var(--accent)] uppercase tracking-wider">
                <span className="w-1.5 h-1.5 rounded-full bg-[var(--accent)]" /> ваш ход
              </span>
            )}
          </div>
        </div>
        <div className="flex-1 min-w-0">
          <h3 className="font-[var(--font-display)] font-bold text-[18px] leading-snug title-clamp-2 mb-1.5" title={blog.title}>
            {blog.title}
          </h3>
          <p className="text-[12.5px] text-[var(--muted-foreground)] leading-relaxed title-clamp-2">
            {blog.summary || "Без описания."}
          </p>
        </div>
        <div className="flex items-center gap-2 flex-wrap text-[11.5px] tabular-nums text-[var(--muted-foreground)]">
          <span>{cc.total} {cc.total === 1 ? "глава" : cc.total < 5 ? "главы" : "глав"} · {cc.published} опубл.</span>
          {cc.onReview > 0 && <ChapterStatusCount tone="info">{cc.onReview} на ревью</ChapterStatusCount>}
          {cc.drafts > 0 && <ChapterStatusCount tone="muted">{cc.drafts} черн.</ChapterStatusCount>}
        </div>
      </button>

      {/* Shared action panel */}
      <div className="flex items-stretch gap-1.5 px-3 py-2.5 border-t border-[var(--border)]">
        <button
          type="button"
          onClick={onAddChapter}
          className="flex-1 inline-flex items-center justify-center gap-1.5 px-3 py-2 rounded-md text-[12.5px] font-medium text-[var(--accent)] border border-[color-mix(in_srgb,var(--accent)_35%,var(--border))] hover:bg-[color-mix(in_srgb,var(--accent)_8%,transparent)] transition-colors min-h-[38px]"
        >
          <span aria-hidden="true">＋</span> Глава
        </button>
        {onTogglePin && (
          <button
            type="button"
            onClick={onTogglePin}
            title={pinned ? "Открепить блог" : "Закрепить как портфолио"}
            aria-label={pinned ? "Открепить блог" : "Закрепить блог"}
            aria-pressed={pinned}
            className={`shrink-0 w-[38px] inline-flex items-center justify-center rounded-md border transition-colors ${
              pinned
                ? "text-[var(--pin)] border-[var(--pin-border)] bg-[var(--pin-bg)]"
                : "text-[var(--muted-foreground)] border-[var(--border)] hover:text-[var(--foreground)] hover:border-[var(--foreground)]/20"
            }`}
          >
            <svg viewBox="0 0 24 24" width="15" height="15" fill={pinned ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-1.4-4.2a2 2 0 0 1-.1-.6V5a2 2 0 0 0-2-2H8.5a2 2 0 0 0-2 2v7.2a2 2 0 0 1-.1.6z"/></svg>
          </button>
        )}
      </div>
    </div>
  );
}

function authorEventsV2() {
  return [
    { id: "e1", tone: "accent",  text: "Дмитрий К. запросил правки в главе «Server Actions»",                   when: "2 ч назад" },
    { id: "e2", tone: "default", text: "Костя одобрил главу «Server Actions» в блоге Next.js 16",              when: "сегодня, 11:08" },
    { id: "e3", tone: "default", text: "Ирина М. подтвердила готовность ревьюить «Drizzle для SQLite»",         when: "вчера" },
    { id: "e4", tone: "warning", text: "Срок ревью «Drizzle для SQLite» истекает завтра",                       when: "вчера" },
    { id: "e5", tone: "default", text: "Принята правка от Кости в «Next.js 16: паттерны границ»",               when: "13 мая" },
    { id: "e6", tone: "default", text: "Глава 1 «Границы между server и client» опубликована модератором",      when: "9 мая" },
  ];
}

// ─────────────────────────────────────────────────────────────────
// BlogDetailScreen — drill-in: chapter list + add chapter + edit blog meta.
// ─────────────────────────────────────────────────────────────────
function BlogDetailScreen({ session, blogSlug, onBack, onOpenChapter, onOpenReview, onOpenEditor, onPreview }) {
  const [, setTick] = useState(0);
  useEffect(() => window.__reviewStore?.subscribe(() => setTick(t => t + 1)), []);
  const blog = window.__blogData.getBlogBySlug(blogSlug);
  if (!blog) {
    return (
      <div className="max-w-4xl mx-auto px-4 py-10" data-screen-label="BlogDetail">
        <button onClick={onBack} className="text-sm text-[var(--muted-foreground)] hover:text-[var(--foreground)] inline-flex items-center gap-1.5 mb-5 min-h-[44px] -ml-1 px-1">
          ← Кабинет
        </button>
        <p className="text-[var(--muted-foreground)]">Блог не найден.</p>
      </div>
    );
  }
  const isMine = session?.handle === blog.authorSlug;
  const isPinned = window.__pins?.isPinned(blog.authorSlug, blog.slug);
  const author = window.FAKE_DATA.users?.[blog.authorSlug];

  // Tabs / filter
  const [filter, setFilter] = useState("all");

  // Local, mutable chapter order + blog title — persisted back to the live
  // __blogData singleton so navigating away and back keeps the change.
  const [chapters, setChapters] = useState(blog.chapters);
  const [title, setTitle] = useState(blog.title);
  const [editingTitle, setEditingTitle] = useState(false);
  const titleInputRef = useRef(null);

  useEffect(() => {
    if (editingTitle && titleInputRef.current) {
      titleInputRef.current.focus();
      titleInputRef.current.select();
    }
  }, [editingTitle]);

  const commitTitle = () => {
    const next = title.trim() || blog.title;
    setTitle(next);
    blog.title = next; // persist to live store
    setEditingTitle(false);
  };
  const cancelTitle = () => { setTitle(blog.title); setEditingTitle(false); };

  // Drag-reorder (only meaningful in the "all" view).
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const reorder = (from, to) => {
    if (from == null || to == null || from === to) return;
    const next = [...chapters];
    const [moved] = next.splice(from, 1);
    next.splice(to, 0, moved);
    next.forEach((c, i) => { c.order = i; });
    setChapters(next);
    blog.chapters = next; // persist to live store
  };

  const visibleChapters = filter === "all"
    ? chapters
    : chapters.filter(c => window.__blogData.chapterStatus(c) === filter || (filter === "review" && window.__blogData.isChapterInFlight(c)));
  const dragEnabled = filter === "all";

  return (
    <div className="max-w-5xl mx-auto px-4 py-8 sm:py-10" data-screen-label="BlogDetail">
      <button onClick={onBack} className="text-sm text-[var(--muted-foreground)] hover:text-[var(--foreground)] inline-flex items-center gap-1.5 mb-4 min-h-[44px] -ml-1 px-1">
        <svg viewBox="0 0 24 24" width={14} height={14} fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 18 5 12 11 6"/></svg>
        К списку блогов
      </button>

      {/* Blog header */}
      <header className="mb-6 sm:mb-8 pb-6 border-b border-[var(--border)]">
        <div className="mb-3">
          <div className="min-w-0">
            <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">
              {chapters.length} {chapters.length === 1 ? "глава" : chapters.length < 5 ? "главы" : "глав"}
            </p>
            {editingTitle ? (
              <input
                ref={titleInputRef}
                value={title}
                maxLength={64}
                onChange={(e) => setTitle(e.target.value)}
                onBlur={commitTitle}
                onKeyDown={(e) => {
                  if (e.key === "Enter") { e.preventDefault(); commitTitle(); }
                  else if (e.key === "Escape") { e.preventDefault(); cancelTitle(); }
                }}
                className="font-[var(--font-display)] font-extrabold text-3xl sm:text-4xl tracking-tight mb-2 w-full bg-transparent border-b-2 border-[var(--accent)] outline-none"
                aria-label="Название блога"
              />
            ) : (
              <h1
                className="font-[var(--font-display)] font-extrabold text-3xl sm:text-4xl tracking-tight title-clamp-3 mb-2 cursor-text rounded hover:bg-[var(--muted)]/40 -mx-1 px-1 transition-colors"
                title="Двойной клик — переименовать"
                onDoubleClick={() => setEditingTitle(true)}
              >
                {title}
              </h1>
            )}
            {blog.summary && (
              <p className="text-[14px] text-[var(--muted-foreground)] max-w-2xl leading-relaxed mb-3">{blog.summary}</p>
            )}
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1.5 text-[12.5px] text-[var(--muted-foreground)]">
              {author && <span>@{author.handle} · {author.name}</span>}
              {blog.tags?.length > 0 && (
                <>
                  <span>·</span>
                  <div className="flex flex-wrap gap-1">
                    {blog.tags.map(t => (
                      <span key={t} className="text-[11.5px] px-1.5 py-0.5 rounded bg-[var(--muted)] text-[var(--muted-foreground)]">{t}</span>
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>

        {/* Action row — consistent button panel */}
        <div className="flex flex-wrap items-center gap-2">
          <button
            type="button"
            onClick={() => onOpenEditor?.(blog.slug, null)}
            className="px-3.5 py-2 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] text-[12.5px] font-medium hover:bg-[var(--accent-hover)] transition-colors inline-flex items-center justify-center gap-1.5 min-h-[40px] whitespace-nowrap"
          >＋ Новая глава</button>
          <button
            type="button"
            onClick={() => onPreview?.(blog.slug)}
            className="px-3 py-2 rounded-md border border-[var(--border)] hover:border-[var(--foreground)]/20 text-[12.5px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors min-h-[40px] whitespace-nowrap"
          >Открыть как читатель →</button>
          {isMine && (
            <button
              type="button"
              onClick={() => { window.__pins?.set(blog.authorSlug, blog.slug); setTick(t => t + 1); }}
              title={isPinned ? "Открепить блог" : "Закрепить как портфолио"}
              aria-pressed={isPinned}
              className={`px-3 py-2 rounded-md border text-[12.5px] font-medium transition-colors min-h-[40px] whitespace-nowrap inline-flex items-center justify-center gap-1.5 ${
                isPinned
                  ? "text-[var(--pin)] border-[var(--pin-border)] bg-[var(--pin-bg)]"

};

// Slash-menu groups. Order matters for keyboard nav.
const SLASH_GROUPS = [

    { type: "h2",   title: "Заголовок 2", hint: "## " },

// Default empty payload for each block type.

function slugifyRu(s) {
  const map = { а:"a", б:"b", в:"v", г:"g", д:"d", е:"e", ё:"e", ж:"zh", з:"z", и:"i", й:"y",
    к:"k", л:"l", м:"m", н:"n", о:"o", п:"p", р:"r", с:"s", т:"t", у:"u", ф:"f", х:"h",
    ц:"ts", ч:"ch", ш:"sh", щ:"sch", ъ:"", ы:"y", ь:"", э:"e", ю:"yu", я:"ya" };
  return (s || "").toLowerCase().split("").map(c => map[c] ?? c).join("")
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 60) || "untitled";
}

// Strip HTML to plain text (for markdown-shortcut detection and char-count).
function stripHtml(html) {
  if (!html) return "";
  const d = document.createElement("div");
  d.innerHTML = html;
  return d.textContent || "";
}

// Pluralization for "ревьюер".
function pluralReviewers(n) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return "ревьюер";
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return "ревьюера";
  return "ревьюеров";

// ─────────────────────────────────────────────────────────────────
// ContentEditable wrapper. Mounts innerHTML once and forwards
// input/key events. Lets parent control HTML via a controlled ref;
// re-mounts a fresh DOM when block type changes.
// ─────────────────────────────────────────────────────────────────
function Editable({ html, onInput, onKeyDown, placeholder, className = "", tag = "div", autoFocus = false }) {
  const ref = useRef(null);

  // Initial mount: drop html into the DOM once.
  useEffect(() => {
    if (ref.current && (html ?? "") !== ref.current.innerHTML) {
      ref.current.innerHTML = html ?? "";
    }
    if (autoFocus && ref.current) {
      ref.current.focus();
      placeCaretAtEnd(ref.current);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // External html-prop changes (rare — only when blockType swaps reuse the
  // same Editable node by accident). Skip when the user is typing.
  useEffect(() => {
    if (!ref.current) return;
    if (document.activeElement === ref.current) return;
    if ((html ?? "") !== ref.current.innerHTML) {
      ref.current.innerHTML = html ?? "";
    }
  }, [html]);

  const Tag = tag;
  return (
    <Tag
      ref={ref}
      contentEditable
      suppressContentEditableWarning
      data-placeholder={placeholder || ""}
      className={`editor-editable outline-none ${className}`}
      onInput={(e) => onInput?.(e.currentTarget.innerHTML)}
      onKeyDown={onKeyDown}
    />
  );
}

function placeCaretAtEnd(el) {
  if (!el) return;
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// ─────────────────────────────────────────────────────────────────
// Inline format popover (B / I / Code / Link). Tracks selection
// globally, shows above the current range when non-empty.
// ─────────────────────────────────────────────────────────────────
function InlineToolbar({ containerRef }) {
  const [rect, setRect] = useState(null);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const handler = () => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.rangeCount) { setOpen(false); return; }
      const range = sel.getRangeAt(0);
      // Must be inside an editor-editable surface.
      let node = range.commonAncestorContainer;
      if (node.nodeType !== 1) node = node.parentElement;
      const editable = node?.closest?.(".editor-editable");
      if (!editable) { setOpen(false); return; }
      const r = range.getBoundingClientRect();
      if (!r || (!r.width && !r.height)) { setOpen(false); return; }
      const containerRect = containerRef.current?.getBoundingClientRect();
      setRect({
        top:  r.top  - (containerRect?.top  ?? 0) - 40,
        left: r.left - (containerRect?.left ?? 0) + r.width / 2,
      });
      setOpen(true);
    };
    document.addEventListener("selectionchange", handler);
    return () => document.removeEventListener("selectionchange", handler);
  }, [containerRef]);

  const apply = (cmd, value) => {
    document.execCommand(cmd, false, value);
    // Refresh — execCommand keeps selection but the popover rect needs reflow.
  };

  if (!open || !rect) return null;
  return (
    <div
      style={{ top: rect.top, left: rect.left, transform: "translateX(-50%)" }}
      className="absolute z-50 flex items-center gap-0.5 bg-[var(--bg-elevated)] border border-[var(--border)] rounded-md p-1 shadow-none"
      onMouseDown={(e) => e.preventDefault()}
    >
      <ToolbarBtn label="B" hotkey="⌘B" onClick={() => apply("bold")}>
        <span className="font-bold">B</span>
      </ToolbarBtn>
      <ToolbarBtn label="Курсив" hotkey="⌘I" onClick={() => apply("italic")}>
        <span className="italic">I</span>
      </ToolbarBtn>
      <ToolbarBtn label="Код" hotkey="⌘E" onClick={() => apply("insertHTML", `<code style="background:var(--code-bg);padding:0 4px;border-radius:4px;font-family:var(--font-mono);font-size:0.92em;">${getSelectionText()}</code>`)}>
        <span className="font-mono text-[12px]">{"<>"}</span>
      </ToolbarBtn>
      <ToolbarBtn label="Ссылка" hotkey="⌘K" onClick={() => {
        const url = window.prompt("URL");
        if (url) apply("createLink", url);
      }}>
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5" />
          <path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5" />
        </svg>
      </ToolbarBtn>
    </div>
  );

function ToolbarBtn({ children, onClick, label, hotkey }) {
  return (

      type="button"

    >{children}</button>

}
function getSelectionText() {
  return window.getSelection()?.toString() || "";
}

// ─────────────────────────────────────────────────────────────────
// Slash menu — opens when an empty block's first character is "/".
// Filtered by what the user typed after the slash.
// ─────────────────────────────────────────────────────────────────
function SlashMenu({ query, onPick, onClose }) {
  const items = useMemo(() => {
    const all = SLASH_GROUPS.flatMap(g => g.items.map(it => ({ ...it, _group: g.label })));
    if (!query) return all;
    const q = query.toLowerCase();
    return all.filter(it => (it.title.toLowerCase().includes(q) || (it.hint || "").toLowerCase().includes(q)));
  }, [query]);
  const [active, setActive] = useState(0);
  useEffect(() => { setActive(0); }, [query]);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowDown") { e.preventDefault(); setActive(i => Math.min(items.length - 1, i + 1)); }
      else if (e.key === "ArrowUp") { e.preventDefault(); setActive(i => Math.max(0, i - 1)); }
      else if (e.key === "Enter") { e.preventDefault(); items[active] && onPick(items[active]); }
      else if (e.key === "Escape") { e.preventDefault(); onClose?.(); }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [items, active, onPick, onClose]);

  return (
    <div className="absolute z-40 bg-[var(--bg-elevated)] border border-[var(--border)] rounded-lg w-[280px] max-h-[320px] overflow-y-auto py-1">

          onMouseDown={(e) => { e.preventDefault(); onPick(it); }}
          className={`w-full text-left px-3 py-1.5 text-[13px] flex items-baseline justify-between gap-3 ${i === active ? "bg-[var(--muted)]" : ""} hover:bg-[var(--muted)]`}

    </div>
  );

// ─────────────────────────────────────────────────────────────────
// Markdown shortcut detection at start of paragraph. Receives plain
// text and returns { type, subtype, stripPrefix } when a match is
// found, or null. Caller swaps block type & clears the matched prefix.
// ─────────────────────────────────────────────────────────────────
function detectMarkdownShortcut(plainText) {
  const t = plainText;
  // Order matters — longer prefixes first.
  if (/^###\s/.test(t))           return { type: "h3", prefix: t.match(/^###\s/)[0] };
  if (/^##\s/.test(t))            return { type: "h2", prefix: t.match(/^##\s/)[0] };
  if (/^>\s*note:\s?/i.test(t))   return { type: "callout", subtype: "note",    prefix: t.match(/^>\s*note:\s?/i)[0] };
  if (/^>\s*warning:\s?/i.test(t))return { type: "callout", subtype: "warning", prefix: t.match(/^>\s*warning:\s?/i)[0] };
  if (/^>\s*info:\s?/i.test(t))   return { type: "callout", subtype: "info",    prefix: t.match(/^>\s*info:\s?/i)[0] };
  if (/^>\s*mermaid:\s?/i.test(t))return { type: "mermaid", prefix: t.match(/^>\s*mermaid:\s?/i)[0] };
  if (/^>\s/.test(t))             return { type: "quote", prefix: t.match(/^>\s/)[0] };
  if (/^```\s?/.test(t))          return { type: "code",  prefix: t.match(/^```\s?/)[0] };
  if (/^\$\$\s?/.test(t))         return { type: "latex", prefix: t.match(/^\$\$\s?/)[0] };
  if (/^-\s/.test(t))             return { type: "list", subtype: "bullet",   prefix: t.match(/^-\s/)[0] };
  if (/^\d+\.\s/.test(t))         return { type: "list", subtype: "numbered", prefix: t.match(/^\d+\.\s/)[0] };
  if (/^\[\]\s/.test(t))          return { type: "list", subtype: "todo",     prefix: t.match(/^\[\]\s/)[0] };
  return null;
}

window.__editorHelpers = { COMPLEXITY, COMPLEXITY_ORDER, SLASH_GROUPS, BLOCK_LABEL, emptyBlock, slugifyRu, stripHtml, pluralReviewers, detectMarkdownShortcut };
window.Editable = Editable;
window.InlineToolbar = InlineToolbar;
window.SlashMenu = SlashMenu;

// ═════════ Block components ═════════
// Editor — block components.
// Each block exports a small React component. Type-router lives in EditorScreen
// (see Editor.jsx). All blocks accept:
//   { block, onChange(next), onEnter(), onBackspaceEmpty(), focused }
//
// Inline-format editing happens in `Editable` (defined above). The toolbar
// floats globally and uses document.execCommand on the current selection.
// (React hooks + emptyBlock/detectMarkdownShortcut/stripHtml are already in
//  scope from the merged primitives section above.)

// Common block frame: hover-handle on the left edge, "+" between blocks.
function BlockFrame({ children, onAddAfter, onDelete, onChangeType, dragHandlers, onGripDragStart, onGripDragEnd, dropBefore, dragging }) {
  const [menuOpen, setMenuOpen] = useState(false);

      {dropBefore && <div className="absolute -top-[3px] left-12 right-1 h-[3px] bg-[var(--accent)] rounded-full z-10 pointer-events-none" />}
      {/* Left-edge handle gutter — horizontal pair, aligned to the first line.
          A row (not a stack) keeps both controls within the block's top line so
          the hover/drag target never spills into the gap between blocks. */}
      <div className="absolute left-0 top-0 w-12 flex items-start justify-end gap-0.5 pt-[3px] pr-1.5 opacity-0 group-hover/block:opacity-100 focus-within:opacity-100 transition-opacity select-none">
        <button
          type="button"

          className="w-6 h-6 rounded text-[var(--muted-foreground)] hover:bg-[var(--muted)] hover:text-[var(--foreground)] inline-flex items-center justify-center cursor-grab active:cursor-grabbing"
        >
          <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><circle cx="9"  cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>
        </button>
      </div>
      {menuOpen === "ctx" && (
        <BlockContextMenu
          onClose={() => setMenuOpen(false)}
          onDelete={() => { onDelete?.(); setMenuOpen(false); }}

}

function InsertMenu({ onPick, onClose }) {
  const { SLASH_GROUPS } = window.__editorHelpers;

function BlockContextMenu({ onDelete, onChangeType, onClose }) {

function ClickOutside({ onClick }) {
  useEffect(() => {
    const h = () => onClick?.();
    setTimeout(() => document.addEventListener("mousedown", h, { once: true }), 0);

}

// ─────────────────────────────────────────────────────────────────
// Helper used by text blocks: handle Enter / Backspace / markdown shortcut.
// Returns onInput / onKeyDown handlers to pass to <Editable>.
// ─────────────────────────────────────────────────────────────────
function useTextBlockHandlers({ block, onChange, onEnter, onBackspaceEmpty, allowMarkdown = true, replaceType }) {
  const onInput = (html) => {
    const plain = stripHtml(html);
    if (allowMarkdown) {
      const m = detectMarkdownShortcut(plain);
      if (m && replaceType) {
        const newType = m.type;
        const subtype = m.subtype || null;
        // strip prefix from the html (best-effort: strip from leading text node)
        const stripped = html.replace(/^[^<]*?(?=$|<)/, (lead) => lead.slice(m.prefix.length));
        replaceType(newType, subtype, stripped);
        return;
      }
    }
    onChange({ ...block, text: html });
  };
  const onKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      onEnter?.();
    } else if (e.key === "Backspace") {
      const sel = window.getSelection();
      const txt = stripHtml(e.currentTarget?.innerHTML);
      if (!txt && sel?.isCollapsed) {
        e.preventDefault();
        onBackspaceEmpty?.();
      }
    }
  };
  return { onInput, onKeyDown };
}

// ─────────────────────────────────────────────────────────────────
// Heading / paragraph / quote — single Editable.
// ─────────────────────────────────────────────────────────────────
function BlockHeading({ block, onChange, onEnter, onBackspaceEmpty, replaceType, focused }) {
  const cls = block.type === "h2"
    ? "font-[var(--font-display)] font-bold text-[28px] leading-[1.2] tracking-tight mb-2 mt-6"
    : "font-[var(--font-display)] font-semibold text-[22px] leading-[1.25] tracking-tight mb-1.5 mt-5";
  const h = useTextBlockHandlers({ block, onChange, onEnter, onBackspaceEmpty, replaceType });
  return (
    <Editable
      html={block.text}
      placeholder={block.type === "h2" ? "Заголовок H2" : "Заголовок H3"}
      className={cls}
      tag={block.type === "h2" ? "h2" : "h3"}
      autoFocus={focused}
      onInput={h.onInput}
      onKeyDown={h.onKeyDown}
    />
  );
}

function BlockParagraph({ block, onChange, onEnter, onBackspaceEmpty, replaceType, focused }) {
  const h = useTextBlockHandlers({ block, onChange, onEnter, onBackspaceEmpty, replaceType });
  return (
    <Editable
      html={block.text}
      placeholder={'Текст параграфа. "/" — команды; "**bold**", "[]", "##" — шорткаты'}
      className="text-[15.5px] leading-[1.75] text-[var(--foreground)] py-1"

}

function BlockQuote({ block, onChange, onEnter, onBackspaceEmpty, replaceType, focused }) {

}

// ─────────────────────────────────────────────────────────────────
// List (bullet / numbered / todo)
// ─────────────────────────────────────────────────────────────────
function BlockList({ block, onChange, onEnter, onBackspaceEmpty }) {
  const items = block.items || [];
  const update = (idx, patch) => {
    onChange({ ...block, items: items.map((it, i) => i === idx ? { ...it, ...patch } : it) });
  };
  const insertAfter = (idx) => {
    const fresh = { id: `i-${Date.now()}`, text: "", done: false };
    onChange({ ...block, items: [...items.slice(0, idx + 1), fresh, ...items.slice(idx + 1)] });
  };
  const removeAt = (idx) => {
    if (items.length <= 1) { onBackspaceEmpty?.(); return; }
    onChange({ ...block, items: items.filter((_, i) => i !== idx) });
  };
  const cycleType = () => {
    const order = ["bullet", "numbered", "todo"];
    onChange({ ...block, subtype: order[(order.indexOf(block.subtype || "bullet") + 1) % order.length] });
  };
  return (
    <ul className="my-1 space-y-0.5">
      <li className="absolute right-1 top-1 opacity-0 group-hover/block:opacity-100">
        <button type="button" onClick={cycleType} className="text-[10.5px] uppercase tracking-wider text-[var(--muted-foreground)] hover:text-[var(--accent)]">
          {block.subtype}
        </button>
      </li>
      {items.map((it, i) => (
        <li key={it.id} className="flex items-baseline gap-2">
          {block.subtype === "bullet"   && <span className="text-[var(--muted-foreground)] select-none">•</span>}
          {block.subtype === "numbered" && <span className="text-[var(--muted-foreground)] tabular-nums select-none w-4 text-right">{i + 1}.</span>}
          {block.subtype === "todo"     && (
            <input type="checkbox" checked={!!it.done} onChange={(e) => update(i, { done: e.target.checked })} className="accent-[var(--accent)] translate-y-[1px]" />
          )}
          <Editable
            html={it.text}
            placeholder="Элемент"
            className={`flex-1 text-[15px] leading-[1.65] ${it.done ? "line-through opacity-60" : ""}`}
            tag="div"
            onInput={(html) => update(i, { text: html })}
            onKeyDown={(e) => {
              if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                const isEmpty = !stripHtml(e.currentTarget.innerHTML);
                if (isEmpty && i === items.length - 1) onEnter?.();
                else insertAfter(i);
              } else if (e.key === "Backspace" && !stripHtml(e.currentTarget.innerHTML)) {
                e.preventDefault();
                removeAt(i);
              }
            }}
          />
        </li>
      ))}
    </ul>
  );
}

// ─────────────────────────────────────────────────────────────────
// Code (plain textarea + language select)
// ─────────────────────────────────────────────────────────────────
function BlockCode({ block, onChange }) {
  const LANGS = ["ts", "js", "tsx", "jsx", "rs", "go", "py", "sh", "json", "yaml", "sql", "html", "css"];
  return (

}

// ─────────────────────────────────────────────────────────────────
// Callout (note / warning / info)
// ─────────────────────────────────────────────────────────────────
function BlockCallout({ block, onChange, focused }) {
  const TONE = {
    note:    { bg: "var(--info-bg)",    bd: "var(--info-border)",    fg: "var(--info)",    label: "Note" },
    warning: { bg: "var(--warning-bg)", bd: "var(--warning-border)", fg: "var(--warning)", label: "Warning" },
    info:    { bg: "var(--success-bg)", bd: "var(--success-border)", fg: "var(--success)", label: "Info" },
  };
  const t = TONE[block.tone] || TONE.note;
  return (
    <div
      className="my-2 rounded-lg border px-4 py-3"
      style={{ background: t.bg, borderColor: t.bd }}
    >
      <div className="flex items-center gap-2 mb-1">
        <select
          value={block.tone}
          onChange={(e) => onChange({ ...block, tone: e.target.value })}
          style={{ color: t.fg }}
          className="bg-transparent text-[10.5px] uppercase tracking-wider font-semibold focus:outline-none cursor-pointer"
        >
          <option value="note">note</option>
          <option value="warning">warning</option>
          <option value="info">info</option>
        </select>
      </div>
      <Editable
        html={block.text}
        placeholder={`${t.label}: текст`}
        className="text-[14.5px] leading-[1.65]"

}

// ─────────────────────────────────────────────────────────────────
// Mermaid / LaTeX — raw textarea + small preview placeholder.
// ─────────────────────────────────────────────────────────────────
function BlockTechnical({ block, onChange, kind }) {
  return (
    <div className="my-2 rounded-lg border border-[var(--border)] overflow-hidden grid grid-cols-1 md:grid-cols-2">
      <div className="border-r border-[var(--border)] md:border-r md:border-b-0 border-b">

// ─────────────────────────────────────────────────────────────────
// Image, Table, Embed
// ─────────────────────────────────────────────────────────────────
function BlockImage({ block, onChange }) {
  return (
    <div className="my-2">
      <div className="rounded-lg border border-dashed border-[var(--border)] bg-[var(--bg-secondary)] aspect-[16/9] flex items-center justify-center">
        {block.src ? (

        ) : (
          <div className="text-center px-6">
            <p className="text-[12.5px] text-[var(--muted-foreground)] mb-2">Перетащите файл сюда или вставьте URL</p>
            <input
              type="text"
              value={block.src}
              onChange={(e) => onChange({ ...block, src: e.target.value })}
              placeholder="https://…"
              className="w-full max-w-xs bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1 text-[12.5px] focus:outline-none focus:border-[var(--accent)]"
            />
          </div>
        )}
      </div>
      <input
        type="text"
        value={block.caption}
        onChange={(e) => onChange({ ...block, caption: e.target.value })}
        placeholder="Подпись (опционально)"
        className="block w-full bg-transparent border-b border-transparent focus:border-[var(--border)] text-[12.5px] text-[var(--muted-foreground)] mt-2 py-1 focus:outline-none text-center"
      />
    </div>
  );
}

function BlockTable({ block, onChange }) {
  const rows = block.rows || [["", ""]];
  const setCell = (r, c, v) => {
    const next = rows.map((row, ri) => ri === r ? row.map((cell, ci) => ci === c ? v : cell) : row);
    onChange({ ...block, rows: next });
  };
  const addRow = () => onChange({ ...block, rows: [...rows, Array(rows[0].length).fill("")] });
  const addCol = () => onChange({ ...block, rows: rows.map(r => [...r, ""]) });
  const removeRow = (i) => rows.length > 1 && onChange({ ...block, rows: rows.filter((_, ri) => ri !== i) });
  const removeCol = (i) => rows[0].length > 1 && onChange({ ...block, rows: rows.map(r => r.filter((_, ci) => ci !== i)) });
  return (
    <div className="my-2 overflow-x-auto -mx-1 px-1">
      <table className="w-full border-collapse text-[13.5px]">
        <tbody>
          {rows.map((row, ri) => (
            <tr key={ri} className="group/row">
              {row.map((cell, ci) => (
                <td key={ci} className={`border border-[var(--border)] p-0 ${ri === 0 ? "bg-[var(--bg-elevated)] font-medium" : ""}`}>
                  <input
                    type="text"
                    value={cell}
                    onChange={(e) => setCell(ri, ci, e.target.value)}
                    placeholder={ri === 0 ? "Колонка" : "ячейка"}
                    className="block w-full bg-transparent px-2 py-1.5 focus:outline-none focus:bg-[var(--muted)]/40"
                  />
                </td>
              ))}
              <td className="pl-2 align-middle">
                <button type="button" onClick={() => removeRow(ri)} className="opacity-0 group-hover/row:opacity-100 text-[11px] text-rose-600 hover:underline">×</button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      <div className="flex gap-3 mt-1.5">
        <button type="button" onClick={addRow} className="text-[11.5px] text-[var(--muted-foreground)] hover:text-[var(--accent)]">+ строка</button>
        <button type="button" onClick={addCol} className="text-[11.5px] text-[var(--muted-foreground)] hover:text-[var(--accent)]">+ колонка</button>
      </div>
    </div>
  );
}

function BlockEmbed({ block, onChange }) {
  const ok = block.url && /^https?:\/\//.test(block.url);
  return (
    <div className="my-2 rounded-lg border border-[var(--border)] bg-[var(--bg-elevated)] p-3">
      <p className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">Embed</p>
      <input
        type="text"
        value={block.url}
        onChange={(e) => onChange({ ...block, url: e.target.value })}
        placeholder="https://www.youtube.com/watch?v=… или CodeSandbox / Loom / Twitter"
        className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1.5 text-[12.5px] focus:outline-none focus:border-[var(--accent)]"
      />
      <div className="mt-2 aspect-video rounded border border-dashed border-[var(--border)] bg-[var(--bg-secondary)] flex items-center justify-center text-[12px] text-[var(--muted-foreground)]">
        {ok ? `превью: ${block.url.replace(/^https?:\/\//, "").slice(0, 60)}` : "после вставки URL появится embed"}
      </div>
    </div>
  );
}

window.EditorBlocks = {
  BlockFrame, BlockHeading, BlockParagraph, BlockQuote, BlockList,
  BlockCode, BlockCallout, BlockTechnical, BlockImage, BlockTable, BlockEmbed,
};
  </script>

  <script type="text/babel">
// Editor — main screen, right-rail metadata, submit sheet.
// Exports window.EditorScreen.

const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { emptyBlock, slugifyRu, stripHtml, COMPLEXITY, COMPLEXITY_ORDER, pluralReviewers } = window.__editorHelpers;
const {
  BlockFrame, BlockHeading, BlockParagraph, BlockQuote, BlockList,
  BlockCode, BlockCallout, BlockTechnical, BlockImage, BlockTable, BlockEmbed,

// Type-router for a block.
function BlockRouter({ block, focused, onChange, onEnter, onBackspaceEmpty, replaceType }) {
  switch (block.type) {

    case "image":   return <BlockImage     {...{ block, onChange }} />;
    case "table":   return <BlockTable     {...{ block, onChange }} />;
    case "embed":   return <BlockEmbed     {...{ block, onChange }} />;
    default:        return <p className="text-rose-600 text-[12px]">Неизвестный тип: {block.type}</p>;
  }
}

// ─────────────────────────────────────────────────────────────────
// Reviewers picker (right-rail). Lets author pick 1–5 reviewers
// constrained by the chosen complexity tier.
// ─────────────────────────────────────────────────────────────────
// Skill-matched picker: ranks reviewers by composite Top score (skill match
// 50% + rating 30% + volume 20%), surfaces availability, lets the author
// confirm the system's suggestions and pick a lead. Empty → request admin.
function rpStars(value, size) {
  size = size || 11;
  const full = Math.floor(value), frac = value - full;
  const star = "M12 2l3 6.5 7 .8-5.2 4.7 1.5 6.9L12 17.8 5.2 20.9l1.5-6.9L1.5 9.3l7-.8z";
  return (
    <span className="inline-flex items-center" style={{ gap: 1 }}>
      {[0, 1, 2, 3, 4].map(i => {
        const pct = i < full ? 100 : i === full ? Math.round(frac * 100) : 0;
        return (
          <span key={i} className="relative inline-flex" style={{ width: size, height: size }}>
            <span className="absolute inset-0 text-[var(--border)]"><svg viewBox="0 0 24 24" width={size} height={size} fill="currentColor"><path d={star} /></svg></span>
            <span className="absolute inset-0 overflow-hidden" style={{ width: pct + "%", color: "#d4a017" }}><svg viewBox="0 0 24 24" width={size} height={size} fill="currentColor"><path d={star} /></svg></span>
          </span>
        );
      })}
    </span>
  );
}

function ReviewersPicker({ users, picked, setPicked, primary, setPrimary, complexity, skills, onRequestAdmin }) {
  const tier = COMPLEXITY[complexity] || COMPLEXITY.medium;
  const M = window.__reviewerMatch;
  const articleSkills = (skills && skills.length) ? skills : [];
  const [query, setQuery] = useState("");
  const [showAll, setShowAll] = useState(false);

  // Ranked candidates. "Matched" tab first; "all" reveals zero-match reviewers.
  const rankedMatched = useMemo(() => M ? M.ranked(articleSkills, { onlyMatched: true }) : [], [articleSkills.join("|")]);
  const rankedAll = useMemo(() => M ? M.ranked(articleSkills, {}) : [], [articleSkills.join("|")]);
  const base = showAll ? rankedAll : rankedMatched;
  const list = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return base;
    return base.filter(h => `@${h} ${(users[h] || {}).name || ""}`.toLowerCase().includes(q));
  }, [base, query, users]);

  const toggle = (h) => {
    if (picked.includes(h)) {
      const next = picked.filter(x => x !== h);
      setPicked(next);
      if (primary === h) setPrimary(next[0] || null);
    } else {
      if (picked.length >= tier.max) return;
      setPicked([...picked, h]);
      if (!primary) setPrimary(h);
    }
  };

  useEffect(() => {
    if (picked.length > tier.max) setPicked(picked.slice(0, tier.max));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [complexity]);

  // No skills entered yet, or no matches at all → guidance / request admin.
  const noSkills = articleSkills.length === 0;
  const noMatches = !noSkills && rankedMatched.length === 0;

  if (noSkills) {
    return <p className="text-[12px] text-[var(--warning)] leading-relaxed rounded-md border border-[var(--warning-border)] bg-[var(--warning-bg)] px-3 py-2.5">Сначала укажите ключевые навыки статьи выше — по ним подбираются ревьюеры.</p>;
  }

  return (
    <div className="flex flex-col gap-2.5">
      {/* tabs + search */}
      <div className="flex items-center justify-between gap-2">
        <div className="inline-flex items-center gap-1 bg-[var(--muted)] rounded-md p-0.5">
          {[["matched", "По навыкам"], ["all", "Все"]].map(([k, l]) => (
            <button key={k} type="button" onClick={() => setShowAll(k === "all")} className={`text-[11.5px] px-2.5 py-1 rounded font-medium transition-colors ${(showAll ? "all" : "matched") === k ? "bg-[var(--bg-elevated)] text-[var(--foreground)]" : "text-[var(--muted-foreground)]"}`}>{l}</button>
          ))}
        </div>
        <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="навык или имя…" className="flex-1 min-w-0 bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1.5 text-[12px] focus:outline-none focus:border-[var(--accent)]" />
      </div>

      {noMatches && !showAll ? (
        <div className="rounded-md border border-[var(--warning-border)] bg-[var(--warning-bg)] px-3 py-3 text-[12px] leading-relaxed">
          <p className="text-[var(--warning)] font-medium mb-2">Ревьюеры под эти навыки не найдены.</p>
          <p className="text-[var(--muted-foreground)] mb-2.5">Блог нельзя опубликовать без ревью. Обновите навыки статьи или попросите админа привлечь специалистов.</p>
          <div className="flex gap-2">
            <button type="button" onClick={() => setShowAll(true)} className="text-[11.5px] px-2.5 py-1.5 rounded border border-[var(--border)] bg-[var(--bg-elevated)] hover:border-[var(--foreground)]/30">Показать всех</button>
            <button type="button" onClick={onRequestAdmin} className="text-[11.5px] px-2.5 py-1.5 rounded font-medium bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)]">Запросить у админа</button>
          </div>
        </div>
      ) : (
        <ul className="flex flex-col gap-1.5 max-h-[260px] overflow-y-auto">
          {list.map(h => {
            const u = users[h] || { handle: h, name: h };
            const m = M.match(h, articleSkills);
            const sc = M.score(h, articleSkills);
            const av = M.avail(h);
            const on = picked.includes(h);
            const full = av.key === "full";
            const isLead = primary === h;
            const avColor = av.tone === "success" ? "var(--success)" : av.tone === "warning" ? "var(--warning)" : "var(--danger)";
            return (
              <li key={h} className={`flex items-center gap-2 p-2 rounded-md border transition-colors ${on ? "border-[color-mix(in_srgb,var(--accent)_45%,var(--border))] bg-[color-mix(in_srgb,var(--accent)_5%,transparent)]" : "border-[var(--border)] bg-[var(--bg-elevated)]"}`}>
                <button type="button" onClick={() => !full && toggle(h)} disabled={full} className={`w-4.5 h-4.5 rounded border flex items-center justify-center shrink-0 ${on ? "bg-[var(--accent)] border-[var(--accent)] text-white" : "border-[var(--border)]"} ${full ? "opacity-40 cursor-not-allowed" : "cursor-pointer"}`} style={{ width: 18, height: 18 }} title={full ? "Занят" : on ? "Убрать" : "Выбрать"}>{on && <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.5l4.5 4.5L19 6.5" /></svg>}</button>
                <span className="w-7 h-7 rounded-full bg-[var(--muted)] inline-flex items-center justify-center text-[11px] font-semibold text-[var(--muted-foreground)] shrink-0 font-[var(--font-display)]" style={{ border: isLead ? "2px solid var(--accent)" : "1px solid var(--border)" }}>{u.name.slice(0, 1)}</span>
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-1.5">
                    <p className="text-[12.5px] font-medium leading-tight truncate" title={u.name}>{u.name}</p>
                    {isLead && <span className="text-[9px] uppercase tracking-wider font-semibold text-[var(--accent)] shrink-0">ведущий</span>}
                  </div>
                  <div className="flex items-center gap-2 mt-0.5">
                    {rpStars(u.rating || 0)}
                    <span className="text-[10.5px] tabular-nums" style={{ color: avColor }}>● {av.label}</span>
                    <span className="text-[10.5px] text-[var(--muted-foreground)] tabular-nums">{m.pct}%</span>
                  </div>
                </div>
                <div className="flex flex-col items-end gap-0.5 shrink-0">
                  <span className="font-[var(--font-display)] font-bold text-[15px] tabular-nums leading-none" style={{ color: sc >= 70 ? "var(--accent)" : "var(--foreground)" }}>{sc}</span>
                  {on && <button type="button" onClick={() => setPrimary(h)} className={`text-[9.5px] px-1.5 rounded-full border ${isLead ? "border-[var(--accent)] text-[var(--accent)]" : "border-[var(--border)] text-[var(--muted-foreground)] hover:border-[var(--accent)]"}`}>{isLead ? "ведущий" : "вести"}</button>}
                </div>
              </li>
            );
          })}
        </ul>
      )}
      <p className="text-[11px] text-[var(--muted-foreground)] leading-relaxed">{tier.hint} Приглашённые ревьюеры должны согласиться — ответ придёт сразу.</p>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// Top collapsible meta bar — sits between the editor header and the
// article column. Holds cover, slug, tags, complexity, reviewers,
// deadline, note, and a readiness ledger. Collapsed by default for
// existing chapters, expanded for new ones.
// ─────────────────────────────────────────────────────────────────
function MetaBar({
  cover, setCover, slug, slugOverride, setSlugOverride,
  tags, setTags, complexity, setComplexity, picked, setPicked, primary, setPrimary,
  deadline, setDeadline, note, setNote, users, ready, checks,
  expanded, setExpanded,
}) {
  const tier = COMPLEXITY[complexity] || COMPLEXITY.medium;
  const okCount = checks.filter(c => c.ok).length;
  const primaryUser = primary ? users[primary] : null;
  const tagList = tags.split(",").map(s => s.trim()).filter(Boolean);

  return (
    <div className="border-b border-[var(--border)] bg-[var(--bg-secondary)]">
      <div className="max-w-[1080px] mx-auto px-4 sm:px-6">
        {/* ── Collapsed chip strip — always visible, click to toggle ── */}
        <button
          type="button"
          onClick={() => setExpanded(!expanded)}
          aria-expanded={expanded}
          aria-controls="meta-bar-panel"
          className="w-full flex items-center gap-2 sm:gap-3 py-2.5 text-left min-h-[44px] focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--accent)] rounded"
        >
          {/* Cover thumb */}
          <span className="w-10 h-7 rounded border border-[var(--border)] bg-[var(--background)] flex items-center justify-center text-[9.5px] text-[var(--muted-foreground)] overflow-hidden shrink-0">
            {cover ? <img src={cover} alt="" className="w-full h-full object-cover" /> : "обл."}
          </span>

          {/* Complexity */}
          <span className="text-[11.5px] text-[var(--muted-foreground)] shrink-0 hidden sm:inline">
            <span className="text-[var(--foreground)] font-medium">{tier.label}</span>
          </span>
          <span className="text-[var(--border)] shrink-0 hidden sm:inline">·</span>

          {/* Reviewers */}
          <span className="text-[11.5px] text-[var(--muted-foreground)] shrink-0 truncate min-w-0">
            {primaryUser ? (
              <>Ведущий <span className="text-[var(--foreground)] font-medium">@{primaryUser.handle}</span>{picked.length > 1 ? <span className="text-[var(--muted-foreground)]"> +{picked.length - 1}</span> : null}</>
            ) : (
              <span className="text-[var(--warning)]">Ревьюер не назначен</span>
            )}
          </span>

          <span className="text-[var(--border)] shrink-0 hidden sm:inline">·</span>

          {/* Deadline */}
          <span className="text-[11.5px] text-[var(--muted-foreground)] shrink-0 tabular-nums hidden sm:inline">до {deadline || "—"}</span>

          <span className="flex-1" />

          {/* Readiness */}
          <span className={`inline-flex items-center gap-1 text-[11.5px] tabular-nums shrink-0 ${ready ? "text-[var(--success)]" : "text-[var(--muted-foreground)]"}`}>
            {ready && <span aria-hidden="true">✓</span>}<span>{okCount}/{checks.length} готово</span>
          </span>

          {/* Expand chevron */}
          <span
            className={`text-[var(--muted-foreground)] text-[9px] shrink-0 transition-transform ${expanded ? "rotate-180" : ""}`}
            aria-hidden="true"
          >▼</span>
        </button>

        {/* ── Expanded form ── */}
        {expanded && (
          <div id="meta-bar-panel" className="pb-5 pt-4 grid grid-cols-1 md:grid-cols-12 gap-x-5 gap-y-4 border-t border-[var(--border)]">
            {/* Cover */}
            <div className="md:col-span-4 lg:col-span-3">
              <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">Обложка</label>
              <div
                className="aspect-[16/9] rounded-md border border-dashed border-[var(--border)] bg-[var(--background)] flex items-center justify-center text-[var(--muted-foreground)] text-[11.5px] cursor-pointer hover:border-[var(--accent)] overflow-hidden"
                onClick={() => { const url = prompt("URL обложки"); if (url) setCover(url); }}
              >
                {cover ? <img src={cover} alt="" className="w-full h-full object-cover" /> : "Загрузить или вставить URL"}
              </div>
            </div>

            {/* Slug + Tags */}
            <div className="md:col-span-4 lg:col-span-4 flex flex-col gap-3">
              <div>
                <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">Slug</label>
                <div className="flex items-center gap-1">
                  <span className="text-[11.5px] text-[var(--muted-foreground)] font-mono">/blog/</span>
                  <input
                    type="text"
                    value={slug}
                    onChange={(e) => setSlugOverride(e.target.value)}
                    placeholder="auto"
                    className="block flex-1 min-w-0 bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1 text-[12.5px] font-mono focus:outline-none focus:border-[var(--accent)]"
                  />
                  {slugOverride !== null && (
                    <button type="button" onClick={() => setSlugOverride(null)} className="text-[11px] text-[var(--muted-foreground)] hover:text-[var(--accent)] px-1" title="Авто-slug">↺</button>
                  )}
                </div>
              </div>

              <div>
                <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">Теги</label>
                <input
                  type="text"
                  value={tags}
                  onChange={(e) => setTags(e.target.value)}
                  placeholder="через запятую: Next.js, App Router"
                  className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1.5 text-[12.5px] focus:outline-none focus:border-[var(--accent)]"
                />
                {tagList.length > 0 && (
                  <div className="flex flex-wrap gap-1 mt-1.5">
                    {tagList.map(t => (
                      <span key={t} className="text-[11px] px-1.5 py-0.5 rounded-full bg-[var(--muted)] text-[var(--muted-foreground)]">{t}</span>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Complexity + Deadline */}
            <div className="md:col-span-4 lg:col-span-5 flex flex-col gap-3">
              <div>
                <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5">Сложность статьи</label>
                <div className="grid grid-cols-3 gap-1.5">
                  {COMPLEXITY_ORDER.map(k => (
                    <button
                      key={k}
                      type="button"
                      onClick={() => setComplexity(k)}
                      className={`px-1 py-1.5 rounded text-[11.5px] font-medium border transition-colors ${complexity === k
                        ? "border-[var(--accent)] bg-[color-mix(in_srgb,var(--accent)_8%,transparent)] text-[var(--accent)]"
                        : "border-[var(--border)] text-[var(--muted-foreground)] hover:border-[var(--accent)]/40"}`}
                    >{COMPLEXITY[k].label}</button>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">Срок ревью</label>
                <input
                  type="date"
                  value={deadline}
                  onChange={(e) => setDeadline(e.target.value)}
                  className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1.5 text-[12.5px] focus:outline-none focus:border-[var(--accent)]"
                />
              </div>
            </div>

            {/* Reviewers */}
            <div className="md:col-span-7 lg:col-span-7">
              <div className="flex items-baseline justify-between mb-1.5">
                <label className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Ревьюеры</label>
                <span className="text-[11px] text-[var(--muted-foreground)] tabular-nums">{picked.length}/{tier.max}</span>
              </div>
              <ReviewersPicker users={users} picked={picked} setPicked={setPicked} primary={primary} setPrimary={setPrimary} complexity={complexity} />
            </div>

            {/* Note */}
            <div className="md:col-span-5 lg:col-span-5">
              <label className="block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">Записка ревьюерам</label>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}
                rows={4}
                placeholder="Что просите посмотреть особенно внимательно?"
                className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1.5 text-[12.5px] focus:outline-none focus:border-[var(--accent)] resize-y"
              />
            </div>

            {/* Readiness ledger */}
            <div className="md:col-span-12 pt-3 border-t border-[var(--border)]">
              <div className="flex items-baseline justify-between mb-2">
                <label className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Готовность к ревью</label>
                {!ready && <span className="text-[11px] text-[var(--muted-foreground)]">Закройте все пункты, чтобы отправить</span>}
              </div>
              <ul className="flex flex-wrap gap-x-4 gap-y-1.5">
                {checks.map((c, i) => (
                  <li key={i} className="flex items-baseline gap-1.5 text-[12.5px]">
                    <span className={c.ok ? "text-[var(--success)]" : "text-[var(--muted-foreground)]"}>{c.ok ? "✓" : "○"}</span>
                    <span className={c.ok ? "text-[var(--foreground)]" : "text-[var(--muted-foreground)]"}>{c.label}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// Submit step — large right-side sheet (see SubmitSheet below).
// ─────────────────────────────────────────────────────────────────
// SubmitSheet — large right-side sheet for the "Отправить на ревью" step.
// Holds everything that used to live always-on in the editor meta bar:
// readiness gate, complexity, reviewers + lead, deadline, note. This is the
// review-handoff stage, separated from the writing surface.
// ─────────────────────────────────────────────────────────────────
// Inline chip editor for article key-skills (scientific-keyword style).
function SkillsField({ skills, setSkills }) {
  const [val, setVal] = useState("");
  const add = (s) => { s = s.trim(); if (s && !skills.includes(s) && skills.length < 6) setSkills([...skills, s]); setVal(""); };
  return (
    <div>
      <div className="flex items-center gap-1.5 flex-wrap rounded-md border border-[var(--border)] bg-[var(--background)] p-2 min-h-[40px]">
        {skills.map(s => (
          <span key={s} className="inline-flex items-center gap-1.5 rounded-full text-[11.5px] px-2 py-0.5 font-medium" style={{ background: "color-mix(in srgb,var(--accent) 12%,transparent)", color: "var(--accent)" }}>
            {s}<button type="button" onClick={() => setSkills(skills.filter(x => x !== s))} className="hover:opacity-60">×</button>
          </span>
        ))}
        <input type="text" value={val} onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" || e.key === ",") { e.preventDefault(); add(val); } else if (e.key === "Backspace" && !val && skills.length) setSkills(skills.slice(0, -1)); }}
          placeholder={skills.length ? "" : "OpenTelemetry, Node.js…"} className="flex-1 min-w-[80px] bg-transparent text-[12.5px] focus:outline-none py-0.5" />
      </div>
      <p className="text-[11px] text-[var(--muted-foreground)] mt-1 leading-relaxed">Ключевые слова темы — по ним подбираются ревьюеры; видны и читателю. Enter добавляет.</p>
    </div>
  );
}

function SubmitSheet({
  open, title, isChapter, chapterNumber,
  complexity, setComplexity, picked, setPicked, primary, setPrimary,
  deadline, setDeadline, note, setNote, users, checks, ready,
  skills, setSkills, onRequestAdmin,
  onClose, onConfirm,
}) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [open, onClose]);
  if (!open) return null;
  const tier = COMPLEXITY[complexity] || COMPLEXITY.medium;
  const okCount = checks.filter(c => c.ok).length;
  const label = "block text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1.5";
  return (
    <div className="fixed inset-0 z-[55] bg-black/40 flex justify-end" onClick={onClose} role="dialog" aria-modal="true">
      <div onClick={(e) => e.stopPropagation()} className="w-full max-w-[440px] h-full bg-[var(--bg-elevated)] border-l border-[var(--border)] flex flex-col" style={{ boxShadow: "-16px 0 40px rgba(0,0,0,0.18)" }}>
        <header className="px-5 py-4 border-b border-[var(--border)] shrink-0 flex items-start justify-between gap-3">
          <div className="min-w-0">
            <p className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-1">Передача на ревью</p>
            <h2 className="font-[var(--font-display)] font-bold text-[20px] tracking-tight leading-snug">
              {isChapter ? `Отправить главу ${chapterNumber || ""} на ревью` : "Отправить на ревью"}
            </h2>
            <p className="text-[12.5px] text-[var(--muted-foreground)] mt-1 title-clamp-1" title={title}>«{title}»</p>
          </div>
          <button type="button" onClick={onClose} aria-label="Закрыть" className="shrink-0 w-7 h-7 inline-flex items-center justify-center rounded-md text-[var(--muted-foreground)] hover:text-[var(--foreground)] hover:bg-[var(--muted)]">×</button>
        </header>

        <div className="flex-1 overflow-y-auto px-5 py-4 flex flex-col gap-5">
          {/* Readiness gate */}
          <div className="rounded-lg border border-[var(--border)] bg-[var(--bg-secondary)] p-3.5">
            <div className="flex items-baseline justify-between mb-2">
              <p className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Готовность</p>
              <span className={`text-[11.5px] tabular-nums ${ready ? "text-[var(--success)]" : "text-[var(--muted-foreground)]"}`}>{okCount}/{checks.length}</span>
            </div>
            <ul className="grid grid-cols-1 gap-1.5 text-[13px]">
              {checks.map((c, i) => (
                <li key={i} className="flex items-center gap-2">
                  <span className={c.ok ? "text-[var(--success)]" : "text-[var(--muted-foreground)]"}>{c.ok ? "✓" : "○"}</span>
                  <span className={c.ok ? "text-[var(--foreground)]" : "text-[var(--muted-foreground)]"}>{c.label}</span>
                </li>
              ))}
            </ul>
          </div>

          {/* Complexity */}
          <div>
            <label className={label}>Сложность статьи</label>
            <div className="grid grid-cols-3 gap-1.5">
              {COMPLEXITY_ORDER.map(k => (
                <button
                  key={k}
                  type="button"
                  onClick={() => setComplexity(k)}
                  className={`px-1 py-1.5 rounded text-[11.5px] font-medium border transition-colors ${complexity === k
                    ? "border-[var(--accent)] bg-[color-mix(in_srgb,var(--accent)_8%,transparent)] text-[var(--accent)]"
                    : "border-[var(--border)] text-[var(--muted-foreground)] hover:border-[var(--accent)]/40"}`}
                >{COMPLEXITY[k].label}</button>
              ))}
            </div>
            <p className="text-[11px] text-[var(--muted-foreground)] mt-1.5 leading-relaxed">{tier.hint}</p>
          </div>

          {/* Key skills */}
          <div>
            <div className="flex items-baseline justify-between mb-1.5">
              <label className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Ключевые навыки</label>
              <span className="text-[11px] text-[var(--muted-foreground)] tabular-nums">{(skills || []).length}/6</span>
            </div>
            <SkillsField skills={skills || []} setSkills={setSkills} />
          </div>

          {/* Reviewers */}
          <div>
            <div className="flex items-baseline justify-between mb-1.5">
              <label className="text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">Ревьюеры · подбор по навыкам</label>
              <span className="text-[11px] text-[var(--muted-foreground)] tabular-nums">{picked.length}/{tier.max}</span>
            </div>
            <ReviewersPicker users={users} picked={picked} setPicked={setPicked} primary={primary} setPrimary={setPrimary} complexity={complexity} skills={skills} onRequestAdmin={onRequestAdmin} />
          </div>

          {/* Note */}
          <div>
            <label className={label}>Записка ревьюерам</label>
            <textarea
              value={note}
              onChange={(e) => setNote(e.target.value)}
              rows={4}
              placeholder="Что просите посмотреть особенно внимательно?"
              className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2.5 py-2 text-[12.5px] focus:outline-none focus:border-[var(--accent)] resize-y"
            />
          </div>
        </div>

        <footer className="px-5 py-3.5 border-t border-[var(--border)] shrink-0 flex items-center justify-between gap-3">
          <span className="text-[11.5px] text-[var(--muted-foreground)]">{ready ? "Готово к отправке" : "Закройте все пункты готовности"}</span>
          <div className="flex items-center gap-2">
            <button type="button" onClick={onClose} className="px-3 py-2 rounded text-[12.5px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors">Отмена</button>
            <button type="button" disabled={!ready} onClick={onConfirm} className="px-4 py-2 rounded text-[12.5px] font-medium bg-[var(--accent)] text-[var(--accent-foreground)] disabled:opacity-50 disabled:cursor-not-allowed hover:opacity-90 transition-opacity">Отправить</button>
          </div>
        </footer>
      </div>
    </div>
  );
}

        <header className="flex items-center justify-between px-5 py-3.5 border-b border-[var(--border)]">
          <h2 className="font-[var(--font-display)] font-bold text-[17px] tracking-tight">Настройки главы</h2>
          <button type="button" onClick={onClose} aria-label="Закрыть" className="w-7 h-7 inline-flex items-center justify-center rounded-md text-[var(--muted-foreground)] hover:text-[var(--foreground)] hover:bg-[var(--muted)]">×</button>

              )}

          </div>
          <div>

            <input
              type="text" value={tags}

              className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2 py-1.5 text-[12.5px] focus:outline-none focus:border-[var(--accent)]"
            />
            {tagList.length > 0 && (
              <div className="flex flex-wrap gap-1 mt-1.5">

              </div>
            )}

          <div>
            <label className={label}>Обложка</label>
            <div
              className="aspect-[16/9] rounded-md border border-dashed border-[var(--border)] bg-[var(--background)] flex items-center justify-center text-[var(--muted-foreground)] text-[11.5px] cursor-pointer hover:border-[var(--accent)] overflow-hidden"
              onClick={() => { const url = prompt("URL обложки"); if (url) setCover(url); }}
            >
              {cover ? <img src={cover} alt="" className="w-full h-full object-cover" /> : "Загрузить или вставить URL"}
            </div>
            {cover && <button type="button" onClick={() => setCover(null)} className="mt-1.5 text-[11.5px] text-[var(--muted-foreground)] hover:text-[var(--danger)]">Убрать обложку</button>}
          </div>

        <footer className="px-5 py-3 border-t border-[var(--border)] flex justify-end">
          <button type="button" onClick={onClose} className="px-4 py-2 rounded-md bg-[var(--accent)] text-[var(--accent-foreground)] text-[12.5px] font-medium hover:opacity-90 transition-opacity">Готово</button>
        </footer>
