// Dashboard
// ──────────────────────────────────────────────────────────────────────────
function AdminRecruit({ pushLog }) {
  const [, setTick] = useState(0);
  useEffect(() => window.__reviewerFlow?.subscribe(() => setTick(t => t + 1)), []);
  const [rejectId, setRejectId] = useState(null);
  const [reason, setReason] = useState("");
  const users = window.FAKE_DATA.users || {};
  const reqs = window.__reviewerFlow?.recruitRequests || [];
  const pending = reqs.filter(r => r.status === "pending");
  const resolved = reqs.filter(r => r.status !== "pending");
  const approve = (r) => { window.__reviewerFlow.resolveRecruit(r.id, "approved"); pushLog && pushLog("Одобрил запрос ревьюеров", r.by, r.chapterTitle); };
  const doReject = (r) => { window.__reviewerFlow.resolveRecruit(r.id, "rejected", reason.trim() || "Навыки указаны слишком общо или не относятся к теме статьи."); setRejectId(null); setReason(""); pushLog && pushLog("Отклонил запрос ревьюеров", r.by, r.chapterTitle); };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-6">
      <AdminScreenHead eyebrow="Модерация" title="Заявки ревьюеров" sub="Авторы просят найти ревьюеров, когда под их навыки нет совпадений. Одобрение публикует направление на доску «Ищем ревьюеров»; отклонение возвращает автору вердикт с причиной." />

      <h2 className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2.5">На рассмотрении <span className="tabular-nums">· {pending.length}</span></h2>
      {pending.length === 0 ? (
        <p className="text-[13.5px] text-[var(--muted-foreground)] py-8 text-center border border-dashed border-[var(--border)] rounded-lg mb-8">Новых запросов нет.</p>
      ) : (
        <div className="flex flex-col gap-3 mb-8">
          {pending.map(r => {
            const author = users[r.by] || { name: r.by, handle: r.by };
            return (
              <div key={r.id} className="rounded-xl border border-[var(--border)] bg-[var(--bg-elevated)] p-4">
                <div className="flex items-start justify-between gap-3">
                  <div className="min-w-0">
                    <p className="text-[11.5px] text-[var(--muted-foreground)]">{r.blogTitle}</p>
                    <h3 className="font-[var(--font-display)] font-bold text-[16px] leading-snug">{r.chapterTitle || r.blogTitle}</h3>
                  </div>
                  <span className="text-[11.5px] text-[var(--muted-foreground)] shrink-0">от {author.name}</span>
                </div>
                <div className="flex items-center gap-1.5 flex-wrap mt-2.5">
                  {(r.skills || []).map(s => <span key={s} className="inline-flex items-center rounded-full border border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)] text-[11px] px-2 py-0.5">{s}</span>)}
                </div>
                {rejectId === r.id ? (
                  <div className="mt-3 pt-3 border-t border-[var(--border)]">
                    <textarea value={reason} onChange={(e) => setReason(e.target.value)} rows={2} placeholder="Причина отказа — её увидит автор…" className="block w-full bg-[var(--background)] border border-[var(--border)] rounded px-2.5 py-2 text-[12.5px] focus:outline-none focus:border-[var(--accent)] resize-y mb-2" />
                    <div className="flex items-center gap-2 justify-end">
                      <button onClick={() => { setRejectId(null); setReason(""); }} className="text-[12px] px-3 py-1.5 rounded text-[var(--muted-foreground)] hover:text-[var(--foreground)]">Отмена</button>
                      <button onClick={() => doReject(r)} className="text-[12px] px-3 py-1.5 rounded font-medium bg-[var(--danger)] text-white hover:opacity-90">Отклонить с причиной</button>
                    </div>
                  </div>
                ) : (
                  <div className="flex items-center gap-2 justify-end mt-3 pt-3 border-t border-[var(--border)]">
                    <button onClick={() => setRejectId(r.id)} className="text-[12px] px-3 py-1.5 rounded font-medium bg-[var(--bg-elevated)] text-[var(--danger)] border border-[var(--danger-bg)] hover:bg-[var(--danger-bg)]">Отклонить</button>
                    <button onClick={() => approve(r)} className="text-[12px] px-3 py-1.5 rounded font-medium bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)]">Одобрить · на доску</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {resolved.length > 0 && (
        <React.Fragment>
          <h2 className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2.5">Обработанные</h2>
          <ul className="rounded-xl border border-[var(--border)] overflow-hidden divide-y divide-[var(--border)] bg-[var(--bg-elevated)]">
            {resolved.map(r => (
              <li key={r.id} className="flex items-center gap-3 px-4 py-2.5">
                <span className={`text-[10.5px] uppercase tracking-wider font-semibold px-2 py-0.5 rounded-full ${r.status === "approved" ? "text-[var(--success)] bg-[var(--success-bg)]" : "text-[var(--danger)] bg-[var(--danger-bg)]"}`}>{r.status === "approved" ? "Одобрен" : "Отклонён"}</span>
                <span className="text-[13px] truncate flex-1">{r.chapterTitle || r.blogTitle}</span>
                <span className="text-[11.5px] text-[var(--muted-foreground)] shrink-0">{(users[r.by] || {}).name || r.by}</span>
              </li>
            ))}
          </ul>
        </React.Fragment>
      )}

      {/* Reviewer applications (from the public board «Стать ревьюером») */}
      <RecruitApplications pushLog={pushLog} users={users} />
    </div>
  );
}

// Applications submitted from the public board. Admin accepts (→ onboard) or
// declines; author of the platform sees the queue drain.
function RecruitApplications({ pushLog, users }) {
  const [, setTick] = useState(0);
  useEffect(() => window.__reviewerFlow?.subscribe(() => setTick(t => t + 1)), []);
  const apps = window.__reviewerFlow?.applications || [];
  if (apps.length === 0) return null;
  const pending = apps.filter(a => a.status === "pending");
  const resolved = apps.filter(a => a.status !== "pending");
  const act = (a, status) => { window.__reviewerFlow.resolveApplication(a.id, status); pushLog && pushLog(status === "accepted" ? "Принял заявку в ревьюеры" : "Отклонил заявку в ревьюеры", a.by || "гость", a.area); };
  return (
    <div className="mt-10">
      <h2 className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2.5">Заявки в ревьюеры <span className="tabular-nums">· {pending.length}</span></h2>
      {pending.length === 0 ? (
        <p className="text-[13px] text-[var(--muted-foreground)] py-6 text-center border border-dashed border-[var(--border)] rounded-lg mb-3">Новых заявок нет.</p>
      ) : (
        <div className="flex flex-col gap-3 mb-3">
          {pending.map(a => (
            <div key={a.id} className="rounded-xl border border-[var(--border)] bg-[var(--bg-elevated)] p-4">
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <p className="text-[13.5px] font-semibold">{a.name || (users[a.by] || {}).name || "Гость"} {a.by && <span className="text-[var(--muted-foreground)] font-normal">@{a.by}</span>}</p>
                  <p className="text-[11.5px] text-[var(--muted-foreground)] mt-0.5">Направление: {a.area}</p>
                </div>
              </div>
              <div className="flex items-center gap-1.5 flex-wrap mt-2.5">
                {(a.skills || []).map(s => <span key={s} className="inline-flex items-center rounded-full border border-[var(--border)] bg-[var(--bg-secondary)] text-[var(--muted-foreground)] text-[11px] px-2 py-0.5">{s}</span>)}
              </div>
              {a.message && <p className="text-[12.5px] text-[var(--muted-foreground)] leading-relaxed mt-2.5 rounded-lg bg-[var(--bg-secondary)] border border-[var(--border)] px-3 py-2">«{a.message}»</p>}
              <div className="flex items-center justify-end gap-2 mt-3 pt-3 border-t border-[var(--border)]">
                <button onClick={() => act(a, "declined")} className="text-[12px] px-3 py-1.5 rounded font-medium bg-[var(--bg-elevated)] text-[var(--danger)] border border-[var(--danger-bg)] hover:bg-[var(--danger-bg)]">Отклонить</button>
                <button onClick={() => act(a, "accepted")} className="text-[12px] px-3 py-1.5 rounded font-medium bg-[var(--accent)] text-[var(--accent-foreground)] hover:bg-[var(--accent-hover)]">Принять</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {resolved.length > 0 && (
        <ul className="rounded-xl border border-[var(--border)] overflow-hidden divide-y divide-[var(--border)] bg-[var(--bg-elevated)]">
          {resolved.map(a => (
            <li key={a.id} className="flex items-center gap-3 px-4 py-2.5">
              <span className={`text-[10.5px] uppercase tracking-wider font-semibold px-2 py-0.5 rounded-full ${a.status === "accepted" ? "text-[var(--success)] bg-[var(--success-bg)]" : "text-[var(--danger)] bg-[var(--danger-bg)]"}`}>{a.status === "accepted" ? "Принят" : "Отклонён"}</span>
              <span className="text-[13px] truncate flex-1">{a.name || (users[a.by] || {}).name || "Гость"} · {a.area}</span>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function AdminDashboard({ users, reports, log, unpublished, onOpenUser, onOpenReport, onGoTab, onGoUsers, onGoReports }) {
  const m = window.FAKE_DATA.platformMetrics || {};
  const userCount       = Object.keys(users).length;
  const blockedCount    = Object.values(users).filter(u => u.status === "blocked").length;
  const pendingReports  = reports.filter(r => r.status === "pending").length;
  const publishedNow    = (m.publishedArticles || 0) - unpublished.size;
  const recentLog       = log.slice(0, 6);
  const pendingReview   = (window.__reviewStore?.get().pcRequests || []).filter(r => r.status === "pending").length;
  const pendingRecruit  = (window.__reviewerFlow?.recruitRequests || []).filter(r => r.status === "pending").length;
  const pendingApps     = (window.__reviewerFlow?.applications || []).filter(a => a.status === "pending").length;

  const kpis = [
    { label: "Активные читатели · 7 дн", value: (m.activeUsers7d || 0).toLocaleString("ru-RU"), trend: m.signupsTrend },
    { label: "Регистрации · 7 дн", value: m.newSignups7d || 0 },
    { label: "Опубликовано", value: publishedNow, hint: unpublished.size ? `${unpublished.size} снято` : "статей" },
    { label: "Аккаунтов", value: userCount, hint: blockedCount ? `${blockedCount} в блоке` : "все активны" },
  ];
  const queues = [
    { id: "reports", icon: "flag", label: "Жалобы", n: pendingReports, tone: "danger", note: pendingReports ? "ожидают решения" : "очередь пуста" },
    { id: "review", icon: "edit", label: "Ревью глав", n: pendingReview, tone: "accent", note: pendingReview ? "смена ведущего" : "нет запросов" },
    { id: "recruit", icon: "userPlus", label: "Запросы + заявки", n: pendingRecruit + pendingApps, tone: "accent", note: pendingRecruit + pendingApps ? "новые обращения" : "нет новых" },
    { id: "users", icon: "users", label: "Заблокировано", n: blockedCount, tone: "muted", note: `из ${userCount} аккаунтов` },
  ];

  return (
    <div className="px-4 sm:px-6 py-6 max-w-5xl mx-auto">
      <AdminScreenHead eyebrow="Сводка" title="Состояние платформы" sub="Срез ключевых метрик и очередей, требующих внимания модератора." />

      {/* KPI row — uniform */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
        {kpis.map((k, i) => (
          <div key={i} className="rounded-xl border border-[var(--border)] bg-[var(--bg-elevated)] p-4">
            <p className="font-[var(--font-display)] font-extrabold text-[26px] leading-none tabular-nums mb-1.5">{k.value}</p>
            <p className="text-[12px] font-medium">{k.label}</p>
            {k.trend ? <div className="-mb-1 -mx-1 mt-1.5"><Sparkline values={k.trend} /></div> : <p className="text-[11px] text-[var(--muted-foreground)] mt-0.5">{k.hint}</p>}
          </div>
        ))}
      </div>

      {/* Queues — uniform actionable cards */}
      <p className="text-[10.5px] uppercase tracking-[0.12em] font-semibold text-[var(--muted-foreground)] mt-6 mb-2">Требует внимания</p>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
        {queues.map((q) => {
          const c = q.tone === "danger" ? "var(--danger)" : q.tone === "accent" ? "var(--accent)" : "var(--muted-foreground)";
          return (
            <button key={q.id} onClick={() => onGoTab?.(q.id)} className="text-left rounded-xl border border-[var(--border)] bg-[var(--bg-elevated)] p-4 hover:border-[color-mix(in_srgb,var(--foreground)_20%,transparent)] transition-colors group">
              <div className="flex items-center justify-between mb-2">
                <span className="inline-flex items-center justify-center w-8 h-8 rounded-lg" style={{ background: `color-mix(in srgb,${c} 12%,transparent)`, color: c }}><AdmIcon d={ADM_I[q.icon]} w={16} /></span>
                <span className="font-[var(--font-display)] font-extrabold text-[22px] tabular-nums leading-none" style={{ color: q.n > 0 ? c : "var(--muted-foreground)" }}>{q.n}</span>
              </div>
              <p className="text-[12.5px] font-medium">{q.label}</p>
              <p className="text-[11px] text-[var(--muted-foreground)] mt-0.5 flex items-center justify-between">{q.note}<span className="opacity-0 group-hover:opacity-100 transition-opacity text-[var(--accent)]"><AdmIcon d={ADM_I.chevR} w={12} /></span></p>
            </button>
          );
        })}
      </div>

      {/* Audit log */}
      <section>
        <div className="flex items-baseline justify-between mb-3">
          <h3 className="text-[13px] font-semibold">Последние действия</h3>
          <span className="text-[11.5px] text-[var(--muted-foreground)]">Все события за {log.length > 0 ? "сегодня" : "—"}</span>
        </div>
        <ul className="divide-y divide-[var(--border)] border-y border-[var(--border)]">
          {recentLog.map(entry => (
            <li key={entry.id} className="grid grid-cols-[110px_140px_1fr_auto] items-baseline gap-4 py-2.5 px-1 text-[13px]">
              <span className="text-[11.5px] tabular-nums text-[var(--muted-foreground)]">{relTime(entry.at)}</span>
              <span className="font-mono text-[12px] text-[var(--muted-foreground)] truncate">{entry.action}</span>
              <span className="truncate">{entry.target} <span className="text-[var(--muted-foreground)]">— {entry.note}</span></span>
              <span className="text-[11.5px] text-[var(--muted-foreground)]">@{entry.actor}</span>
            </li>
          ))}
        </ul>
      </section>
    </div>
  );
}

function Metric({ label, value, trend, hint }) {
  return (
    <div className="rounded-lg border border-[var(--border)] px-4 py-3">
      <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)]">{label}</p>
      <p className="font-[var(--font-display)] font-bold text-2xl tabular-nums mt-1">{value}</p>
      {trend && <div className="-mb-1 -mx-1 mt-1.5"><Sparkline values={trend} /></div>}
      {hint && <p className="text-[11.5px] text-[var(--muted-foreground)] mt-1">{hint}</p>}
    </div>
  );
}

Object.assign(window, { AdminPortal });
  </script>

  <!-- src/admin/admin-users-reports.jsx (inlined from ui_kits/blog/src/admin/admin-users-reports.jsx) -->
  <script type="text/babel">
// Admin Portal — part 2: Users list, User detail, Reports list, Report detail.
// Continues the surface defined in Admin.jsx; relies on the same shared
// helpers (RolePill, StatusDot, fmtDate, relTime, ROLE_LABELS) which are
// declared globally there.

const { useState } = React;
// ──────────────────────────────────────────────────────────────────────────
// AdminUsers — table of all platform users.
// ──────────────────────────────────────────────────────────────────────────
function AdminUsers({ users, onOpen }) {
  const [query, setQuery]   = useState("");
  // screen-label set on the wrapper below
  const [roleF, setRoleF]   = useState("all");
  const [statusF, setStatF] = useState("all");

  const list = Object.values(users).filter(u => {
    if (roleF !== "all"   && u.role !== roleF)   return false;
    if (statusF !== "all" && u.status !== statusF) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!(`@${u.handle} ${u.name}`.toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a, b) => (b.lastSeenAt || 0) - (a.lastSeenAt || 0));

  return (
    <div className="px-4 sm:px-6 py-6 max-w-5xl mx-auto">
      <AdminScreenHead eyebrow="Люди" title="Все аккаунты" sub="Роли, статусы, активность. Откройте карточку, чтобы изменить роль или заблокировать." />

      {/* Filters */}
      <div className="flex flex-wrap items-center gap-2 mb-3">
        <input
          type="search"
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Поиск по @handle или имени"
          className="flex-1 min-w-[220px] bg-[var(--bg-secondary)] border border-[var(--border)] rounded-lg px-3 py-2 text-[13px] placeholder:text-[var(--muted-foreground)] focus:outline-none focus:border-[var(--accent)] transition-colors"
        />
        <SelectChip value={roleF} onChange={setRoleF} options={[
          ["all", "Все роли"],
          ["reader", "Читатели"],
          ["author", "Авторы"],
          ["reviewer", "Ревьюеры"],
          ["admin", "Админы"],
        ]} />
        <SelectChip value={statusF} onChange={setStatF} options={[
          ["all", "Все статусы"],
          ["active", "Активные"],
          ["blocked", "Заблокированные"],
          ["deactivated", "Деактивированные"],
        ]} />
      </div>

      {/* Table — bordered card, sticky head, dense rows */}
      <div className="rounded-xl border border-[var(--border)] bg-[var(--bg-elevated)] overflow-hidden">
        <div className="grid grid-cols-[1fr_120px_130px_90px] gap-3 px-4 py-2 border-b border-[var(--border)] bg-[var(--bg-secondary)] text-[10.5px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] sticky top-0 z-10">
          <span>Пользователь</span>
          <span>Роль</span>
          <span>Статус</span>
          <span className="text-right">Визит</span>
        </div>
        {list.length === 0 && (
          <p className="py-8 text-center text-[13px] text-[var(--muted-foreground)]">Никого не нашлось.</p>
        )}
        <ul>
          {list.map(u => (
            <li key={u.handle}>
              <button
                onClick={() => onOpen(u.handle)}
                className="w-full grid grid-cols-[1fr_120px_130px_90px] gap-3 px-4 py-2.5 text-left border-b border-[var(--border)] last:border-0 hover:bg-[var(--bg-secondary)] transition-colors items-center"
              >
                <div className="flex items-center gap-2.5 min-w-0">
                  <Avatar handle={u.handle} name={u.name} size={28} />
                  <div className="min-w-0">
                    <p className="text-[13px] font-medium truncate leading-tight">{u.name}</p>
                    <p className="text-[11px] text-[var(--muted-foreground)] truncate leading-tight">@{u.handle}</p>
                  </div>
                </div>
                <RolePill role={u.role} />
                <StatusDot status={u.status} />
                <span className="text-[11.5px] text-[var(--muted-foreground)] tabular-nums text-right">{u.lastSeenAt ? relTime(u.lastSeenAt) : "—"}</span>
              </button>
            </li>
          ))}
        </ul>
      </div>

      <p className="text-[11.5px] text-[var(--muted-foreground)] mt-3">{list.length} из {Object.keys(users).length}</p>
    </div>
  );
}

function SelectChip({ value, onChange, options }) {
  return (
    <select
      value={value}
      onChange={(e) => onChange(e.target.value)}
      className="bg-[var(--background)] border border-[var(--border)] rounded-md px-2.5 py-2 text-[13px] focus:outline-none focus:border-[var(--accent)] transition-colors"
    >
      {options.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
    </select>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// AdminUserDetail — drill-in for a single user.
// ──────────────────────────────────────────────────────────────────────────
function AdminUserDetail({ user, log, reports, unpublished, onBack, onSetRole, onBlock, onUnblock, onUnpublishArticle, onRepublishArticle, onOpenProfile }) {
  const [confirmBlock, setConfirmBlock] = useState(false);
  // screen-label set on the wrapper below
  const [blockReason, setBlockReason]   = useState("");
  if (!user) return null;

  // History — entries from the audit log mentioning this user.
  const history = log.filter(e => e.target.includes(`@${user.handle}`));
  const reportsAgainst = reports.filter(r => r.targetAuthorHandle === user.handle);
  const articlesByUser = (window.FAKE_DATA.articles || []).filter(a => a.authorSlug === user.handle);

  return (
    <div className="px-10 py-10 max-w-4xl">
      <button onClick={onBack} className="inline-flex items-center gap-1.5 text-sm text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors mb-6">
        <Icon.ArrowLeft /> Все пользователи
      </button>

      {/* Header */}
      <header className="flex items-start gap-4 mb-8 pb-6 border-b border-[var(--border)]">
        <Avatar handle={user.handle} name={user.name} size={56} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <h2 className="font-[var(--font-display)] font-extrabold text-2xl md:text-[28px] tracking-tight">{user.name}</h2>
            <RolePill role={user.role} />
            <StatusDot status={user.status} />
          </div>
          <p className="text-[13px] text-[var(--muted-foreground)] mt-0.5">@{user.handle} · с {fmtDate(user.joinedAt)}</p>
          {user.bio && <p className="text-[13.5px] text-[var(--foreground)] mt-2 max-w-xl leading-relaxed">{user.bio}</p>}
          {user.status === "blocked" && user.blockedReason && (
            <div className="mt-3 inline-flex items-start gap-2 px-3 py-2 rounded-md bg-rose-500/[0.08] border border-rose-500/20 text-[12.5px]">
              <span className="text-rose-600 dark:text-rose-400 font-semibold mt-px">Заблокирован.</span>
              <span className="text-[var(--foreground)]">{user.blockedReason}</span>
            </div>
          )}
        </div>
        <button
          onClick={() => onOpenProfile?.(user.handle)}
          className="text-[12px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] underline-offset-2 hover:underline shrink-0 mt-2"
        >
          Публичный профиль →
        </button>
      </header>

      {/* Action panels — role + status side by side */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10">
        {/* Role */}
        <div className="rounded-lg border border-[var(--border)] p-4">
          <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2">Роль</p>
          <div className="flex flex-wrap gap-1.5">
            {["reader", "author", "reviewer", "admin"].map(r => (
              <button
                key={r}
                onClick={() => onSetRole(user.handle, r)}
                disabled={user.role === r}
                className={`text-[12.5px] px-2.5 py-1.5 rounded border transition-colors ${
                  user.role === r
                    ? "bg-[var(--accent)]/14 border-[var(--accent)]/40 text-[var(--accent)] font-medium cursor-default"
                    : "border-[var(--border)] hover:border-[var(--accent)]/40 hover:text-[var(--accent)]"
                }`}
              >
                {ROLE_LABELS[r]}
              </button>
            ))}
          </div>
          <p className="text-[11.5px] text-[var(--muted-foreground)] mt-2.5 leading-relaxed">
            Смена роли применяется немедленно и пишется в журнал.
          </p>
        </div>

        {/* Status */}
        <div className="rounded-lg border border-[var(--border)] p-4">
          <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2">Доступ</p>
          {user.status === "blocked" ? (
            <button
              onClick={() => onUnblock(user.handle)}
              className="text-[13px] px-3 py-1.5 rounded bg-emerald-500/14 text-emerald-700 dark:text-emerald-300 border border-emerald-500/30 hover:bg-emerald-500/20 transition-colors font-medium"
            >
              Разблокировать
            </button>
          ) : !confirmBlock ? (
            <button
              onClick={() => setConfirmBlock(true)}
              disabled={user.status === "deactivated"}
              className="text-[13px] px-3 py-1.5 rounded border border-rose-500/30 text-rose-600 dark:text-rose-400 hover:bg-rose-500/10 transition-colors font-medium disabled:opacity-40 disabled:cursor-not-allowed"
            >
              Заблокировать
            </button>
          ) : (
            <div className="space-y-2">
              <input
                value={blockReason}
                onChange={(e) => setBlockReason(e.target.value)}
                placeholder="Причина блокировки…"
                autoFocus
                className="w-full bg-[var(--background)] border border-[var(--border)] rounded-md px-2.5 py-1.5 text-[13px] placeholder:text-[var(--muted-foreground)] focus:outline-none focus:border-[var(--accent)] transition-colors"
              />
              <div className="flex items-center gap-2">
                <button
                  onClick={() => { onBlock(user.handle, blockReason || "Без указания причины"); setConfirmBlock(false); setBlockReason(""); }}
                  className="text-[12.5px] font-medium px-2.5 py-1 rounded bg-rose-600 text-white hover:bg-rose-500 transition-colors"
                >Заблокировать</button>
                <button
                  onClick={() => { setConfirmBlock(false); setBlockReason(""); }}
                  className="text-[12.5px] text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors"
                >Отмена</button>
              </div>
            </div>
          )}
          <p className="text-[11.5px] text-[var(--muted-foreground)] mt-2.5 leading-relaxed">
            Заблокированный аккаунт не может комментировать и публиковаться. Контент сохраняется.
          </p>
        </div>
      </div>

      {/* Articles by user (only for authors) */}
      {articlesByUser.length > 0 && (
        <section className="mb-10">
          <h3 className="text-[13px] font-semibold mb-3">Статьи автора <span className="text-[var(--muted-foreground)] font-normal">{articlesByUser.length}</span></h3>
          <ul className="divide-y divide-[var(--border)] border-y border-[var(--border)]">
            {articlesByUser.map(a => {
              const off = unpublished.has(a.slug);
              return (
                <li key={a.id} className="grid grid-cols-[1fr_auto_auto] items-center gap-4 py-2.5 px-1">
                  <span className={`text-[13.5px] truncate ${off ? "text-[var(--muted-foreground)] line-through" : ""}`}>{a.title}</span>
                  <span className="text-[11.5px] text-[var(--muted-foreground)] tabular-nums">{a.viewCount.toLocaleString("ru-RU")} просм.</span>
                  {off ? (
                    <button onClick={() => onRepublishArticle(a.slug)} className="text-[12px] px-2 py-1 rounded border border-[var(--border)] hover:border-emerald-500/40 hover:text-emerald-600 transition-colors">
                      Восстановить
                    </button>
                  ) : (
                    <button onClick={() => onUnpublishArticle(a.slug, "Снято модератором")} className="text-[12px] px-2 py-1 rounded border border-[var(--border)] hover:border-rose-500/40 hover:text-rose-600 transition-colors">
                      Снять с публикации
                    </button>
                  )}
                </li>
              );
            })}
          </ul>
        </section>
      )}

      {/* Reports against this user */}
      {reportsAgainst.length > 0 && (
        <section className="mb-10">
          <h3 className="text-[13px] font-semibold mb-3">Жалобы на пользователя <span className="text-[var(--muted-foreground)] font-normal">{reportsAgainst.length}</span></h3>
          <ul className="divide-y divide-[var(--border)] border-y border-[var(--border)]">
            {reportsAgainst.map(r => (
              <li key={r.id} className="grid grid-cols-[110px_1fr_auto] items-baseline gap-4 py-2.5 px-1 text-[13px]">
                <span className="text-[11.5px] tabular-nums text-[var(--muted-foreground)]">{relTime(r.reportedAt)}</span>
                <span className="truncate">{r.reasonText} <span className="text-[var(--muted-foreground)]">— «{r.targetBody.slice(0, 80)}…»</span></span>
                <StatusDot status={r.status} />
              </li>
            ))}
          </ul>
        </section>
      )}

      {/* Audit history */}
      <section>
        <h3 className="text-[13px] font-semibold mb-3">История модерации <span className="text-[var(--muted-foreground)] font-normal">{history.length}</span></h3>
        {history.length === 0 ? (
          <p className="text-[13px] text-[var(--muted-foreground)] py-3 border-t border-[var(--border)]">Действий по этому пользователю не было.</p>
        ) : (
          <ul className="divide-y divide-[var(--border)] border-y border-[var(--border)]">
            {history.map(e => (
              <li key={e.id} className="grid grid-cols-[110px_140px_1fr_auto] items-baseline gap-4 py-2.5 px-1 text-[13px]">
                <span className="text-[11.5px] tabular-nums text-[var(--muted-foreground)]">{relTime(e.at)}</span>
                <span className="font-mono text-[12px] text-[var(--muted-foreground)] truncate">{e.action}</span>
                <span className="truncate">{e.note}</span>
                <span className="text-[11.5px] text-[var(--muted-foreground)]">@{e.actor}</span>
              </li>
            ))}
          </ul>
        )}
      </section>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// AdminReports — pending + resolved queue.
// ──────────────────────────────────────────────────────────────────────────
function AdminReports({ reports, users, onOpen }) {
  const [tab, setTab] = useState("pending");
  const groups = {
    pending:   reports.filter(r => r.status === "pending"),
    resolved:  reports.filter(r => r.status === "resolved" || r.status === "dismissed"),
  };
  const list = groups[tab];
  return (
    <div className="px-4 sm:px-6 py-6 max-w-5xl mx-auto">
      <AdminScreenHead eyebrow="Модерация" title="Очередь жалоб" sub="Жалобы от читателей на комментарии и блоги. Откройте карточку, чтобы увидеть контекст и принять решение." />

      {/* Tabs */}
      <div className="flex items-center gap-1 border-b border-[var(--border)] mb-5">
        {[["pending", "Открытые", groups.pending.length], ["resolved", "Закрытые", groups.resolved.length]].map(([k, l, n]) => (
          <button
            key={k}
            onClick={() => setTab(k)}
            className={`px-3 py-2 text-[13px] -mb-px border-b-2 transition-colors ${
              tab === k
                ? "border-[var(--accent)] text-[var(--foreground)] font-medium"
                : "border-transparent text-[var(--muted-foreground)] hover:text-[var(--foreground)]"
            }`}
          >
            {l} <span className="text-[var(--muted-foreground)] font-normal tabular-nums ml-1">{n}</span>
          </button>
        ))}
      </div>

      {/* List */}
      {list.length === 0 ? (
        <p className="text-[13px] text-[var(--muted-foreground)] py-10 text-center border border-dashed border-[var(--border)] rounded-md">
          {tab === "pending" ? "Очередь пуста — отдыхайте." : "Закрытых жалоб пока нет."}
        </p>
      ) : (
        <ul className="divide-y divide-[var(--border)] border-y border-[var(--border)]">
          {list.map(r => {
            const author = users[r.targetAuthorHandle] || { name: r.targetAuthorHandle, handle: r.targetAuthorHandle };
            return (
              <li key={r.id}>
                <button
                  onClick={() => onOpen(r.id)}
                  className="w-full grid grid-cols-[1fr_140px_110px_auto] items-center gap-4 py-3.5 px-2 -mx-2 text-left rounded hover:bg-[var(--muted)]/40 transition-colors"
                >
                  <div className="min-w-0">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="text-[11px] uppercase tracking-wider font-semibold text-rose-600 dark:text-rose-400">{r.reasonText}</span>
                      <span className="text-[10px] uppercase tracking-wider font-semibold px-1.5 py-px rounded bg-[var(--muted)] text-[var(--muted-foreground)]">{r.kind === "blog" ? "блог" : "коммент"}</span>
                      {r.reportsCount > 1 && <span className="text-[11px] text-[var(--muted-foreground)]">· {r.reportsCount} жалобы</span>}
                    </div>
                    <p className="text-[13px] line-clamp-1 text-[var(--foreground)]">«{r.targetBody}»</p>
                  </div>
                  <span className="text-[12px] text-[var(--muted-foreground)] inline-flex items-center gap-2 shrink-0 truncate">
                    <Avatar handle={author.handle} name={author.name} size={20} /> @{author.handle}
                  </span>
                  <span className="text-[12px] text-[var(--muted-foreground)] tabular-nums shrink-0">{relTime(r.reportedAt)}</span>
                  <StatusDot status={r.status} />
                </button>
              </li>
            );
          })}
        </ul>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// AdminReportDetail — single report with full comment context + actions.
// ──────────────────────────────────────────────────────────────────────────
function AdminReportDetail({ report, users, onBack, onResolve }) {
  if (!report) return null;
  const author = users[report.targetAuthorHandle] || { name: report.targetAuthorHandle, handle: report.targetAuthorHandle };
  const reporter = users[report.reporterHandle] || { name: report.reporterHandle, handle: report.reporterHandle };
  const blog = window.__blogData?.getBlogBySlug?.(report.targetArticleSlug);
  const article = blog || (window.FAKE_DATA.articles || []).find(a => a.slug === report.targetArticleSlug);
  const isBlog = report.kind === "blog";
  const closed = report.status !== "pending";

  return (
    <div className="px-10 py-10 max-w-3xl">
      <button onClick={onBack} className="inline-flex items-center gap-1.5 text-sm text-[var(--muted-foreground)] hover:text-[var(--foreground)] transition-colors mb-6">
        <Icon.ArrowLeft /> Все жалобы
      </button>

      <header className="mb-6 pb-5 border-b border-[var(--border)]">
        <div className="flex items-center gap-2 flex-wrap mb-1">
          <span className="text-[11px] uppercase tracking-wider font-semibold text-rose-600 dark:text-rose-400">{report.reasonText}</span>
          <StatusDot status={report.status} />
          <span className="text-[12px] text-[var(--muted-foreground)]">· {report.reportsCount} {report.reportsCount === 1 ? "жалоба" : "жалоб"}</span>
        </div>
        <h2 className="font-[var(--font-display)] font-bold text-2xl tracking-tight">{isBlog ? "Жалоба на блог" : "Жалоба на комментарий"}</h2>
        <p className="text-[12.5px] text-[var(--muted-foreground)] mt-1">
          Подал @{reporter.handle} · {fmtDate(report.reportedAt)} · {isBlog ? "блог" : "к статье"} «{article?.title || report.targetArticleSlug}»{report.note ? ` · «${report.note}»` : ""}
        </p>
      </header>

      {/* Context: comment text or blog card */}
      <section className="mb-8">
        <p className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2">{isBlog ? "Блог" : "Комментарий"}</p>
        {isBlog ? (
          <article className="rounded-lg border border-[var(--border)] p-4 bg-[var(--muted)]/20">
            <p className="font-[var(--font-display)] font-bold text-[17px] tracking-tight mb-1">{article?.title || report.targetBody}</p>
            <p className="text-[12.5px] text-[var(--muted-foreground)]">Автор @{author.handle} · {author.name}</p>
          </article>
        ) : (
          <article className="rounded-lg border border-[var(--border)] p-4 bg-[var(--muted)]/20">
            <header className="flex items-center gap-2 mb-2">
              <Avatar handle={author.handle} name={author.name} size={28} />
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-[13px] font-medium truncate">{author.name}</span>
                  <RolePill role={author.role} />
                  <StatusDot status={author.status} />

  <script type="text/babel">
// AdminReview — chapter-aware moderation queue.
// Exports window.AdminReview. Uses getInFlightChapters(). Force-approve and remove-reviewer keyed by
// (blogSlug, chapterSlug). All other admin sections unchanged.

const { useState } = React;

function AdminReview({ session, pushLog, onOpenReview }) {
  const [tick, setTick] = useState(0);
  React.useEffect(() => window.__reviewStore.subscribe(() => setTick(t => t + 1)), []);
  const store = window.__reviewStore.get();
  const users = window.FAKE_DATA.users || {};
  const D = window.__blogData;

  const pending  = store.pcRequests.filter(r => r.status === "pending");
  const closed   = store.pcRequests.filter(r => r.status !== "pending");

  // Forced is keyed by "blogSlug#chapterSlug" composite for chapter-level granularity.
  const isForced = (blogSlug, chapterSlug) => store.forced.includes(`${blogSlug}#${chapterSlug}`);
  const inFlight = D.getInFlightChapters().filter(r => !isForced(r.blogSlug, r.chapterSlug));

  const decidePc = (id, decision) => {
    window.__reviewStore.update(s => ({
      pcRequests: s.pcRequests.map(r => r.id === id
        ? { ...r, status: decision, decidedAt: Math.floor(Date.now() / 1000), decidedBy: session?.handle || "moderator" }
        : r),
    }));
    const r = store.pcRequests.find(x => x.id === id);
    if (!r) return;
    pushLog(decision === "approved" ? "review.primary.approve" : "review.primary.reject",
      `${r.articleSlug} · @${r.requestedBy}`,
      decision === "approved"
        ? `@${r.currentPrimary} → @${r.proposedPrimary}`
        : "Запрос отклонён");
  };

  const forceApprove = (blogSlug, chapterSlug, reason) => {
    window.__reviewStore.update(s => ({ forced: [...s.forced, `${blogSlug}#${chapterSlug}`] }));
    pushLog("review.force-approve", `${blogSlug}/${chapterSlug}`, reason || "Принудительное одобрение модератором");
  };

  const removeReviewer = (blogSlug, chapterSlug, handle, reason) => {
    window.__reviewStore.update(s => ({
      removedReviewers: [...s.removedReviewers, { blogSlug, chapterSlug, handle, by: session?.handle || "moderator", at: Math.floor(Date.now() / 1000), reason }],
    }));
    pushLog("review.reviewer.remove", `${blogSlug}/${chapterSlug} · @${handle}`, reason || "Снят модератором");
  };

          <ul className="space-y-2.5">

              return (

                  <div className="flex items-center gap-2 flex-wrap mb-1.5">

                  )}

              onClick={() => setConfirming("force")}
              className="text-[12px] px-3 py-1.5 rounded border border-amber-500/40 text-amber-700 dark:text-amber-300 hover:bg-amber-500/10 transition-colors min-h-[36px]"
            >Принудительно одобрить главу →</button>
          )}
        </div>
      )}
    </li>
  );
}

  <script>
// Mock data for the review collaboration surface.
// One article in active review with a previous published version, multi-reviewer
// team, threads (notes + suggested edits), revision chat messages, and an
// admin queue of "change primary reviewer" requests.
//
// Lives on window.REVIEW_DATA so screens can read/mutate it via React state.

// Author drafts/in-flight/published views are derived from FAKE_DATA.articles
// at runtime — see window.__blogData helpers below.
// REVIEW_DATA now only holds admin-bound primary-change requests; everything
// else (article body, team, threads, chat, drafts list) lives on the canonical
// articles list.
window.REVIEW_DATA = {
  primaryChangeRequests: [
    {
      id: "pc-1",
      articleSlug: "next-16-boundary-patterns",
      revisionNumber: 4,
      requestedBy: "alex",
      requestedAt: 1747105200,
      currentPrimary: "dm.k",
      proposedPrimary: "kostya",
      reason: "Дмитрий в отпуске со среды, статья ждёт. Костя уже вовлечён и проверил диаграмму.",
      status: "pending",
    },
  ],
};

// ─────────────────────────────────────────────────────────────────
// __blogData — base layer. blogs-data.js EXTENDS this object additively
// with the chapter-aware helpers (getBlogs, getInFlightChapters,
// getAuthorBlogs, effectiveChapterTeam, …), so this base must exist first.
// The legacy article-level views (getArticles / getArticleBySlug /
// getAuthorDrafts / getInFlightReviews) were superseded by those chapter-aware
// helpers and removed. Only effectiveTeam remains — ReviewPage still calls it
// as a defensive fallback when effectiveChapterTeam is unavailable.
// ─────────────────────────────────────────────────────────────────
window.__blogData = (function () {
  // Set of handles the admin has explicitly removed from an article's review.
  // Reads from window.__reviewStore (declared below); safe-guarded for first call.
  function removedSet(slug) {
    const store = window.__reviewStore?.get?.();
    if (!store?.removedReviewers) return new Set();
    return new Set(store.removedReviewers.filter(r => r.slug === slug).map(r => r.handle));
  }
  // Effective reviewer list for an article, excluding admin-removed handles.
  // If the primary was removed, promote the next remaining reviewer.
  function effectiveTeam(article) {
    if (!article) return { reviewerHandles: [], primaryHandle: null };
    const removed = removedSet(article.slug);
    const reviewerHandles = (article.reviewerHandles || []).filter(h => !removed.has(h));
    let primaryHandle = article.primaryHandle;
    if (primaryHandle && removed.has(primaryHandle)) primaryHandle = reviewerHandles[0] || null;
    return { reviewerHandles, primaryHandle, removed };
  }
  return {
    // Exposed so ReviewPage can seed its local team state without the removed set.
    effectiveTeam, removedReviewerHandlesFor: removedSet,
  };
})();

// ─────────────────────────────────────────────────────────────────
// Tiny shared review store — lets ReviewPage and AdminPortal share
// a single list of primary-change requests + admin-driven actions
// (force-approve, reviewer removal). Pub/sub so React state in
// either screen stays in sync without cross-imports.
// ─────────────────────────────────────────────────────────────────
window.__reviewStore = (function () {
  const state = {
    pcRequests: structuredClone(window.REVIEW_DATA.primaryChangeRequests || []),
    forced:     [],   // slugs that admin force-approved
    removedReviewers: [], // {slug, handle, by, at, reason}
  };
  const subs = new Set();
  return {
    get() { return state; },
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
    update(patch) {
      Object.assign(state, typeof patch === "function" ? patch(state) : patch);
      subs.forEach(fn => fn(state));
    },
  };
})();

  </script>

    if (isChapterInFlight(c))  return c.revision.status;
    if (isChapterDraft(c))     return "draft";
    return "unknown";

        const reviewerHandles = (c.reviewerHandles || []).filter(h => !removed.has(`${b.slug}#${c.slug}#${h}`));
        let primaryHandle = c.primaryHandle;
        if (primaryHandle && removed.has(`${b.slug}#${c.slug}#${primaryHandle}`)) {
          primaryHandle = reviewerHandles[0] || null;
        }
        out.push({
          blogSlug: b.slug, blogTitle: b.title,
          chapterSlug: c.slug, chapterTitle: c.title,
          chapterOrder: c.order, totalChapters: b.chapters.length,
          revisionNumber: c.revision?.number || 1, status: c.revision?.status,
          authorHandle: b.authorSlug, primaryHandle, reviewerHandles,

      const buckets = { drafts: [], onReview: [], published: [] };
      for (const c of b.chapters) {

        else if (isChapterInFlight(c)) buckets.onReview.push(c);

  D.chapterAllReviewers = (chapter) => {
    const current = new Set([
      ...(chapter.reviewerHandles || []),
      ...Object.keys(chapter.state || {}),

    for (const h of (chapter.reviewerHistory || [])) {

    return { current: [...current], all: [...all] };

  D.getReviewedChapters = (handle) => {

            publishedAt: c.revision?.publishedAt || b.publishedAt || 0,
          });
        }
      }
    }
    return out.sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));

        if (Array.isArray(c.skills) && c.skills.length) return;
        c.skills = (CHAPTER_SKILLS[b.slug + "#" + c.slug] || (Array.isArray(b.tags) ? b.tags.slice() : [])).slice();

  // Anyone who can review (has competencies). dm.k/kostya/etc.
  function reviewerPool() {
    return Object.keys(FD.users).filter(h => (FD.users[h].competencies || []).length > 0);
  }

  // ── Skill matching ─────────────────────────────────────────────────
  function words(s) { return String(s || "").toLowerCase().split(/[^a-zа-я0-9.]+/i).filter(w => w.length > 2); }
  function hit(reviewerSkill, articleSkills) {
    const rw = new Set(words(reviewerSkill));
    return articleSkills.some(a => words(a).some(w => rw.has(w)));
  }
  // Chapter/article skills: explicit chapter.skills → blog.tags → article tags.
  function chapterSkills(chapter, blog) {
    if (chapter && Array.isArray(chapter.skills) && chapter.skills.length) return chapter.skills;
    if (blog && Array.isArray(blog.tags) && blog.tags.length) return blog.tags;
    if (chapter && typeof chapter.tags === "string") return chapter.tags.split(",").map(t => t.trim()).filter(Boolean);
    return [];
  }
  function match(handle, skills) {
    const comp = (FD.users[handle] || {}).competencies || [];
    const matched = comp.filter(c => hit(c, skills));
    const covered = skills.filter(a => comp.some(c => hit(c, [a])));
    const pct = skills.length ? Math.round((covered.length / skills.length) * 100) : 0;
    return { matched, covered, pct };
  }
  // Composite "Top": skill match 50% + rating 30% + volume 20% (cap 60).
  function score(handle, skills) {
    const u = FD.users[handle] || {};
    const m = match(handle, skills).pct / 100;
    const r = (u.rating || 0) / 5;
    const v = Math.min((u.reviews || 0) / 60, 1);
    return Math.round((m * 0.5 + r * 0.3 + v * 0.2) * 100);
  }
  function avail(handle) {
    const u = FD.users[handle] || {};
    const load = u.load || 0, cap = u.capacity || 1;
    if (load >= cap) return { key: "full", label: "Занят", tone: "danger", load, cap };
    if (load >= cap - 1) return { key: "busy", label: "Почти занят", tone: "warning", load, cap };
    return { key: "free", label: "Свободен", tone: "success", load, cap };
  }
  function ranked(skills, opts) {
    opts = opts || {};
    let hs = (opts.pool || reviewerPool()).slice();
    if (opts.onlyMatched) hs = hs.filter(h => match(h, skills).pct > 0);
    return hs.sort((a, b) => score(b, skills) - score(a, skills));
  }

  window.__reviewerMatch = { reviewerPool, chapterSkills, match, score, avail, ranked };

  // ── Flow store: invitations / recruit requests / ratings ───────────
  const subs = new Set();
  function emit() { subs.forEach(fn => { try { fn(); } catch (e) {} }); }
  const store = {
    // self-describing invitation records so the cabinet renders without
    // depending on the chapter existing in FAKE_DATA.
    invitations: [
      { id: "inv-1", blogSlug: "observability-node", blogTitle: "Observability в Node", chapterTitle: "Распределённый трейсинг с OpenTelemetry", chN: 3, chTotal: 4, author: "alex", complexity: "Сложная", skills: ["OpenTelemetry", "Distributed Tracing", "Node.js", "Observability"], note: "Глава про propagation context между сервисами — твой профиль. Особенно интересно мнение по разделу с sampling.", asLead: true, to: "dm.k", status: "pending", deadlineH: 46, at: 1747160000 },
      { id: "inv-2", blogSlug: "go-prod", blogTitle: "Go в проде", chapterTitle: "Профилирование горутин под нагрузкой", chN: 2, chTotal: 5, author: "ira.m", complexity: "Средняя", skills: ["Go", "Distributed Systems", "Performance", "pprof"], note: "Нужен второй взгляд на бенчмарки.", asLead: false, to: "dm.k", status: "pending", deadlineH: 70, at: 1747120000 },
      { id: "inv-3", blogSlug: "wasm-lowlevel", blogTitle: "Низкоуровневый WASM", chapterTitle: "Ручное управление памятью в WASI", chN: 1, chTotal: 2, author: "ira.m", complexity: "Сложная", skills: ["WebAssembly", "Rust", "WASI", "Linear Memory"], note: "Указал тебя по навыку «Systems».", asLead: false, to: "dm.k", status: "pending", deadlineH: 30, at: 1747050000 },
    ],
    recruitRequests: [
      // A pending request the admin will see in their queue, and a resolved one
      // so the author cabinet shows verdict states out of the box.
      { id: "rr-seed-1", blogSlug: "wasm-lowlevel", chapterSlug: "memory", blogTitle: "Низкоуровневый WASM", chapterTitle: "Ручное управление памятью в WASI", skills: ["WebAssembly", "Rust", "WASI", "Linear Memory"], by: "alex", status: "pending", at: 1747100000 },
    ],
    // Admin-curated public board of open reviewer calls.
    boardCalls: [
      { id: "bc-1", area: "Rust · WebAssembly", skills: ["Rust", "WebAssembly", "WASI"], waiting: 3, note: "Низкоуровневые главы простаивают без профильного ревьюера.", hot: true },
      { id: "bc-2", area: "Kubernetes · Platform", skills: ["Kubernetes", "Helm", "eBPF"], waiting: 2, note: "Растёт поток статей по платформенной инженерии.", hot: true },
      { id: "bc-3", area: "ML · Inference", skills: ["PyTorch", "ONNX", "CUDA"], waiting: 2, note: "Нужен второй ревьюер на серию про инференс." },
      { id: "bc-4", area: "Security · AppSec", skills: ["OWASP", "Auth", "Crypto"], waiting: 1, note: "Ищем ведущего для разбора уязвимостей." },
    ],
    ratings: {}, // handle -> [{ stars, by, chapter, at }]
    ratedChapters: {}, // chapterKey -> true once the author has rated
    // People applying to become reviewers from the public board.
    applications: [],
    subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
    // Submit a reviewer application (from the «Стать ревьюером» / «Откликнуться»
    // board buttons). area is optional (the call they responded to).
    apply(app) {
      const rec = Object.assign({ id: "ap-" + Date.now(), status: "pending", at: Math.floor(Date.now() / 1000) }, app);
      this.applications.push(rec); emit(); return rec;
    },
    resolveApplication(id, status) {
      const a = this.applications.find(x => x.id === id);
      if (a) { a.status = status; a.resolvedAt = Math.floor(Date.now() / 1000); emit(); }
    },
    invitesFor(handle, status) {
      return this.invitations.filter(i => i.to === handle && (!status || i.status === status));
    },
    respond(id, status) {
      const inv = this.invitations.find(i => i.id === id);
      if (inv) { inv.status = status; inv.respondedAt = Math.floor(Date.now() / 1000); emit(); }
    },
    invite(records) { records.forEach(r => this.invitations.push(r)); emit(); },
    requestRecruit(req) {
      const rec = Object.assign({ id: "rr-" + Date.now(), status: "pending", at: Math.floor(Date.now() / 1000) }, req);
      this.recruitRequests.push(rec); emit(); return rec;
    },
    recruitFor(handle) { return this.recruitRequests.filter(r => r.by === handle); },
    resolveRecruit(id, status, reason) {
      const r = this.recruitRequests.find(x => x.id === id);
      if (!r) return;
      r.status = status; r.reason = reason || ""; r.resolvedAt = Math.floor(Date.now() / 1000);
      // Approving a request publishes a matching call onto the public board.
      if (status === "approved") {
        this.boardCalls.unshift({
          id: "bc-" + Date.now(), area: (r.skills || []).slice(0, 2).join(" · ") || r.chapterTitle,
          skills: (r.skills || []).slice(), waiting: 1,
          note: `По запросу автора «${r.chapterTitle || r.blogTitle}».`, hot: true,
        });
      }
      emit();
    },
    rate(handle, stars, by, chapter) {
      (this.ratings[handle] = this.ratings[handle] || []).push({ stars, by, chapter, at: Math.floor(Date.now() / 1000) });
      emit();
    },
    // Author rates a whole chapter's reviewers at once; marks it rated so the
    // «оцените» prompt disappears.
    rateChapter(key, entries) {
      (entries || []).forEach(e => {
        (this.ratings[e.handle] = this.ratings[e.handle] || []).push({ stars: e.stars, by: "author", chapter: key, at: Math.floor(Date.now() / 1000) });
      });
      this.ratedChapters[key] = true; emit();
    },
    isRated(key) { return !!this.ratedChapters[key]; },
    // Invitations a reviewer flagged as skill-mismatch, for a given author.
    flaggedFor(author) { return this.invitations.filter(i => i.status === "flagged" && i.author === author); },
  };
  window.__reviewerFlow = store;
})();
  </script>

  <script>
// donation.js — additive donation + promo-banner data layer (Phase 3).
// Loads after data.js. Two INDEPENDENT stores:
//   window.__banners  — carousel promo slides on the feed (admin-managed)
//   window.__donations — donation methods + enable flag (admin-managed)
// Both are pub-sub and persist nothing server-side (prototype in-memory).
(function () {
  function makeStore(initial) {
    const subs = new Set();
    const state = initial;
    return {
      get: () => state,
      subscribe(fn) { subs.add(fn); return () => subs.delete(fn); },
      emit() { subs.forEach(fn => { try { fn(); } catch (e) {} }); },
    };
  }

  // ── Promo banners (feed carousel) ──────────────────────────────────
  // action: "internal" (in-app nav), "external" (new tab), "donate" (open modal)
  const bannersState = {
    items: [

      { id: "b-donate", eyebrow: "Поддержите проект", title: "Recenza живёт на пожертвования читателей", cta: "Поддержать", tone: "gold", icon: "heart", action: "donate", target: "", visible: true },
    ],
  };
  const banners = makeStore(bannersState);
  Object.assign(banners, {
    visibleItems() { return bannersState.items.filter(b => b.visible); },
    update(id, patch) { const b = bannersState.items.find(x => x.id === id); if (b) { Object.assign(b, patch); banners.emit(); } },
    add() { bannersState.items.push({ id: "b-" + Date.now(), eyebrow: "Новый баннер", title: "Заголовок баннера", cta: "Подробнее", tone: "teal", icon: "pen", action: "internal", target: "board", visible: false }); banners.emit(); },
    remove(id) { bannersState.items = bannersState.items.filter(x => x.id !== id); banners.emit(); },
  });
  window.__banners = banners;

  // ── Donation methods ───────────────────────────────────────────────
  // type: "link" (button → opens url in new tab) | "qr" (scannable image)
  const donState = {
    enabled: true,
    methods: [
      { id: "da", name: "DonationAlerts", type: "link", url: "https://donationalerts.com/r/recenza", hint: "Картой, кошельком, телефоном", visible: true, primary: true },
      { id: "ozon", name: "Ozon Банк", type: "qr", hint: "Сканируйте в приложении Ozon", visible: true, qrUploaded: true },
      { id: "sbp", name: "СБП", type: "qr", hint: "Любой банк с поддержкой СБП", visible: false, qrUploaded: false },
    ],
  };
  const donations = makeStore(donState);
  Object.assign(donations, {
    isEnabled() { return donState.enabled; },
    setEnabled(v) { donState.enabled = v; donations.emit(); },
    visibleMethods() { return donState.methods.filter(m => m.visible); },
    update(id, patch) { const m = donState.methods.find(x => x.id === id); if (m) { Object.assign(m, patch); donations.emit(); } },
    add() { donState.methods.push({ id: "m-" + Date.now(), name: "Новый способ", type: "link", url: "", hint: "", visible: false }); donations.emit(); },
    remove(id) { donState.methods = donState.methods.filter(x => x.id !== id); donations.emit(); },
  });
  window.__donations = donations;
})();

// Rating modal — author rates each reviewer of a published chapter (1–5,

// Lists the author's published chapters whose reviewers haven't been rated yet.
function AuthorRatingPanel({ me }) {

  const [rating, setRating] = useState(null);
  const flow = window.__reviewerFlow;
  const blogs = (window.FAKE_DATA.blogs || []).filter(b => b.authorSlug === me);

      <h2 className="text-[11px] uppercase tracking-wider font-semibold text-[var(--muted-foreground)] mb-2.5">Оцените ревьюеров <span className="tabular-nums">· {items.length}</span></h2>
